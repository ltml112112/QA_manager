<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="../../assets/css/global_style.css">
<style>
body { padding: 24px; }
.container { max-width: 900px; margin: 0 auto; }
.placeholder-icon { font-size: 64px; margin-bottom: 24px; }
.placeholder-title { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 12px; }
.placeholder-desc { color: var(--text-muted); line-height: 1.7; }
.center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 320px; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="card-header">
      <span>📄</span> SDC 사전심사자료 자동화
    </div>
    <div class="center">
      <div class="placeholder-icon">🚧</div>
      <div class="placeholder-title">준비 중입니다</div>
      <div class="placeholder-desc">
        SDC 사전심사자료 자동화 도구는 현재 개발 중입니다.<br>
        Google Apps Script 기반으로 구현 예정입니다.
      </div>
    </div>
  </div>
</div>
<script>
(function() {
  function applyTheme(theme) {
    document.documentElement.dataset.theme = theme;
    localStorage.setItem('qa_theme', theme);
  }
  applyTheme(localStorage.getItem('qa_theme') || 'dark');
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'setTheme') applyTheme(e.data.theme);
  });
})();
</script>
</body>
</html>
