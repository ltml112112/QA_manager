<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="../../assets/css/global_style.css">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<title>소자평가 Lot test 일정 관리</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="app-layout">

  <!-- ━━━━━━━━━━━━━━━━  캘린더 메인 (풀 너비)  ━━━━━━━━━━━━━━━━ -->
  <main class="cal-main">

    <!-- 상단 헤더 바 -->
    <div class="cal-topbar">
      <button class="btn-reg-mail"  id="btnOpenMailPopup">📧 메일 일괄 등록</button>
      <button class="btn-reg-indiv" id="btnOpenIndivPopup">✏ 개별 등록</button>
      <button class="nav-btn" id="btnPrevMonth" title="이전 달">&#8249;</button>
      <div class="cal-title-wrap">
        <h2 class="cal-title" id="calTitle" title="클릭하여 년/월 선택">— 년 — 월 <span class="mp-caret">▾</span></h2>
        <div class="month-picker" id="monthPicker">
          <div class="mp-year-row">
            <button class="mp-arrow" id="mpPrevYear">&#8249;</button>
            <span id="mpYearLabel">2026</span>
            <button class="mp-arrow" id="mpNextYear">&#8250;</button>
          </div>
          <div class="mp-months" id="mpMonths"></div>
        </div>
      </div>
      <button class="nav-btn" id="btnNextMonth" title="다음 달">&#8250;</button>
      <button class="btn-today" id="btnToday">오늘</button>
      <button class="btn-search" id="btnOpenSearch">🔍 조회</button>
    </div>

    <!-- 요약 스트립 -->
    <div class="summary-strip" id="summaryStrip"></div>

    <!-- 범례 -->
    <div class="legend-bar">
      <div class="legend-item">
        <div class="legend-dot" style="background:#ef4444;opacity:.75"></div>합성생산
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#9333ea;opacity:.75"></div>정제생산/소자이관
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#ef4444"></div>시급 요청
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--text-faint)"></div>완료
      </div>
    </div>

    <!-- 달력 본문 -->
    <div class="cal-body">

      <!-- 요일 헤더 -->
      <div class="cal-dow-row">
        <div class="cal-dow sun">일</div>
        <div class="cal-dow">월</div>
        <div class="cal-dow">화</div>
        <div class="cal-dow">수</div>
        <div class="cal-dow">목</div>
        <div class="cal-dow">금</div>
        <div class="cal-dow sat">토</div>
      </div>

      <!-- 날짜 그리드 (JS가 채움) -->
      <div class="cal-grid" id="calGrid">
        <!-- STEP 4에서 렌더링 예정 -->
      </div>

    </div>
  </main>

</div><!-- /.app-layout -->

<!-- ━━━━━━━━━━━━━━━━  개별 등록 팝업  ━━━━━━━━━━━━━━━━ -->
<div class="indiv-popup-overlay" id="indivPopupOverlay">
  <div class="indiv-popup">
    <div class="indiv-popup-header">
      <span class="indiv-popup-title">✏ 소자평가 일정 개별 등록</span>
      <button type="button" class="indiv-popup-close" id="btnIndivPopupClose">✕</button>
    </div>
    <div class="indiv-popup-body">
      <form id="scheduleForm" autocomplete="off" novalidate>
        <input type="hidden" id="fEditId">

        <div class="form-group">
          <label class="fld-label">부서 / 상태<span class="req">*</span></label>
          <div class="radio-group" id="fDeptGroup">
            <label class="radio-chip synth" id="chipSynth">
              <input type="radio" name="fDept" value="합성생산">
              <span class="chip-dot" style="background:#ef4444"></span>합성생산
            </label>
            <label class="radio-chip refine" id="chipRefine">
              <input type="radio" name="fDept" value="정제생산/소자이관">
              <span class="chip-dot" style="background:#9333ea"></span>정제생산/소자이관
            </label>
          </div>
        </div>

        <div class="form-group">
          <label class="fld-label" for="fMaterial">재료명<span class="req">*</span></label>
          <div class="ac-wrap">
            <input class="form-input" type="text" id="fMaterial"
              placeholder="예) PG1088" autocomplete="off" required>
            <div class="ac-dropdown" id="acDropdown"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="fld-label" for="fLot">Lot 번호</label>
          <input class="form-input" type="text" id="fLot" placeholder="예) P-NC05-Tol">
        </div>

        <div class="form-group">
          <label class="fld-label" for="fRequest">요청사항</label>
          <input class="form-input" type="text" id="fRequest" placeholder="예) Lot 평가(미정)">
        </div>

        <hr class="form-divider">

        <div class="form-group">
          <label class="fld-label" for="fTransferDate">샘플 이관<span class="req">*</span></label>
          <input class="form-input" type="date" id="fTransferDate" required>
        </div>

        <div class="form-group">
          <label class="fld-label" for="fEvalStart">소자평가 시작일</label>
          <input class="form-input" type="date" id="fEvalStart">
        </div>

        <div class="form-group">
          <label class="fld-label" for="fEvalTarget">소자평가 완료 요청일</label>
          <input class="form-input" type="date" id="fEvalTarget">
        </div>

        <hr class="form-divider">

        <div class="urgent-row" id="urgentRow">
          <input type="checkbox" id="fUrgent">
          <label for="fUrgent">⚡ 시급 요청</label>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="btnSubmit">등록하기</button>
        <button type="button" class="btn btn-secondary btn-block" id="btnCancelEdit" style="display:none;margin-top:6px;">취소</button>
      </form>
    </div>
  </div>
</div>

<!-- ━━━━━━━━━━━━━━━━  메일 붙여넣기 팝업  ━━━━━━━━━━━━━━━━ -->
<div class="mail-popup-overlay" id="mailPopupOverlay">
  <div class="mail-popup">

    <div class="mail-popup-header">
      <span class="mail-popup-header-title">📧 메일 데이터 붙여넣기</span>
      <span class="mail-popup-header-hint">이메일 표를 드래그하거나 Ctrl+V 로 붙여넣으세요</span>
      <button type="button" class="mail-popup-close" id="btnMailPopupClose">✕</button>
    </div>

    <div class="mail-popup-body" id="mailPopupBody">
      <!-- 드롭존 -->
      <div id="mailDzRow">
        <div class="mail-dropzone" id="mailDropzone">
          <div class="mail-dz-icon">📋</div>
          <div class="mail-dz-title">이메일 표를 여기에 드래그하거나 붙여넣으세요</div>
          <div class="mail-dz-hint">
            이메일에서 표 전체 선택 후 이 영역으로 <b>드래그 드롭</b><br>
            또는 복사(Ctrl+C) 후 <b>Ctrl+V</b> — 정제/소자이관·합성생산 자동 인식
          </div>
        </div>
      </div>
      <!-- 날짜 일괄 적용 바 -->
      <div class="mail-bulk-date-bar" id="mailBulkDateBar" style="display:none">
        <label>날짜 일괄 적용</label>
        <input type="date" id="mailBulkDate" min="2000-01-01" max="2099-12-31">
        <button type="button" class="btn btn-secondary btn-sm" id="btnMailBulkDate">적용</button>
      </div>
      <!-- 파싱 결과 -->
      <div id="mailParseResult"></div>
    </div>

    <div class="mail-popup-footer">
      <span class="mg-count" id="mgCount"></span>
      <button type="button" class="btn btn-secondary" id="btnMailGridClear" style="display:none">↩ 다시 입력</button>
      <button type="button" class="btn btn-primary"   id="btnMailGridImport" style="display:none">등록하기</button>
    </div>

  </div>
</div>

<!-- ━━━━━━━━━━━━━━━━  날짜 클릭 / 검색 모달  ━━━━━━━━━━━━━━━━ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" id="btnModalClose" title="닫기">×</button>
    </div>
    <div class="modal-search-bar" id="modalSearchBar">
      <input type="text" class="modal-search-input" id="modalSearchInput"
        placeholder="품명 · Lot번호 · 요청사항 · 부서 · 비고 검색…">
      <button class="modal-search-btn" id="btnModalDoSearch">검색</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- ━━━━━━━━━━━━━━━━  OLED 결과 상세보기 모달  ━━━━━━━━━━━━━━━━ -->
<div class="result-detail-overlay" id="resultDetailOverlay">
  <div class="result-detail-modal">
    <div class="result-detail-header">
      <div>
        <span class="result-detail-title" id="resultDetailTitle"></span>
        <div class="rd-block-label" id="resultDetailDate" style="margin-top:4px"></div>
      </div>
      <button type="button" class="result-detail-close" id="btnResultDetailClose">✕</button>
    </div>
    <div class="result-detail-body" id="resultDetailBody"></div>
    <div class="result-detail-footer" id="resultDetailFooter"></div>
  </div>
</div>

<!-- ━━━━━━━━━━━━━━━━  OLED 결과 입력 팝업  ━━━━━━━━━━━━━━━━ -->
<div class="result-popup-overlay" id="resultPopupOverlay">
  <div class="result-popup">
    <div class="result-popup-header">
      <div class="result-popup-title-row">
        <span class="result-popup-title">📊 OLED 소자평가 결과 입력</span>
        <span class="result-popup-lot" id="resultPopupLotLabel"></span>
      </div>
      <div class="result-popup-hint">CSV 파일 업로드 → ANALYZE → <b style="color:#10b981">이 Lot에 결과 저장</b></div>
      <button type="button" class="result-popup-close" id="btnResultPopupClose">✕</button>
    </div>
    <div class="result-popup-body">
      <iframe id="resultIframe" class="result-iframe" src="" allow="clipboard-read; clipboard-write"></iframe>
    </div>
  </div>
</div>

<script src="./app.js"></script>
</body>
</html>
