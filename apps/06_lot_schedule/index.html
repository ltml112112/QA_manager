<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="../../assets/css/global_style.css">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<title>소자평가 Lot test 일정 관리</title>
<style>

/* ── 전체 레이아웃 ───────────────────────────────────────────────────── */
html, body {
  height: 100%;
  overflow: hidden;
}

.app-layout {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── 개별 등록 팝업 ──────────────────────────────────────────────────── */
.indiv-popup-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 300;
  align-items: center;
  justify-content: center;
}
.indiv-popup-overlay.open { display: flex; }
.indiv-popup {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 360px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,.4);
}
.indiv-popup-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.indiv-popup-title { font-size: 13px; font-weight: 700; color: var(--text); }
.indiv-popup-close {
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 16px; padding: 2px 6px;
  border-radius: 4px; transition: background .15s;
}
.indiv-popup-close:hover { background: var(--surface-2); }
.indiv-popup-body {
  padding: 16px 18px;
  overflow-y: auto;
  flex: 1;
}

/* ── 캘린더 메인 ─────────────────────────────────────────────────────── */
.cal-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
  min-width: 0;
  position: relative;
}

/* 캘린더 상단 헤더 바 */
.cal-topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.cal-title-wrap {
  flex: 1;
  position: relative;
  text-align: center;
}

.cal-title {
  font-size: 21px;
  font-weight: 700;
  color: var(--text);
  text-align: center;
  letter-spacing: -0.01em;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  transition: background 0.15s;
}
.cal-title:hover { background: var(--surface-2); }
.cal-title .mp-caret { font-size: 13px; opacity: 0.55; }

/* ── 월 선택 피커 ────────────────────────────────────────────────────── */
.month-picker {
  position: absolute;
  top: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.18);
  z-index: 200;
  display: none;
  min-width: 230px;
}
.month-picker.open { display: block; }
.mp-year-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 10px;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.mp-arrow {
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  width: 26px; height: 26px;
  cursor: pointer;
  color: var(--text);
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-body);
  transition: background 0.15s;
}
.mp-arrow:hover { background: var(--surface-2); }
.mp-months {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
}
.mp-month-btn {
  padding: 7px 4px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  font-family: var(--font-body);
  text-align: center;
  transition: background 0.1s, border-color 0.1s, color 0.1s;
}
.mp-month-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.mp-month-btn.mp-cur { border-color: var(--accent); color: var(--accent); font-weight: 700; }

/* 네비게이션 버튼 공통 */
.nav-btn {
  width: 36px;
  height: 36px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, border-color 0.15s;
  font-family: var(--font-body);
  line-height: 1;
}
.nav-btn:hover {
  background: var(--surface-2);
  border-color: var(--border-hover);
}

/* 오늘 버튼 */
.btn-today {
  padding: 0 14px;
  height: 36px;
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-body);
  transition: background 0.15s;
  white-space: nowrap;
}
.btn-today:hover { background: var(--accent-glow); }

/* 등록·조회 버튼 (topbar용) */
.btn-reg-mail {
  padding: 0 16px;
  height: 36px;
  background: var(--accent);
  border: none;
  color: #fff;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-body);
  white-space: nowrap;
  transition: background 0.15s;
}
.btn-reg-mail:hover { background: var(--accent-hover); }
.btn-reg-indiv {
  padding: 0 14px;
  height: 36px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-body);
  white-space: nowrap;
  transition: background 0.15s, border-color 0.15s;
}
.btn-reg-indiv:hover { background: var(--surface-2); border-color: var(--border-hover); }
.btn-search {
  padding: 0 14px;
  height: 36px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-body);
  white-space: nowrap;
  margin-left: auto;   /* 우측 끝으로 */
  transition: background .15s, border-color .15s, color .15s;
}
.btn-search:hover { background: var(--surface-2); border-color: var(--accent); color: var(--accent); }


/* ── 달력 본문 영역 ──────────────────────────────────────────────────── */
.cal-body {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: outline 0.1s;
}
.cal-body.cal-drag-over {
  outline: 3px dashed var(--accent);
  outline-offset: -4px;
  background: rgba(190,0,57,.04);
}

/* 요일 헤더 */
.cal-dow-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-dow {
  text-align: center;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-muted);
  padding: 6px 0;
  letter-spacing: 0.02em;
}
.cal-dow.sun { color: #ef4444; }
.cal-dow.sat { color: #3b82f6; }

/* 달력 그리드 */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

/* 날짜 셀 */
.cal-cell {
  min-height: 90px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px 5px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  display: flex;
  flex-direction: column;
  gap: 2px;
  position: relative;
  overflow: hidden;  /* 넘치는 카드 숨김 */
}
.cal-cell:hover {
  border-color: var(--border-hover);
  background: var(--surface-2);
}

/* 다른 달 셀 */
.cal-cell.other-month {
  opacity: 0.35;
  pointer-events: none;
}

/* 오늘 셀 */
.cal-cell.is-today {
  border: 2px solid var(--accent);
}

/* 날짜 숫자 */
.cell-daynum {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  line-height: 1;
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  flex-shrink: 0;
}
.cell-daynum.sun { color: #ef4444; }
.cell-daynum.sat { color: #3b82f6; }

/* 오늘 날짜 강조 원 */
.cal-cell.is-today .cell-daynum {
  background: var(--accent);
  color: #fff;
  font-weight: 700;
}

/* "+N개" 더보기 텍스트 */
.cell-more {
  font-size: 10px;
  color: var(--text-faint);
  padding: 1px 4px;
  text-align: center;
  background: var(--surface-2);
  border-radius: 3px;
  cursor: pointer;
}

/* ── 달력 카드 ───────────────────────────────────────────────────────── */
.lot-card {
  border-radius: 3px;
  padding: 2px 5px 2px 7px;
  font-size: 11px;
  line-height: 1.5;
  border: 1px solid transparent;
  border-left-width: 3px;        /* 왼쪽 컬러 바 */
  cursor: pointer;
  transition: filter 0.1s, opacity 0.1s;
  position: relative;
  /* 1줄 말줄임 */
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
}
.lot-card:hover { filter: brightness(1.1); }

/* 합성생산 — 빨간색 */
.lot-card.dept-synth {
  background: rgba(239, 68, 68, 0.07);
  border-color: rgba(239, 68, 68, 0.2);
  border-left-color: #ef4444;
  color: #ef4444;
}

/* 정제생산/소자이관 */
.lot-card.dept-refine {
  background: var(--surface-2);
  border-color: var(--border);
  border-left-color: #9333ea;
}
.lot-card.dept-refine .c-purple { color: #9333ea; font-weight: 600; }
.lot-card.dept-refine .c-dark   { color: var(--text); }
.lot-card.dept-refine .c-blue   { color: #3b82f6; font-weight: 600; }

/* 완료된 카드 */
.lot-card.is-done {
  opacity: 0.35;
  text-decoration: line-through;
}

/* 시급 요청 카드 강조 */
.lot-card.is-urgent {
  border-style: dashed !important;
  border-left-style: solid !important;
}

/* ── D+N 뱃지 ────────────────────────────────────────────────────────── */
.dn-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 4px;
  border-radius: 3px;
  vertical-align: middle;
  margin-left: 3px;
  white-space: nowrap;
  line-height: 1.5;
}

/* 일반 — 회색 */
.dn-badge.dn-normal {
  background: var(--surface-2);
  color: var(--text-muted);
  border: 1px solid var(--border);
}

/* 7일 이상 또는 긴급 — 빨간색 */
.dn-badge.dn-alert {
  background: rgba(239, 68, 68, 0.15);
  color: #ef4444;
  border: 1px solid rgba(239, 68, 68, 0.35);
}

/* 완료 — 초록색 */
.dn-badge.dn-done {
  background: rgba(16, 185, 129, 0.12);
  color: #10b981;
  border: 1px solid rgba(16, 185, 129, 0.3);
  text-decoration: none;
}

/* 더보기 */
.cell-more {
  font-size: 10px;
  color: var(--text-faint);
  padding: 1px 4px;
  text-align: center;
  background: var(--surface-2);
  border-radius: 3px;
  cursor: pointer;
}

/* ── 폼 필드 그룹 ────────────────────────────────────────────────────── */
.form-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 12px;
}

.form-group:last-of-type { margin-bottom: 0; }

.fld-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.fld-label .req {
  color: var(--accent);
  margin-left: 2px;
}

/* textarea 크기 조절 허용 (세로만) */
textarea.form-input {
  resize: vertical;
  min-height: 64px;
  line-height: 1.5;
}

/* ── 긴급 출하 체크박스 행 ────────────────────────────────────────────── */
.urgent-row {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 10px 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  margin-bottom: 14px;
}
.urgent-row:hover {
  border-color: #ef4444;
  background: rgba(239, 68, 68, 0.05);
}
.urgent-row input[type="checkbox"] {
  width: 15px;
  height: 15px;
  accent-color: #ef4444;
  cursor: pointer;
  flex-shrink: 0;
}
.urgent-row label {
  font-size: 12px;
  font-weight: 600;
  color: #ef4444;
  cursor: pointer;
  flex: 1;
  line-height: 1.3;
}

/* ── 부서 라디오 칩 ──────────────────────────────────────────────────── */
.radio-group {
  display: flex;
  gap: 6px;
}
.radio-chip {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 9px 6px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  background: var(--surface-2);
  transition: border-color 0.15s, background 0.15s, color 0.15s;
  user-select: none;
}
.radio-chip input[type="radio"] { display: none; }
.radio-chip .chip-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  opacity: 0.45;
  transition: opacity 0.15s;
}
.radio-chip:hover { border-color: var(--border-hover); }
.radio-chip.checked.synth  { background: rgba(239,68,68,0.10); border-color: #ef4444; color: #ef4444; }
.radio-chip.checked.refine { background: rgba(147,51,234,0.10); border-color: #9333ea; color: #9333ea; }
.radio-chip.checked .chip-dot { opacity: 1; }

/* ── 폼 구분선 ───────────────────────────────────────────────────────── */
.form-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 4px 0 14px;
}

/* ── 모달 오버레이 ───────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s ease;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

/* 모달 박스 */
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  width: min(960px, calc(100vw - 40px));
  height: min(82vh, 860px);
  display: flex;
  flex-direction: column;
  transform: translateY(8px);
  transition: transform 0.18s ease;
}
.modal-overlay.open .modal-box {
  transform: translateY(0);
}

/* 검색 바 (검색 모드 전용) */
.modal-search-bar {
  display: none;
  padding: 10px 18px;
  border-bottom: 1px solid var(--border);
  gap: 8px;
  flex-shrink: 0;
}
.modal-box.search-mode .modal-search-bar { display: flex; }
.modal-search-input {
  flex: 1;
  height: 34px;
  padding: 0 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface-2);
  color: var(--text);
  font-size: 13px;
  font-family: var(--font-body);
  outline: none;
  transition: border-color .15s;
}
.modal-search-input:focus { border-color: var(--accent); }
.modal-search-input::placeholder { color: var(--text-faint); }
.modal-search-btn {
  height: 34px;
  padding: 0 16px;
  background: var(--accent);
  border: none;
  color: #fff;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-body);
  transition: background .15s;
}
.modal-search-btn:hover { background: var(--accent-hover); }

/* 모달 헤더 */
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.modal-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.modal-close {
  width: 26px;
  height: 26px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 20px;
  line-height: 1;
  cursor: pointer;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s;
}
.modal-close:hover { background: var(--surface-2); color: var(--text); }

/* 모달 바디 */
.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 14px 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.modal-body.is-2col {
  padding: 0;
  gap: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* 모달 섹션 제목 (부서 그룹) */
.modal-section-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
  margin-top: 4px;
}
.modal-section-title:first-child { margin-top: 0; }

/* ── 2컬럼 모달 레이아웃 ─────────────────────────────────────────────── */
.modal-2col {
  display: flex;
  flex: 1;
  min-height: 0;
}
.modal-col {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 7px;
  padding: 12px 14px;
  overflow-y: auto;
}
.modal-col + .modal-col {
  border-left: 1px solid var(--border);
}
.modal-col-hd {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding-bottom: 6px;
  border-bottom: 2px solid currentColor;
  flex-shrink: 0;
}
.modal-col-hd.hd-synth  { color: #ef4444; }
.modal-col-hd.hd-refine { color: #9333ea; }
@media (max-width: 580px) {
  .modal-2col { flex-direction: column; }
  .modal-col + .modal-col { border-left: none; border-top: 1px solid var(--border); }
}

/* ── 디테일 카드 (compact) ───────────────────────────────────────────── */
.detail-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex-shrink: 0;
}
.detail-card.is-done { opacity: 0.6; }
.detail-card.is-urgent {
  border: 2px solid #f59e0b;
  box-shadow: 0 0 0 1px rgba(245,158,11,0.25);
}

/* 메인 행: D+N 왼쪽 | 정보 오른쪽 */
.dc-main {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

/* D+N 블록 — 제거됨 (인라인 방식으로 변경) */

/* 날짜 메타 인라인 D-day */
.dc-meta .dm-dn { font-weight: 800; margin-left: 1px; }
.dc-meta .dm-dn.dm-transfer  { color: #ef4444; }

.dc-meta .dm-dn.dm-target    { color: #10b981; }

/* 정보 블록 */
.dc-info { flex: 1; min-width: 0; }

/* 재료명 + LOT 행 */
.dc-name-row {
  display: flex;
  align-items: baseline;
  gap: 7px;
  flex-wrap: wrap;
}
.dc-mat {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
}
.dc-lot {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 날짜 메타 */
.dc-meta {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 3px;
}
.dc-meta span {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
}
.dc-meta b {
  font-weight: 600;
  color: var(--text);
}

/* 요청사항 */
.dc-req {
  margin-top: 1px;
  font-size: 11px;
  color: var(--text-muted);
  font-style: italic;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 액션 버튼 영역 */
.detail-actions {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.btn-del {
  color: var(--danger) !important;
  border-color: rgba(239, 68, 68, 0.35) !important;
}
.btn-del:hover {
  background: rgba(239, 68, 68, 0.08) !important;
  border-color: var(--danger) !important;
}

/* 빈 상태 */
.modal-empty {
  text-align: center;
  padding: 24px 0;
  color: var(--text-faint);
  font-size: 13px;
}

/* ── 재료명 자동완성 ─────────────────────────────────────────────────── */
.ac-wrap {
  position: relative;
}

.ac-dropdown {
  position: absolute;
  top: calc(100% + 3px);
  left: 0;
  right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-md);
  z-index: 200;
  display: none;
  max-height: 180px;
  overflow-y: auto;
}
.ac-dropdown.open { display: block; }

.ac-item {
  padding: 7px 11px;
  font-size: 12px;
  color: var(--text);
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.ac-active {
  background: var(--surface-2);
  color: var(--accent);
}
.ac-item .ac-match { font-weight: 700; color: var(--accent); }

/* ── 요약 스트립 ─────────────────────────────────────────────────────── */
.summary-strip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.sum-chip {
  font-size: 13px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 10px;
  border: 1px solid transparent;
  cursor: default;
  white-space: nowrap;
}
.sum-chip.chip-total   { background: var(--surface-2); color: var(--text); border-color: var(--border); }
.sum-chip.chip-synth   { background: rgba(239,68,68,0.1);  color: #ef4444; }
.sum-chip.chip-proc    { background: rgba(16,185,129,0.1); color: #10b981; }
.sum-chip.chip-refine  { background: rgba(147,51,234,0.1); color: #9333ea; }
.sum-chip.chip-alert   { background: rgba(239,68,68,0.14); color: #ef4444; border-color: rgba(239,68,68,0.4); }
.sum-chip.chip-done    { background: rgba(16,185,129,0.1); color: #10b981; }
.sum-sep { color: var(--border); font-size: 14px; user-select: none; }

/* ── 범례 + 완료토글 바 ──────────────────────────────────────────────── */
.legend-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 6px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-muted);
}
.legend-dot {
  width: 9px;
  height: 9px;
  border-radius: 2px;
  flex-shrink: 0;
}
.legend-spacer { flex: 1; }

/* ── 수정 모드 취소 버튼 (기본 숨김) ────────────────────────────────── */
#btnCancelEdit {
  display: none;
  margin-top: 6px;
}


/* ── 메일 붙여넣기 팝업 ──────────────────────────────────────────────── */
.mail-popup-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 1100;
  align-items: center;
  justify-content: center;
}
.mail-popup-overlay.open { display: flex; }

.mail-popup {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 24px 64px rgba(0,0,0,.45);
  width: min(1440px, 99vw);
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.mail-popup-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.mail-popup-header-title {
  flex: 1;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.mail-popup-header-hint {
  font-size: 11.5px;
  color: var(--text-muted);
}
.mail-popup-close {
  background: none;
  border: none;
  font-size: 18px;
  color: var(--text-muted);
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  line-height: 1;
}
.mail-popup-close:hover { color: var(--text); background: var(--surface-2); }

.mail-popup-body {
  flex: 1;
  overflow: auto;
  padding: 14px 18px;
}

/* ── 드롭존 ──────────────────────────────────────────────────────────── */
.mail-dropzone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 48px 24px;
  text-align: center;
  background: var(--surface-2);
  cursor: default;
  transition: border-color .18s, background .18s;
  user-select: none;
}
.mail-dropzone.drag-over {
  border-color: var(--accent);
  background: rgba(190,0,57,.06);
}
.mail-dz-icon  { font-size: 36px; margin-bottom: 10px; }
.mail-dz-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
.mail-dz-hint  { font-size: 12px; color: var(--text-muted); line-height: 1.7; }
.mail-dz-hint b { color: var(--text); }
/* 날짜 일괄 적용 바 */
.mail-bulk-date-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 4px;
  margin-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.mail-bulk-date-bar label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
.mail-bulk-date-bar input[type="date"] { font-size: 12px; padding: 3px 6px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); color: var(--text); }
.mail-bulk-date-bar button { font-size: 12px; padding: 3px 12px; }

/* ── 파싱 결과 미리보기 ──────────────────────────────────────────────── */
.mail-preview-wrap { overflow-x: auto; margin-top: 4px; }
.mail-preview-table {
  border-collapse: collapse;
  width: 100%;
  font-size: 12px;
}
.mail-preview-table th {
  background: var(--surface-2);
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 600;
  padding: 6px 8px;
  border: 1px solid var(--border);
  white-space: nowrap;
}
.mail-preview-table td {
  padding: 5px 8px;
  border: 1px solid var(--border);
  vertical-align: middle;
}
.mail-preview-table td.td-chk  { text-align: center; width: 28px; }
.mail-preview-table td.td-dept { width: 96px; }
.mail-preview-table td.ref-col { color: var(--text-faint); font-size: 11px; }
/* 합성생산 배치 그룹 — 외곽선만 */
.mail-preview-table tr.batch-row { cursor: pointer; }
.mail-preview-table tr.batch-row:hover td { background: rgba(249,115,22,.04); }
.mail-preview-table tr.batch-active td { border-left: none; border-right: none; background: rgba(249,115,22,.05); }
.mail-preview-table tr.batch-active td:first-child { border-left: 2px solid #f97316; }
.mail-preview-table tr.batch-active td:last-child  { border-right: 2px solid #f97316; }
.mail-preview-table tr.batch-pos-first td { border-top: 2px solid #f97316; }
.mail-preview-table tr.batch-pos-last  td { border-bottom: 2px solid #f97316; }
.batch-sep td { border-top: 2px solid var(--border) !important; }
/* 편집 모드 */
.mail-preview-table.edit-mode .mp-edit:focus { background: rgba(190,0,57,.07); border-radius: 3px; }
.mail-preview-table:not(.edit-mode) .mp-edit { pointer-events: none; }
.mail-preview-table:not(.edit-mode) .mp-dept  { pointer-events: none; }
.mail-preview-table:not(.edit-mode) tr { cursor: pointer; }
.mp-edit-btn {
  font-size: 11px; padding: 3px 10px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--surface-2);
  color: var(--text-muted); cursor: pointer; transition: all .15s;
}
.mp-edit-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(190,0,57,.06); }
.mp-dept {
  font-size: 11.5px;
  padding: 2px 3px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  color: var(--text);
  width: 92px;
}
.mp-edit {
  width: 100%;
  box-sizing: border-box;
  border: none;
  background: transparent;
  color: var(--text);
  font-size: 12px;
  font-family: inherit;
  padding: 3px 4px;
  outline: none;
  min-width: 60px;
}
.mp-edit:focus { background: rgba(190,0,57,.07); border-radius: 3px; }
.mail-preview-table tbody tr.row-checked td {
  background: rgba(190,0,57,.06);
}
.mail-preview-table tbody tr.row-checked {
  outline: 1.5px solid var(--accent);
  outline-offset: -1px;
}
.mail-parse-warn {
  font-size: 12px;
  color: var(--warning);
  padding: 10px 14px;
  background: rgba(245,158,11,.08);
  border-radius: var(--radius-sm);
  margin-top: 8px;
}

.mail-popup-footer {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.mail-popup-footer .mg-count {
  flex: 1;
  font-size: 12.5px;
  color: var(--text-muted);
}

<div class="app-layout">

/* ── 날짜 유틸 ───────────────────────────────────────────────────────── */
function toDateStr(d) {
  return d.getFullYear() + '-'
    + String(d.getMonth() + 1).padStart(2, '0') + '-'
    + String(d.getDate()).padStart(2, '0');

    dept:         string,        // 합성생산 | 공정개발 | 정제생산/소자이관

    createdAt:    'YYYY-MM-DD',
  }
*/
function loadItems() {

}

function saveItems(items) {
  window._cachedItems = items;
  DB_REF.set(items.length ? items : null);
}

/* ── 실시간 동기화 ───────────────────────────────────────────────────── */
function setupRealtimeSync() {
  // Firebase가 비어있으면 localStorage 기존 데이터로 마이그레이션
  DB_REF.once('value', function (snap) {
    if (snap.val() === null) {
      var legacy = [];
      try { legacy = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch (e) {}
      if (legacy.length > 0) {
        DB_REF.set(legacy);
      }
    }
    // 실시간 구독 시작 (변경 즉시 재렌더)
    DB_REF.on('value', function (s) {
      var data = s.val();
      window._cachedItems = Array.isArray(data) ? data : [];
      renderCalendar();
    });
  });
}

/* ── D+N 계산 ────────────────────────────────────────────────────────── */
// 이관일 기준 경과 일수 반환 (D+0 = 이관 당일, 음수 = 미래)
// asOf: 기준일 문자열 (없으면 오늘)
function calcDN(transferDateStr, asOf) {
  if (!transferDateStr) return null;
  var t = new Date(transferDateStr + 'T00:00:00');
  var n = new Date((asOf || getTodayStr()) + 'T00:00:00');
  return Math.floor((n - t) / 86400000);
}

// 뱃지 HTML 반환
function dnBadgeHTML(item, asOf) {
  if (item.completed) {
    return '<span class="dn-badge dn-done">완료</span>';
  }
  var dn = calcDN(item.transferDate, asOf);
  if (dn === null) return '';

  var label = dn === 0 ? 'D+0' : (dn > 0 ? 'D+' + dn : 'D' + dn);
  var cls   = item.urgent ? 'dn-alert' : 'dn-normal';
  return '<span class="dn-badge ' + cls + '">' + label + '</span>';
}

/* ── HTML 이스케이프 ─────────────────────────────────────────────────── */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── 날짜 문자열 → M/D 형식 ──────────────────────────────────────────── */
function toMD(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T00:00:00');
  return (d.getMonth() + 1) + '/' + d.getDate();
}

/* ── 재료명 + Lot + 요청사항 조합 텍스트 생성 ───────────────────────── */
function buildMatText(item) {
  // 구 데이터: material 하나에 다 들어있는 경우 그대로 사용
  // 신 데이터: material + lot + request 조합
  var parts = [];
  if (item.material) parts.push(item.material);
  if (item.lot)      parts.push(item.lot);
  if (item.request)  parts.push(item.request);
  return parts.join(' ');
}

/* ── 카드 innerHTML 생성 (부서별 포맷 + D+N 뱃지) ────────────────────── */
function buildCardHTML(item, asOf) {
  var mat    = esc(buildMatText(item));
  var badge  = dnBadgeHTML(item, asOf);
  var urgent = item.urgent && !item.completed ? '⚡ ' : '';

  if (item.dept === '합성생산') {
    return urgent + mat + badge;
  }
  // 정제생산/소자이관 — (자주색 이관일) 검정재료명 <파란색 소자평가시작일> D+N
  var parts = '';
  if (item.transferDate) {
    parts += '<span class="c-purple">(' + toMD(item.transferDate) + ')</span> ';
  }
  parts += '<span class="c-dark">' + mat + '</span>';
  if (item.evalStart) {
    parts += ' <span class="c-blue">&lt;' + toMD(item.evalStart) + '&gt;</span>';
  }
  parts += badge;
  return parts;
}

/* ── 카드 DOM 요소 생성 ──────────────────────────────────────────────── */
function createCard(item, asOf) {
  var card = document.createElement('div');
  var cls  = 'lot-card';
  if (item.dept === '합성생산') cls += ' dept-synth';
  else                          cls += ' dept-refine';
  if (item.completed)           cls += ' is-done';
  if (item.urgent && !item.completed) cls += ' is-urgent';
  card.className = cls;
  card.innerHTML = buildCardHTML(item, asOf);
  card.dataset.id = item.id;
  // 호버 툴팁: 잘린 텍스트 전체 보기
  card.title = buildMatText(item);
  return card;
}

/* ── 달력 타이틀 업데이트 ────────────────────────────────────────────── */

/* ── 요약 스트립 렌더 ────────────────────────────────────────────────── */
function renderSummary(items) {
  var strip   = document.getElementById('summaryStrip');
  var active  = items.filter(function (it) { return !it.completed; });
  var synth   = active.filter(function (it) { return it.dept === '합성생산'; });
  var refine  = active.filter(function (it) { return it.dept === '정제생산/소자이관'; });
  var alerts  = active.filter(function (it) { return it.urgent; });
  var done    = items.filter(function (it) { return it.completed; });

  function chip(cls, filter, label) {
    return '<span class="sum-chip ' + cls + '" data-filter="' + filter + '" style="cursor:pointer">' + label + '</span>';
  }

  var html = chip('chip-total', 'active',  '진행 중 ' + active.length + '건')
           + '<span class="sum-sep">|</span>';
  if (synth.length)  html += chip('chip-synth',  'synth',  '합성 '      + synth.length);
  if (refine.length) html += chip('chip-refine', 'refine', '정제/소자 ' + refine.length);
  if (alerts.length) html += '<span class="sum-sep">|</span>'
                           + chip('chip-alert', 'alert', '⚡ 시급 ' + alerts.length);
  if (done.length)   html += '<span class="sum-sep">|</span>'
                           + chip('chip-done', 'done', '완료 ' + done.length);

  strip.innerHTML = html;

  // 칩 클릭 → 필터 모달
  strip.querySelectorAll('.sum-chip[data-filter]').forEach(function (el) {
    el.addEventListener('click', function () {
      openFilterModal(this.dataset.filter);
    });
  });
}

/* ── 달력 그리드 렌더링 ──────────────────────────────────────────────── */
var MAX_CARDS = 3; // 셀당 최대 표시 카드 수

function renderCalendar() {
  updateTitle();
  var grid  = document.getElementById('calGrid');
  grid.innerHTML = '';

  var items = loadItems();
  renderSummary(items);

  // 날짜별 아이템 인덱싱 — 항상 원래 이관일에만 표시
  var curTodayStr  = getTodayStr();
  var nowDate      = new Date();
  var isFutureMonth =
    curYear > nowDate.getFullYear() ||
    (curYear === nowDate.getFullYear() && curMonth > nowDate.getMonth());

  var byDate    = {};
  var byDateAsOf = {};
  items.forEach(function (it) {
    if (!it.transferDate) return;
    var displayDate = it.transferDate;
    var asOf;
    if (isFutureMonth) {
      // 미래 달 내 항목: projected D+N 기준일
      asOf = displayDate;
    }
    if (!byDate[displayDate]) {
      byDate[displayDate] = [];
      byDateAsOf[displayDate] = asOf;
    }
    byDate[displayDate].push(it);
  });

  var firstDay = new Date(curYear, curMonth, 1);
  var lastDay  = new Date(curYear, curMonth + 1, 0);
  var startDow = firstDay.getDay();
  var prevLast = new Date(curYear, curMonth, 0).getDate();
  var total    = Math.ceil((startDow + lastDay.getDate()) / 7) * 7;

  for (var i = 0; i < total; i++) {
    var dayNum, dateStr, otherMonth = false;

    if (i < startDow) {
      dayNum = prevLast - startDow + i + 1;
      var py = curMonth === 0 ? curYear - 1 : curYear;
      var pm = curMonth === 0 ? 11 : curMonth - 1;
      dateStr = py + '-' + String(pm + 1).padStart(2,'0') + '-' + String(dayNum).padStart(2,'0');
      otherMonth = true;
    } else if (i >= startDow + lastDay.getDate()) {
      dayNum = i - startDow - lastDay.getDate() + 1;
      var ny = curMonth === 11 ? curYear + 1 : curYear;
      var nm = curMonth === 11 ? 0 : curMonth + 1;
      dateStr = ny + '-' + String(nm + 1).padStart(2,'0') + '-' + String(dayNum).padStart(2,'0');
      otherMonth = true;
    } else {
      dayNum  = i - startDow + 1;
      dateStr = curYear + '-' + String(curMonth + 1).padStart(2,'0') + '-' + String(dayNum).padStart(2,'0');
    }

    var dow  = i % 7;
    var cell = document.createElement('div');
    cell.className = 'cal-cell'
      + (otherMonth ? ' other-month' : '')
      + (dateStr === curTodayStr ? ' is-today' : '');
    cell.dataset.date = dateStr;

    // 날짜 숫자
    var dn = document.createElement('div');
    dn.className = 'cell-daynum'
      + (dow === 0 ? ' sun' : '')
      + (dow === 6 ? ' sat' : '');
    dn.textContent = dayNum;
    cell.appendChild(dn);

    // ── 카드 배치 ──
    var dayItems = byDate[dateStr] || [];
    var toShow   = dayItems.slice(0, MAX_CARDS);
    var overflow = dayItems.length - toShow.length;

    var cellAsOf = byDateAsOf[dateStr];
    toShow.forEach(function (item) {
      var card = createCard(item, cellAsOf);
      (function(capturedItem) {
        card.addEventListener('click', function (e) {
          e.stopPropagation();
          if (capturedItem.completed) {
            openItemModal(capturedItem.id);
          } else {
            openModal(e.currentTarget.closest('.cal-cell').dataset.date);
          }
        });
      })(item);
      cell.appendChild(card);
    });

    if (overflow > 0) {
      var more = document.createElement('div');
      more.className = 'cell-more';
      more.textContent = '+' + overflow + '개 더보기';
      cell.appendChild(more);
    }

    // 셀 클릭 → 모달
    cell.addEventListener('click', function () {
      openModal(this.dataset.date);
    });

    grid.appendChild(cell);
  }
}

/* ── 재료명 자동완성 ─────────────────────────────────────────────────── */
function getUniqueMaterials() {
  var items = loadItems();
  var seen  = {};
  var list  = [];
  // 최신 등록 순으로 유니크 재료명 수집
  items.slice().reverse().forEach(function (it) {
    var name = (it.material || '').trim();
    if (name && !seen[name]) { seen[name] = true; list.push(name); }
  });
  return list;
}

function renderAC(query) {
  var drop  = document.getElementById('acDropdown');
  var names = getUniqueMaterials();
  var q     = query.trim().toLowerCase();
  var filtered = q
    ? names.filter(function (n) { return n.toLowerCase().indexOf(q) !== -1; })
    : names;

  if (!filtered.length) { drop.classList.remove('open'); return; }

  drop.innerHTML = filtered.map(function (n) {
    var display = esc(n);
    if (q) {
      // 매칭 부분 굵게 표시
      var idx = n.toLowerCase().indexOf(q);
      display = esc(n.slice(0, idx))
        + '<span class="ac-match">' + esc(n.slice(idx, idx + q.length)) + '</span>'
        + esc(n.slice(idx + q.length));
    }
    return '<div class="ac-item" data-val="' + esc(n) + '">' + display + '</div>';
  }).join('');
  drop.classList.add('open');

  drop.querySelectorAll('.ac-item').forEach(function (el) {
    el.addEventListener('mousedown', function (e) {
      e.preventDefault(); // blur 방지
      document.getElementById('fMaterial').value = this.dataset.val;
      drop.classList.remove('open');
    });
  });
}

(function initAC() {
  var input = document.getElementById('fMaterial');
  var drop  = document.getElementById('acDropdown');

  input.addEventListener('focus', function () { renderAC(this.value); });
  input.addEventListener('input', function () { renderAC(this.value); });
  input.addEventListener('blur',  function () {
    setTimeout(function () { drop.classList.remove('open'); }, 150);
  });
  // ESC로 드롭다운 닫기
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') drop.classList.remove('open');
  });
})();

/* ── 폼 기본값 세팅 (리셋 후 날짜 기본값 채우기) ────────────────────── */
function setFormDefaults() {

  document.getElementById('fTransferDate').value = t;
  document.getElementById('fEvalStart').value    = t;
}

/* ── 폼 리셋 헬퍼 ────────────────────────────────────────────────────── */
function resetForm() {
  document.getElementById('scheduleForm').reset();
  document.getElementById('fEditId').value = '';
  document.getElementById('btnSubmit').textContent = '등록하기';
  document.getElementById('btnCancelEdit').style.display = 'none';

/* ── 부서 라디오 시각 상태 동기화 ───────────────────────────────────── */
function updateDeptRadio() {
  document.querySelectorAll('input[name="fDept"]').forEach(function(r) {
    r.closest('.radio-chip').classList.toggle('checked', r.checked);
  });
}
document.querySelectorAll('input[name="fDept"]').forEach(function(r) {
  r.addEventListener('change', updateDeptRadio);
});

/* ── 폼 → 아이템 객체 변환 ───────────────────────────────────────────── */
function readFormData() {
  var deptRadio = document.querySelector('input[name="fDept"]:checked');
  return {
    dept:         deptRadio ? deptRadio.value : '',
    material:     document.getElementById('fMaterial').value.trim(),
    lot:          document.getElementById('fLot').value.trim(),
    request:      document.getElementById('fRequest').value.trim(),
    transferDate: document.getElementById('fTransferDate').value,
    evalStart:    document.getElementById('fEvalStart').value,
    evalTarget:   document.getElementById('fEvalTarget').value,
    urgent:       document.getElementById('fUrgent').checked,
  };
}

/* ── 폼 ← 아이템 객체 채우기 (수정 모드) ────────────────────────────── */
function fillForm(item) {
  document.getElementById('fEditId').value          = item.id;
  document.querySelectorAll('input[name="fDept"]').forEach(function(r) {
    r.checked = (r.value === item.dept);
  });
  updateDeptRadio();
  document.getElementById('fMaterial').value        = item.material || '';
  document.getElementById('fLot').value             = item.lot      || '';
  document.getElementById('fRequest').value         = item.request  || '';
  document.getElementById('fTransferDate').value    = item.transferDate;
  document.getElementById('fEvalStart').value       = item.evalStart  || '';
  document.getElementById('fEvalTarget').value      = item.evalTarget || '';
  document.getElementById('fUrgent').checked        = !!item.urgent;
  document.getElementById('btnSubmit').textContent  = '수정 저장';
  document.getElementById('btnCancelEdit').style.display = 'block';
  openIndivPopup();
}

/* ── 폼 제출 (신규 등록 + 수정 저장 통합) ───────────────────────────── */
document.getElementById('scheduleForm').addEventListener('submit', function (e) {
  e.preventDefault();

  var fd = readFormData();
  if (!fd.dept || !fd.material || !fd.transferDate) {
    alert('부서/상태, 재료명, 이관일은 필수 항목입니다.');
    return;
  }

  var items  = loadItems();
  var editId = document.getElementById('fEditId').value;

  if (editId) {
    // ── 수정 ──
    var idx = items.findIndex(function (it) { return it.id === editId; });
    if (idx !== -1) {
      // completed / completedAt 은 유지
      items[idx] = Object.assign(items[idx], fd);
    }
  } else {
    // ── 신규 등록 ──
    var newItem = Object.assign(fd, {
      id:          genId(),
      completed:   false,
      completedAt: null,
      createdAt:   getTodayStr(),
    });
    items.push(newItem);

    // 등록된 달로 이동
    var d = new Date(fd.transferDate + 'T00:00:00');
    if (!isNaN(d)) {
      curYear  = d.getFullYear();
      curMonth = d.getMonth();
    }
  }

  saveItems(items);
  resetForm();
  closeIndivPopup();
  renderCalendar();
});

document.getElementById('btnCancelEdit').addEventListener('click', function () {
  resetForm();
  closeIndivPopup();
});

/* ── 모달 열기/닫기 ──────────────────────────────────────────────────── */
var modalCurrentDate   = null;
var modalCurrentFilter = null;

function openModal(dateStr) {
  modalCurrentDate   = dateStr;
  modalCurrentFilter = null;
  var overlay = document.getElementById('modalOverlay');
  var titleEl = document.getElementById('modalTitle');
  var bodyEl  = document.getElementById('modalBody');
  var items   = loadItems();
  var curT    = getTodayStr();
  var isToday = (dateStr === curT);

  bodyEl.innerHTML = '';
  bodyEl.classList.remove('is-2col');

  if (isToday) {
    // 오늘 클릭 → 합성생산: 오늘 이관만 / 정제생산: 전체 미완료
    titleEl.textContent = '📊 오늘 기준 전체 진행 현황';
    var active = items.filter(function (it) {
      if (it.dept === '합성생산') return it.transferDate === curT && !it.completed;
      return !it.completed;
    });
    active.sort(function (a, b) {
      return (calcDN(b.transferDate) || 0) - (calcDN(a.transferDate) || 0);
    });
    if (!active.length) {
      bodyEl.innerHTML = '<div class="modal-empty">진행 중인 항목이 없습니다.</div>';
    } else {
      renderBodyTwoCols(bodyEl, active, null);
    }
  } else {
    var d      = new Date(dateStr + 'T00:00:00');
    var lbl    = (d.getMonth() + 1) + '월 ' + d.getDate() + '일';
    var isPast = dateStr < curT;

    // 합성생산: 클릭 당일 이관만 / 정제생산: 그 날 기준 활성 전체
    var activeOnDate = items.filter(function (it) {
      if (it.dept === '합성생산') return it.transferDate === dateStr && !it.completed;
      if (it.transferDate > dateStr) return false;
      if (!it.completed) return true;
      return it.completedAt && it.completedAt > dateStr;
    });
    activeOnDate.sort(function (a, b) {
      return (calcDN(b.transferDate, dateStr) || 0) - (calcDN(a.transferDate, dateStr) || 0);
    });

    if (!activeOnDate.length) {
      titleEl.textContent = lbl + ' 이관/진행 항목';
      bodyEl.innerHTML = '<div class="modal-empty">이 날짜에 등록된 항목이 없습니다.</div>';
    } else {
      titleEl.textContent = lbl + (isPast ? ' 기준 현황' : ' 이관 예정');
      renderBodyTwoCols(bodyEl, activeOnDate, dateStr);
    }
  }

  overlay.classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('modalBody').classList.remove('is-2col');
  document.getElementById('modalBox').classList.remove('search-mode');
  document.getElementById('modalSearchInput').value = '';
  modalCurrentDate   = null;
  modalCurrentFilter = null;
}

/* ── 필터 모달 (요약 스트립 칩 클릭) ────────────────────────────────── */
var FILTER_TITLES = {
  active: '진행 중 전체', synth: '합성생산 진행 중',
  refine: '정제생산/소자이관 진행 중', alert: '⚡ 시급', done: '소자평가 완료 목록',
};

function openFilterModal(filter) {
  var items  = loadItems();
  var active = items.filter(function (it) { return !it.completed; });
  var filtered;
  switch (filter) {
    case 'synth':  filtered = active.filter(function (it) { return it.dept === '합성생산'; }); break;
    case 'refine': filtered = active.filter(function (it) { return it.dept === '정제생산/소자이관'; }); break;
    case 'alert':  filtered = active.filter(function (it) { return it.urgent; }); break;
    case 'done':   filtered = items.filter(function (it)  { return it.completed; }); break;
    default:       filtered = active;
  }
  filtered = filtered.slice().sort(function (a, b) {
    return (calcDN(b.transferDate) || 0) - (calcDN(a.transferDate) || 0);
  });

  modalCurrentDate   = null;
  modalCurrentFilter = filter;
  var overlay = document.getElementById('modalOverlay');
  var bodyEl  = document.getElementById('modalBody');
  document.getElementById('modalTitle').textContent =
    (FILTER_TITLES[filter] || '목록') + ' (' + filtered.length + '건)';
  bodyEl.innerHTML = '';
  bodyEl.classList.remove('is-2col');

  if (!filtered.length) {
    bodyEl.innerHTML = '<div class="modal-empty">해당 항목이 없습니다.</div>';
  } else if (filter === 'active' || filter === 'alert') {
    // 합성/정제 2컬럼
    renderBodyTwoCols(bodyEl, filtered, null);
  } else {
    filtered.forEach(function (it) { bodyEl.appendChild(buildDetailCard(it)); });
  }
  overlay.classList.add('open');
}

/* ── 검색 모드 (기존 modal-box 재사용) ──────────────────────────────── */
function openSearchModal() {
  var box     = document.getElementById('modalBox');
  var overlay = document.getElementById('modalOverlay');
  var bodyEl  = document.getElementById('modalBody');
  var input   = document.getElementById('modalSearchInput');
  modalCurrentDate   = null;
  modalCurrentFilter = null;
  box.classList.add('search-mode');
  document.getElementById('modalTitle').textContent = '🔍 항목 조회';
  bodyEl.innerHTML = '<div class="modal-empty">검색어를 입력하고 검색 버튼을 누르세요.</div>';
  bodyEl.classList.remove('is-2col');
  overlay.classList.add('open');
  setTimeout(function () { input.focus(); }, 120);
}

function runModalSearch() {
  var q      = document.getElementById('modalSearchInput').value.trim().toLowerCase();
  var bodyEl = document.getElementById('modalBody');
  bodyEl.innerHTML = '';
  bodyEl.classList.remove('is-2col');

  if (!q) {
    bodyEl.innerHTML = '<div class="modal-empty">검색어를 입력하고 검색 버튼을 누르세요.</div>';
    return;
  }

  var items = loadItems();
  var filtered = items.filter(function (it) {
    return [it.material, it.lot, it.request, it.dept, it.comment || ''].some(function (v) {
      return (v || '').toLowerCase().indexOf(q) !== -1;
    });
  });
  filtered.sort(function (a, b) {
    return (calcDN(b.transferDate) || 0) - (calcDN(a.transferDate) || 0);
  });

  document.getElementById('modalTitle').textContent =
    '🔍 "' + document.getElementById('modalSearchInput').value.trim() + '" — ' + filtered.length + '건';

  if (!filtered.length) {
    bodyEl.innerHTML = '<div class="modal-empty">일치하는 항목이 없습니다.</div>';
  } else {
    renderBodyTwoCols(bodyEl, filtered, null);
  }
}

document.getElementById('btnOpenSearch').addEventListener('click', openSearchModal);
document.getElementById('btnModalDoSearch').addEventListener('click', runModalSearch);
document.getElementById('modalSearchInput').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') runModalSearch();
});

/* ── 단일 아이템 모달 (완료 카드 클릭) ──────────────────────────────── */
function openItemModal(itemId) {
  var items  = loadItems();
  var item   = items.find(function (it) { return it.id === itemId; });
  if (!item) return;

  modalCurrentDate = item.transferDate; // refreshModal용 저장
  var overlay = document.getElementById('modalOverlay');
  var titleEl = document.getElementById('modalTitle');
  var bodyEl  = document.getElementById('modalBody');

  var mat = buildMatText(item);
  titleEl.textContent = (item.completed ? '✓ 완료 — ' : '') + (mat.length > 30 ? mat.slice(0, 30) + '…' : mat);
  bodyEl.innerHTML = '';
  bodyEl.classList.remove('is-2col');
  bodyEl.appendChild(buildDetailCard(item));
  overlay.classList.add('open');
}

/* ── 2컬럼 렌더링 헬퍼 ───────────────────────────────────────────────── */
// allItems를 합성/정제 두 컬럼으로 렌더링. 한 종류만 있으면 단일 컬럼.
// 각 컬럼 내부: 미완료 먼저 (D+N 내림차순), 완료 나중.
function renderBodyTwoCols(bodyEl, allItems, asOf) {
  function sortCol(arr) {
    return arr.slice().sort(function (a, b) {
      if (a.completed && !b.completed) return 1;
      if (!a.completed && b.completed) return -1;
      return (calcDN(b.transferDate, asOf) || 0) - (calcDN(a.transferDate, asOf) || 0);
    });
  }

  var synth  = sortCol(allItems.filter(function (it) { return it.dept === '합성생산'; }));
  var refine = sortCol(allItems.filter(function (it) { return it.dept === '정제생산/소자이관'; }));

  if (!synth.length && !refine.length) {
    bodyEl.innerHTML = '<div class="modal-empty">해당 항목이 없습니다.</div>';
    return;
  }

  // 항상 2컬럼 (한 쪽이 0건이어도 열 유지)
  bodyEl.classList.add('is-2col');
  var twoCol = document.createElement('div');
  twoCol.className = 'modal-2col';

  var lCol = document.createElement('div');
  lCol.className = 'modal-col';
  var lHd = document.createElement('div');
  lHd.className = 'modal-col-hd hd-synth';
  lHd.textContent = '합성생산 ' + synth.length + '건';
  lCol.appendChild(lHd);
  if (synth.length) {
    synth.forEach(function (it) { lCol.appendChild(buildDetailCard(it, asOf)); });
  } else {
    var lEmpty = document.createElement('div');
    lEmpty.className = 'modal-empty';
    lEmpty.textContent = '해당 항목 없음';
    lCol.appendChild(lEmpty);
  }
  twoCol.appendChild(lCol);

  var rCol = document.createElement('div');
  rCol.className = 'modal-col';
  var rHd = document.createElement('div');
  rHd.className = 'modal-col-hd hd-refine';
  rHd.textContent = '정제생산/소자이관 ' + refine.length + '건';
  rCol.appendChild(rHd);
  if (refine.length) {
    refine.forEach(function (it) { rCol.appendChild(buildDetailCard(it, asOf)); });
  } else {
    var rEmpty = document.createElement('div');
    rEmpty.className = 'modal-empty';
    rEmpty.textContent = '해당 항목 없음';
    rCol.appendChild(rEmpty);
  }
  twoCol.appendChild(rCol);

  bodyEl.appendChild(twoCol);
}

/* ── 모달 디테일 카드 생성 (compact) ─────────────────────────────────── */
// asOf: 기준일 문자열 (없으면 오늘) — 과거 날짜 클릭 시 그 날 기준 경과일 표시
function buildDetailCard(item, asOf) {
  var wrap = document.createElement('div');
  wrap.className = 'detail-card' + (item.completed ? ' is-done' : '') + (item.urgent && !item.completed ? ' is-urgent' : '');
  wrap.dataset.id = item.id;

  // ── 메인 행 ──
  var main = document.createElement('div');
  main.className = 'dc-main';

  // 정보 블록
  var info = document.createElement('div');
  info.className = 'dc-info';

  // 재료명 + LOT 행
  var nameRow = document.createElement('div');
  nameRow.className = 'dc-name-row';

  var matEl = document.createElement('span');
  matEl.className = 'dc-mat';
  matEl.textContent = item.material || '-';
  nameRow.appendChild(matEl);

  if (item.lot) {
    var lotEl = document.createElement('span');
    lotEl.className = 'dc-lot';
    lotEl.textContent = item.lot;
    lotEl.title = item.lot;
    nameRow.appendChild(lotEl);
  }
  info.appendChild(nameRow);

  // 날짜 메타 (정제/소자이관 미완료는 날짜 옆에 D+N 인라인 표시)
  var meta = document.createElement('div');
  meta.className = 'dc-meta';
  var ref = asOf || getTodayStr();
  var showDN = item.dept !== '합성생산' && !item.completed;

  function inlineDN(dateStr, cls) {
    if (!showDN || !dateStr) return '';
    var dn = calcDN(dateStr, ref);
    if (dn === null) return '';
    var lbl = dn === 0 ? 'D+0' : (dn > 0 ? 'D+' + dn : 'D' + dn);
    return ' <span class="dm-dn ' + cls + '">(' + lbl + ')</span>';
  }
  function inlineDTarget(dateStr) {
    if (!showDN || !dateStr) return '';
    var diff = Math.round((new Date(dateStr + 'T00:00:00') - new Date(ref + 'T00:00:00')) / 86400000);
    var lbl = diff === 0 ? 'D-DAY' : (diff > 0 ? 'D-' + diff : 'D+' + Math.abs(diff));
    return ' <span class="dm-dn dm-target">(' + lbl + ')</span>';
  }

  var mh = '<span>이관 <b>' + toMD(item.transferDate) + '</b>' + inlineDN(item.transferDate, 'dm-transfer') + '</span>';
  if (item.evalStart)  mh += '<span>평가시작 <b>' + toMD(item.evalStart) + '</b>' + inlineDN(item.evalStart, 'dm-evalstart') + '</span>';
  if (item.evalTarget) mh += '<span>요청일 <b>'  + toMD(item.evalTarget) + '</b>' + inlineDTarget(item.evalTarget) + '</span>';
  if (item.completed && item.completedAt) mh += '<span>완료일 <b>' + toMD(item.completedAt) + '</b></span>';
  meta.innerHTML = mh;
  info.appendChild(meta);

  // 요청사항
  if (item.request) {
    var reqEl = document.createElement('div');
    reqEl.className = 'dc-req';
    reqEl.textContent = item.request;
    reqEl.title = item.request;
    info.appendChild(reqEl);
  }

  main.appendChild(info);
  wrap.appendChild(main);

  // ── 액션 버튼 ──
  var actions = document.createElement('div');
  actions.className = 'detail-actions';

  // 정제생산/소자이관만 완료 처리
  var isRefine = item.dept === '정제생산/소자이관';
  if (isRefine) {
    if (!item.completed) {
      var btnDone = document.createElement('button');
      btnDone.className = 'btn btn-success btn-sm';
      btnDone.textContent = '✓ 소자평가 완료';
      btnDone.addEventListener('click', function () { markComplete(item.id); });
      actions.appendChild(btnDone);
    } else {
      var btnUndo = document.createElement('button');
      btnUndo.className = 'btn btn-secondary btn-sm';
      btnUndo.textContent = '↩ 완료 취소';
      btnUndo.addEventListener('click', function () { markUncomplete(item.id); });
      actions.appendChild(btnUndo);
    }
  }

  var btnEdit = document.createElement('button');
  btnEdit.className = 'btn btn-secondary btn-sm';
  btnEdit.textContent = '✎ 수정';
  btnEdit.addEventListener('click', function () { editInModal(item.id, wrap); });
  actions.appendChild(btnEdit);

  var btnDel = document.createElement('button');
  btnDel.className = 'btn btn-secondary btn-sm btn-del';
  btnDel.textContent = '✕ 삭제';
  btnDel.addEventListener('click', function () { deleteItem(item.id); });
  actions.appendChild(btnDel);

  wrap.appendChild(actions);
  return wrap;
}

/* ── 수정 (왼쪽 패널 — 사용되지 않지만 외부 호출 호환 유지) ─────────── */
function editItem(id) {
  var items = loadItems();
  var item  = items.find(function (it) { return it.id === id; });
  if (!item) return;
  closeModal();
  fillForm(item);
}

/* ── 인라인 수정 (모달 내 카드 → 폼 변환) ───────────────────────────── */
function editInModal(itemId, cardEl) {
  var items = loadItems();
  var item  = items.find(function (it) { return it.id === itemId; });
  if (!item) return;

  var parent = cardEl.parentNode;

  var form = document.createElement('div');
  form.className = 'detail-card';
  form.style.gap = '8px';
  form.style.background = 'var(--surface)';
  form.style.borderColor = 'var(--accent)';

  // 재료명 + LOT
  var r1 = document.createElement('div');
  r1.style.cssText = 'display:flex;gap:6px;';
  var inpMat = document.createElement('input');
  inpMat.className = 'form-input';
  inpMat.style.cssText = 'flex:1;font-size:13px;padding:5px 8px;';
  inpMat.placeholder = '재료명';
  inpMat.value = item.material || '';
  var inpLot = document.createElement('input');
  inpLot.className = 'form-input';
  inpLot.style.cssText = 'flex:1;font-size:13px;padding:5px 8px;';
  inpLot.placeholder = 'LOT 번호';
  inpLot.value = item.lot || '';
  r1.appendChild(inpMat);
  r1.appendChild(inpLot);
  form.appendChild(r1);

  // 요청사항
  var inpReq = document.createElement('input');
  inpReq.className = 'form-input';
  inpReq.style.cssText = 'font-size:12px;padding:4px 8px;';
  inpReq.placeholder = '요청사항';
  inpReq.value = item.request || '';
  form.appendChild(inpReq);

  // 날짜 row
  var r2 = document.createElement('div');
  r2.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;';
  function mkD(val, lbl) {
    var w = document.createElement('div');
    w.style.cssText = 'display:flex;flex-direction:column;gap:2px;flex:1;min-width:100px;';
    var l = document.createElement('div');
    l.style.cssText = 'font-size:10px;color:var(--text-muted);';
    l.textContent = lbl;
    var i = document.createElement('input');
    i.type = 'date'; i.className = 'form-input';
    i.style.cssText = 'font-size:12px;padding:4px 6px;';
    i.min = '2000-01-01';
    i.max = '2099-12-31';
    i.value = val || '';
    w.appendChild(l); w.appendChild(i);
    return { w: w, i: i };
  }
  var dTf = mkD(item.transferDate, '이관일');
  var dEs = mkD(item.evalStart,    '평가시작');
  var dEt = mkD(item.evalTarget,   '완료 요청일');
  r2.appendChild(dTf.w); r2.appendChild(dEs.w); r2.appendChild(dEt.w);
  form.appendChild(r2);

  // 시급 + 저장/취소
  var r3 = document.createElement('div');
  r3.style.cssText = 'display:flex;align-items:center;gap:8px;flex-wrap:wrap;';
  var ckId  = 'ck_' + itemId;
  var ckUrg = document.createElement('input');
  ckUrg.type = 'checkbox'; ckUrg.id = ckId; ckUrg.checked = !!item.urgent;
  var lbUrg = document.createElement('label');
  lbUrg.htmlFor = ckId;
  lbUrg.style.cssText = 'font-size:12px;cursor:pointer;user-select:none;';
  lbUrg.textContent = '⚡ 시급 요청';
  r3.appendChild(ckUrg); r3.appendChild(lbUrg);
  var sp = document.createElement('div'); sp.style.flex = '1';
  r3.appendChild(sp);

  var btnSave = document.createElement('button');
  btnSave.className = 'btn btn-primary btn-sm';
  btnSave.textContent = '저장';
  btnSave.addEventListener('click', function () {
    var all = loadItems();
    var idx = -1;
    for (var i = 0; i < all.length; i++) { if (all[i].id === itemId) { idx = i; break; } }
    if (idx === -1) return;
    all[idx].material    = inpMat.value.trim();
    all[idx].lot         = inpLot.value.trim();
    all[idx].request     = inpReq.value.trim();
    all[idx].transferDate = dTf.i.value;
    all[idx].evalStart   = dEs.i.value;
    all[idx].evalTarget  = dEt.i.value;
    all[idx].urgent      = ckUrg.checked;
    saveItems(all);
    renderCalendar();
    if (parent) parent.replaceChild(buildDetailCard(all[idx]), form);
  });

  var btnCancel = document.createElement('button');
  btnCancel.className = 'btn btn-secondary btn-sm';
  btnCancel.textContent = '취소';
  btnCancel.addEventListener('click', function () {
    if (parent) parent.replaceChild(cardEl, form);
  });

  r3.appendChild(btnSave); r3.appendChild(btnCancel);
  form.appendChild(r3);

  if (parent) parent.replaceChild(form, cardEl);
  inpMat.focus();
}

/* ── 삭제 ────────────────────────────────────────────────────────────── */
function deleteItem(id) {
  if (!confirm('이 항목을 삭제하시겠습니까?')) return;
  var items = loadItems().filter(function (it) { return it.id !== id; });
  saveItems(items);
  renderCalendar();
  refreshModal();
}

/* ── 완료 / 완료 취소 처리 ───────────────────────────────────────────── */
function refreshModal() {
  if (modalCurrentDate)   openModal(modalCurrentDate);
  else if (modalCurrentFilter) openFilterModal(modalCurrentFilter);
}

function markComplete(id) {
  var items = loadItems();
  var item  = items.find(function (it) { return it.id === id; });
  if (!item) return;
  item.completed   = true;
  item.completedAt = getTodayStr();
  saveItems(items);
  renderCalendar();
  refreshModal();
}

function markUncomplete(id) {
  var items = loadItems();
  var item  = items.find(function (it) { return it.id === id; });
  if (!item) return;
  item.completed   = false;
  item.completedAt = null;
  saveItems(items);
  renderCalendar();
  refreshModal();
}

document.getElementById('btnModalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', function (e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function (e) {

});


/* ── 월/년 선택 피커 ─────────────────────────────────────────────────── */
var mpOpen = false;
var mpYear = curYear;

function renderMonthPicker() {
  document.getElementById('mpYearLabel').textContent = mpYear + '년';
  var months = document.getElementById('mpMonths');
  months.innerHTML = '';
  var names = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  names.forEach(function(name, i) {
    var btn = document.createElement('button');
    btn.className = 'mp-month-btn' + (mpYear === curYear && i === curMonth ? ' mp-cur' : '');
    btn.textContent = name;
    btn.addEventListener('click', function() {
      curYear  = mpYear;
      curMonth = i;
      renderCalendar();
      closeMonthPicker();
    });
    months.appendChild(btn);
  });
}

function openMonthPicker() {
  mpYear = curYear;
  renderMonthPicker();
  document.getElementById('monthPicker').classList.add('open');
  mpOpen = true;
}

function closeMonthPicker() {
  document.getElementById('monthPicker').classList.remove('open');
  mpOpen = false;
}

document.getElementById('calTitle').addEventListener('click', function(e) {
  e.stopPropagation();
  if (mpOpen) closeMonthPicker(); else openMonthPicker();
});
document.getElementById('mpPrevYear').addEventListener('click', function(e) {
  e.stopPropagation(); mpYear--; renderMonthPicker();
});
document.getElementById('mpNextYear').addEventListener('click', function(e) {
  e.stopPropagation(); mpYear++; renderMonthPicker();
});
document.addEventListener('click', function() { if (mpOpen) closeMonthPicker(); });
document.getElementById('monthPicker').addEventListener('click', function(e) { e.stopPropagation(); });

// 피커가 열려 있을 때 renderCalendar 호출 시 현재 월 강조 갱신
var _origRenderCalendar = renderCalendar;
renderCalendar = function() {
  _origRenderCalendar();
  if (mpOpen) renderMonthPicker(); // 선택 강조 동기화
};

/* ── 휠 스크롤로 월 이동 ────────────────────────────────────────────── */
document.querySelector('.cal-main').addEventListener('wheel', function(e) {
  // 모달 열려 있으면 스크롤 무시
  if (document.getElementById('modalOverlay').classList.contains('open')) return;
  e.preventDefault();
  if (e.deltaY > 0) {
    curMonth++; if (curMonth > 11) { curMonth = 0; curYear++; }
  } else {
    curMonth--; if (curMonth < 0) { curMonth = 11; curYear--; }
  }
  renderCalendar();
}, { passive: false });
