<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="../../assets/css/global_style.css">
<title>소자평가 Lot test 일정 관리</title>
<style>

/* ── 전체 레이아웃 ───────────────────────────────────────────────────── */
html, body {
  height: 100%;
  overflow: hidden;
}

.app-layout {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── 좌측 폼 패널 ────────────────────────────────────────────────────── */
.form-panel {
  width: 280px;
  min-width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  transition: width 0.25s ease, min-width 0.25s ease;
}

.form-panel.collapsed {
  width: 0;
  min-width: 0;
}

/* 패널 내부 (width 고정 — 접힐 때 콘텐츠가 안 찌그러지게) */
.form-panel-inner {
  width: 280px;
  padding: 0 16px 16px;
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.form-panel-header {
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 1;
  padding: 14px 0 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.form-panel-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  flex: 1;
}

/* ── 우측 캘린더 메인 ────────────────────────────────────────────────── */
.cal-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
  min-width: 0;
}

/* 캘린더 상단 헤더 바 */
.cal-topbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.cal-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  flex: 1;
  text-align: center;
  letter-spacing: -0.01em;
}

/* 네비게이션 버튼 공통 */
.nav-btn {
  width: 30px;
  height: 30px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, border-color 0.15s;
  font-family: var(--font-body);
  line-height: 1;
}
.nav-btn:hover {
  background: var(--surface-2);
  border-color: var(--border-hover);
}

/* 오늘 버튼 */
.btn-today {
  padding: 0 11px;
  height: 30px;
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font-body);
  transition: background 0.15s;
  white-space: nowrap;
}
.btn-today:hover { background: var(--accent-glow); }

/* 폼 토글 버튼 */
.btn-toggle-form {
  padding: 0 10px;
  height: 30px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 11px;
  font-family: var(--font-body);
  white-space: nowrap;
  transition: background 0.15s;
}
.btn-toggle-form:hover { background: var(--surface-2); }

/* ── 달력 본문 영역 ──────────────────────────────────────────────────── */
.cal-body {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* 요일 헤더 */
.cal-dow-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-dow {
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  padding: 4px 0;
  letter-spacing: 0.02em;
}
.cal-dow.sun { color: #ef4444; }
.cal-dow.sat { color: #3b82f6; }

/* 달력 그리드 */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

/* 날짜 셀 */
.cal-cell {
  min-height: 90px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px 5px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  display: flex;
  flex-direction: column;
  gap: 2px;
  position: relative;
  overflow: hidden;  /* 넘치는 카드 숨김 */
}
.cal-cell:hover {
  border-color: var(--border-hover);
  background: var(--surface-2);
}

/* 다른 달 셀 */
.cal-cell.other-month {
  opacity: 0.35;
  pointer-events: none;
}

/* 오늘 셀 */
.cal-cell.is-today {
  border: 2px solid var(--accent);
}

/* 날짜 숫자 */
.cell-daynum {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  line-height: 1;
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  flex-shrink: 0;
}
.cell-daynum.sun { color: #ef4444; }
.cell-daynum.sat { color: #3b82f6; }

/* 오늘 날짜 강조 원 */
.cal-cell.is-today .cell-daynum {
  background: var(--accent);
  color: #fff;
  font-weight: 700;
}

/* "+N개" 더보기 텍스트 */
.cell-more {
  font-size: 10px;
  color: var(--text-faint);
  padding: 1px 4px;
  text-align: center;
  background: var(--surface-2);
  border-radius: 3px;
  cursor: pointer;
}

/* ── 달력 카드 ───────────────────────────────────────────────────────── */
.lot-card {
  border-radius: 3px;
  padding: 2px 5px 2px 7px;
  font-size: 11px;
  line-height: 1.5;
  border: 1px solid transparent;
  border-left-width: 3px;        /* 왼쪽 컬러 바 */
  cursor: pointer;
  transition: filter 0.1s, opacity 0.1s;
  position: relative;
  /* 1줄 말줄임 */
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
}
.lot-card:hover { filter: brightness(1.1); }

/* 합성생산 — 빨간색 */
.lot-card.dept-synth {
  background: rgba(239, 68, 68, 0.07);
  border-color: rgba(239, 68, 68, 0.2);
  border-left-color: #ef4444;
  color: #ef4444;
}

/* 공정개발 — 초록색 */
.lot-card.dept-proc {
  background: rgba(16, 185, 129, 0.07);
  border-color: rgba(16, 185, 129, 0.2);
  border-left-color: #10b981;
  color: #10b981;
}

/* 정제생산/소자이관 */
.lot-card.dept-refine {
  background: var(--surface-2);
  border-color: var(--border);
  border-left-color: #9333ea;
}
.lot-card.dept-refine .c-purple { color: #9333ea; font-weight: 600; }
.lot-card.dept-refine .c-dark   { color: var(--text); }
.lot-card.dept-refine .c-blue   { color: #3b82f6; font-weight: 600; }

/* 완료된 카드 */
.lot-card.is-done {
  opacity: 0.35;
  text-decoration: line-through;
}

/* ── D+N 뱃지 ────────────────────────────────────────────────────────── */
.dn-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 4px;
  border-radius: 3px;
  vertical-align: middle;
  margin-left: 3px;
  white-space: nowrap;
  line-height: 1.5;
}

/* 일반 — 회색 */
.dn-badge.dn-normal {
  background: var(--surface-2);
  color: var(--text-muted);
  border: 1px solid var(--border);
}

/* 7일 이상 또는 긴급 — 빨간색 */
.dn-badge.dn-alert {
  background: rgba(239, 68, 68, 0.15);
  color: #ef4444;
  border: 1px solid rgba(239, 68, 68, 0.35);
}

/* 완료 — 초록색 */
.dn-badge.dn-done {
  background: rgba(16, 185, 129, 0.12);
  color: #10b981;
  border: 1px solid rgba(16, 185, 129, 0.3);
  text-decoration: none;
}

/* 더보기 */
.cell-more {
  font-size: 10px;
  color: var(--text-faint);
  padding: 1px 4px;
  text-align: center;
  background: var(--surface-2);
  border-radius: 3px;
  cursor: pointer;
}

/* ── 폼 필드 그룹 ────────────────────────────────────────────────────── */
.form-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 12px;
}

.form-group:last-of-type { margin-bottom: 0; }

.fld-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.fld-label .req {
  color: var(--accent);
  margin-left: 2px;
}

/* textarea 크기 조절 허용 (세로만) */
textarea.form-input {
  resize: vertical;
  min-height: 64px;
  line-height: 1.5;
}

/* ── 긴급 출하 체크박스 행 ────────────────────────────────────────────── */
.urgent-row {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 10px 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  margin-bottom: 14px;
}
.urgent-row:hover {
  border-color: #ef4444;
  background: rgba(239, 68, 68, 0.05);
}
.urgent-row input[type="checkbox"] {
  width: 15px;
  height: 15px;
  accent-color: #ef4444;
  cursor: pointer;
  flex-shrink: 0;
}
.urgent-row label {
  font-size: 12px;
  font-weight: 600;
  color: #ef4444;
  cursor: pointer;
  flex: 1;
  line-height: 1.3;
}

/* ── 폼 구분선 ───────────────────────────────────────────────────────── */
.form-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 4px 0 14px;
}

/* ── 모달 오버레이 ───────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s ease;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

/* 모달 박스 */
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 560px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  transform: translateY(8px);
  transition: transform 0.18s ease;
}
.modal-overlay.open .modal-box {
  transform: translateY(0);
}

/* 모달 헤더 */
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.modal-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.modal-close {
  width: 26px;
  height: 26px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 20px;
  line-height: 1;
  cursor: pointer;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s;
}
.modal-close:hover { background: var(--surface-2); color: var(--text); }

/* 모달 바디 */
.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 14px 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* 모달 섹션 제목 (부서 그룹) */
.modal-section-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
  margin-top: 4px;
}
.modal-section-title:first-child { margin-top: 0; }

/* 디테일 카드 */
.detail-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 13px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.detail-card.is-done { opacity: 0.55; }

/* 카드 상단 행 (뱃지 + D+N) */
.detail-card-top {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
}
.detail-dept-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
}
.badge-synth  { background: rgba(239,68,68,0.12);  color: #ef4444; }
.badge-proc   { background: rgba(16,185,129,0.12); color: #10b981; }
.badge-refine { background: rgba(147,51,234,0.12); color: #9333ea; }
.badge-urgent {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
  background: rgba(239,68,68,0.12);
  color: #ef4444;
}

/* D+N 큰 표시 */
.detail-dn {
  font-size: 13px;
  font-weight: 700;
  margin-left: auto;
}
.detail-dn.dn-normal { color: var(--text-muted); }
.detail-dn.dn-alert  { color: #ef4444; }
.detail-dn.dn-done   { color: #10b981; }

/* 카드 재료명 */
.detail-material {
  font-size: 12px;
  line-height: 1.5;
  color: var(--text);
}

/* 카드 날짜 메타 */
.detail-dates {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.detail-date-item {
  font-size: 11px;
  color: var(--text-muted);
}
.detail-date-item strong {
  color: var(--text);
  font-weight: 600;
}

/* 액션 버튼 영역 */
.detail-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding-top: 4px;
}
.btn-del {
  color: var(--danger) !important;
  border-color: rgba(239, 68, 68, 0.35) !important;
}
.btn-del:hover {
  background: rgba(239, 68, 68, 0.08) !important;
  border-color: var(--danger) !important;
}

/* 빈 상태 */
.modal-empty {
  text-align: center;
  padding: 28px 0;
  color: var(--text-faint);
  font-size: 13px;
}

/* ── 재료명 자동완성 ─────────────────────────────────────────────────── */
.ac-wrap {
  position: relative;
}

.ac-dropdown {
  position: absolute;
  top: calc(100% + 3px);
  left: 0;
  right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-md);
  z-index: 200;
  display: none;
  max-height: 180px;
  overflow-y: auto;
}
.ac-dropdown.open { display: block; }

.ac-item {
  padding: 7px 11px;
  font-size: 12px;
  color: var(--text);
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.ac-active {
  background: var(--surface-2);
  color: var(--accent);
}
.ac-item .ac-match { font-weight: 700; color: var(--accent); }

/* ── 요약 스트립 ─────────────────────────────────────────────────────── */
.summary-strip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.sum-chip {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 10px;
  border: 1px solid transparent;
  cursor: default;
  white-space: nowrap;
}
.sum-chip.chip-total   { background: var(--surface-2); color: var(--text); border-color: var(--border); }
.sum-chip.chip-synth   { background: rgba(239,68,68,0.1);  color: #ef4444; }
.sum-chip.chip-proc    { background: rgba(16,185,129,0.1); color: #10b981; }
.sum-chip.chip-refine  { background: rgba(147,51,234,0.1); color: #9333ea; }
.sum-chip.chip-alert   { background: rgba(239,68,68,0.14); color: #ef4444; border-color: rgba(239,68,68,0.4); }
.sum-chip.chip-done    { background: rgba(16,185,129,0.1); color: #10b981; }
.sum-sep { color: var(--border); font-size: 14px; user-select: none; }

/* ── 범례 + 완료토글 바 ──────────────────────────────────────────────── */
.legend-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 6px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-muted);
}
.legend-dot {
  width: 9px;
  height: 9px;
  border-radius: 2px;
  flex-shrink: 0;
}
.legend-spacer { flex: 1; }

/* 완료 토글 */
.done-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-muted);
  cursor: pointer;
  user-select: none;
}
.done-toggle input { accent-color: var(--accent); cursor: pointer; }

/* ── 수정 모드 취소 버튼 (기본 숨김) ────────────────────────────────── */
#btnCancelEdit {
  display: none;
  margin-top: 6px;
}

</style>
</head>
<body>

<div class="app-layout">

  <!-- ━━━━━━━━━━━━━━━━  좌측: 폼 패널  ━━━━━━━━━━━━━━━━ -->
  <aside class="form-panel" id="formPanel">
    <div class="form-panel-inner">

      <div class="form-panel-header">
        <span>📝</span>
        <span class="form-panel-title">소자평가 일정 등록</span>
      </div>

      <!-- ── 등록 / 수정 폼 ── -->
      <form id="scheduleForm" autocomplete="off" novalidate>
        <input type="hidden" id="fEditId">

        <!-- 부서/상태 -->
        <div class="form-group">
          <label class="fld-label" for="fDept">부서 / 상태<span class="req">*</span></label>
          <select class="form-select" id="fDept" required>
            <option value="">선택하세요</option>
            <option value="합성생산">합성생산</option>
            <option value="공정개발">공정개발</option>
            <option value="정제생산/소자이관">정제생산 / 소자이관</option>
          </select>
        </div>

        <!-- 재료명 (자동완성) -->
        <div class="form-group">
          <label class="fld-label" for="fMaterial">재료명<span class="req">*</span></label>
          <div class="ac-wrap">
            <input class="form-input" type="text" id="fMaterial"
              placeholder="예) PG1088" autocomplete="off" required>
            <div class="ac-dropdown" id="acDropdown"></div>
          </div>
        </div>

        <!-- Lot 번호 -->
        <div class="form-group">
          <label class="fld-label" for="fLot">Lot 번호</label>
          <input class="form-input" type="text" id="fLot"
            placeholder="예) P-NC05-Tol">
        </div>

        <!-- 요청사항 -->
        <div class="form-group">
          <label class="fld-label" for="fRequest">요청사항</label>
          <input class="form-input" type="text" id="fRequest"
            placeholder="예) Lot 평가(미정)">
        </div>

        <hr class="form-divider">

        <div class="form-group">

<!-- ━━━━━━━━━━━━━━━━  날짜 클릭 모달  ━━━━━━━━━━━━━━━━ -->

<script>
(function () {
'use strict';

/* ── 테마 동기화 ─────────────────────────────────────────────────────── */
function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  localStorage.setItem('qa_theme', t);
}
applyTheme(localStorage.getItem('qa_theme') || 'dark');
window.addEventListener('message', function (e) {
  if (e.data && e.data.type === 'setTheme') applyTheme(e.data.theme);
});

/* ── 상수 ────────────────────────────────────────────────────────────── */
var STORAGE_KEY  = 'qa_lot_schedule_v1';
var showDone     = false;  // 완료 항목 달력 표시 여부

/* ── 상태 ────────────────────────────────────────────────────────────── */
var today    = new Date();
var curYear  = today.getFullYear();
var curMonth = today.getMonth(); // 0-indexed

/* ── 날짜 유틸 ───────────────────────────────────────────────────────── */
function toDateStr(d) {
  return d.getFullYear() + '-'
    + String(d.getMonth() + 1).padStart(2, '0') + '-'
    + String(d.getDate()).padStart(2, '0');
}
var todayStr = toDateStr(today);

/* ── 고유 ID 생성 ─────────────────────────────────────────────────────── */
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

/* ── localStorage 데이터 관리 ────────────────────────────────────────── */
/*
  아이템 스키마:
  {
    id:           string,        // 고유 ID
    dept:         string,        // 합성생산 | 공정개발 | 정제생산/소자이관
    material:     string,        // 재료명·Lot·요청사항
    transferDate: 'YYYY-MM-DD',  // 샘플 이관/시작일 (필수)
    evalStart:    'YYYY-MM-DD',  // 소자평가 시작일 (선택)
    evalTarget:   'YYYY-MM-DD',  // 소자평가 목표일 (선택)
    urgent:       boolean,       // 긴급 출하 대응 여부
    completed:    boolean,       // 소자평가 완료 여부
    completedAt:  'YYYY-MM-DD' | null,
    createdAt:    'YYYY-MM-DD',
  }
*/
function loadItems() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch (e) {
    return [];
  }
}

function saveItems(items) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

/* ── D+N 계산 ────────────────────────────────────────────────────────── */
// 이관일 기준 경과 일수 반환 (D+0 = 이관 당일, 음수 = 미래)
function calcDN(transferDateStr) {
  if (!transferDateStr) return null;
  var t = new Date(transferDateStr + 'T00:00:00');
  var n = new Date(todayStr + 'T00:00:00');
  return Math.floor((n - t) / 86400000);
}

// 뱃지 HTML 반환
function dnBadgeHTML(item) {
  if (item.completed) {
    return '<span class="dn-badge dn-done">완료</span>';
  }
  var dn = calcDN(item.transferDate);
  if (dn === null) return '';

  var label = dn === 0 ? 'D+0' : (dn > 0 ? 'D+' + dn : 'D' + dn);
  var cls   = (dn >= 7 || item.urgent) ? 'dn-alert' : 'dn-normal';
  return '<span class="dn-badge ' + cls + '">' + label + '</span>';
}

/* ── HTML 이스케이프 ─────────────────────────────────────────────────── */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── 날짜 문자열 → M/D 형식 ──────────────────────────────────────────── */
function toMD(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T00:00:00');
  return (d.getMonth() + 1) + '/' + d.getDate();
}

/* ── 재료명 + Lot + 요청사항 조합 텍스트 생성 ───────────────────────── */
function buildMatText(item) {
  // 구 데이터: material 하나에 다 들어있는 경우 그대로 사용
  // 신 데이터: material + lot + request 조합
  var parts = [];
  if (item.material) parts.push(item.material);
  if (item.lot)      parts.push(item.lot);
  if (item.request)  parts.push(item.request);
  return parts.join(' ');
}

/* ── 카드 innerHTML 생성 (부서별 포맷 + D+N 뱃지) ────────────────────── */
function buildCardHTML(item) {
  var mat   = esc(buildMatText(item));
  var badge = dnBadgeHTML(item);

  if (item.dept === '합성생산') {
    return mat + badge;
  }
  if (item.dept === '공정개발') {
    return mat + badge;
  }
  // 정제생산/소자이관 — (자주색 이관일) 검정재료명 <파란색 소자평가시작일> D+N
  var parts = '';
  if (item.transferDate) {
    parts += '<span class="c-purple">(' + toMD(item.transferDate) + ')</span> ';
  }
  parts += '<span class="c-dark">' + mat + '</span>';
  if (item.evalStart) {
    parts += ' <span class="c-blue">&lt;' + toMD(item.evalStart) + '&gt;</span>';
  }
  parts += badge;
  return parts;
}

/* ── 카드 DOM 요소 생성 ──────────────────────────────────────────────── */
function createCard(item) {
  var card = document.createElement('div');
  var cls  = 'lot-card';
  if (item.dept === '합성생산')      cls += ' dept-synth';
  else if (item.dept === '공정개발') cls += ' dept-proc';
  else                               cls += ' dept-refine';
  if (item.completed)                cls += ' is-done';
  card.className = cls;
  card.innerHTML = buildCardHTML(item);
  card.dataset.id = item.id;
  // 호버 툴팁: 잘린 텍스트 전체 보기
  card.title = buildMatText(item);
  return card;
}

/* ── 달력 타이틀 업데이트 ────────────────────────────────────────────── */
function updateTitle() {
  document.getElementById('calTitle').textContent =
    curYear + '년 ' + (curMonth + 1) + '월';
}

/* ── 요약 스트립 렌더 ────────────────────────────────────────────────── */
function renderSummary(items) {
  var strip   = document.getElementById('summaryStrip');
  var active  = items.filter(function (it) { return !it.completed; });
  var synth   = active.filter(function (it) { return it.dept === '합성생산'; });
  var proc    = active.filter(function (it) { return it.dept === '공정개발'; });
  var refine  = active.filter(function (it) { return it.dept === '정제생산/소자이관'; });
  var alerts  = active.filter(function (it) { return calcDN(it.transferDate) >= 7 || it.urgent; });
  var done    = items.filter(function (it) { return it.completed; });

  var html = '<span class="sum-chip chip-total">진행 중 ' + active.length + '건</span>'
    + '<span class="sum-sep">|</span>';
  if (synth.length)  html += '<span class="sum-chip chip-synth">합성 ' + synth.length + '</span>';
  if (proc.length)   html += '<span class="sum-chip chip-proc">공정 ' + proc.length + '</span>';
  if (refine.length) html += '<span class="sum-chip chip-refine">정제/소자 ' + refine.length + '</span>';
  if (alerts.length) html += '<span class="sum-sep">|</span><span class="sum-chip chip-alert">⚡ 긴급·지연 ' + alerts.length + '</span>';
  if (done.length)   html += '<span class="sum-sep">|</span><span class="sum-chip chip-done">완료 ' + done.length + '</span>';

  strip.innerHTML = html;
}

/* ── 달력 그리드 렌더링 ──────────────────────────────────────────────── */
var MAX_CARDS = 3; // 셀당 최대 표시 카드 수

function renderCalendar() {
  updateTitle();
  var grid  = document.getElementById('calGrid');
  grid.innerHTML = '';

  var items = loadItems();
  renderSummary(items);

  // 날짜별 아이템 인덱싱 (완료 토글 적용)
  var byDate = {};
  items.forEach(function (it) {
    if (!it.transferDate) return;
    if (it.completed && !showDone) return; // 완료 항목 필터
    if (!byDate[it.transferDate]) byDate[it.transferDate] = [];
    byDate[it.transferDate].push(it);
  });

  var firstDay = new Date(curYear, curMonth, 1);
  var lastDay  = new Date(curYear, curMonth + 1, 0);
  var startDow = firstDay.getDay();
  var prevLast = new Date(curYear, curMonth, 0).getDate();
  var total    = Math.ceil((startDow + lastDay.getDate()) / 7) * 7;

  for (var i = 0; i < total; i++) {
    var dayNum, dateStr, otherMonth = false;

    if (i < startDow) {
      dayNum = prevLast - startDow + i + 1;
      var py = curMonth === 0 ? curYear - 1 : curYear;
      var pm = curMonth === 0 ? 11 : curMonth - 1;
      dateStr = py + '-' + String(pm + 1).padStart(2,'0') + '-' + String(dayNum).padStart(2,'0');
      otherMonth = true;
    } else if (i >= startDow + lastDay.getDate()) {
      dayNum = i - startDow - lastDay.getDate() + 1;
      var ny = curMonth === 11 ? curYear + 1 : curYear;
      var nm = curMonth === 11 ? 0 : curMonth + 1;
      dateStr = ny + '-' + String(nm + 1).padStart(2,'0') + '-' + String(dayNum).padStart(2,'0');
      otherMonth = true;
    } else {
      dayNum  = i - startDow + 1;
      dateStr = curYear + '-' + String(curMonth + 1).padStart(2,'0') + '-' + String(dayNum).padStart(2,'0');
    }

    var dow  = i % 7;
    var cell = document.createElement('div');
    cell.className = 'cal-cell'
      + (otherMonth ? ' other-month' : '')
      + (dateStr === todayStr ? ' is-today' : '');
    cell.dataset.date = dateStr;

    // 날짜 숫자
    var dn = document.createElement('div');
    dn.className = 'cell-daynum'
      + (dow === 0 ? ' sun' : '')
      + (dow === 6 ? ' sat' : '');
    dn.textContent = dayNum;
    cell.appendChild(dn);

    // ── 카드 배치 ──
    var dayItems = byDate[dateStr] || [];
    var toShow   = dayItems.slice(0, MAX_CARDS);
    var overflow = dayItems.length - toShow.length;

    toShow.forEach(function (item) {
      var card = createCard(item);
      card.addEventListener('click', function (e) {
        e.stopPropagation();
        // dateStr을 직접 쓰면 var 루프 클로저 버그 발생 → DOM에서 읽음
        openModal(e.currentTarget.closest('.cal-cell').dataset.date);
      });
      cell.appendChild(card);
    });

    if (overflow > 0) {
      var more = document.createElement('div');
      more.className = 'cell-more';
      more.textContent = '+' + overflow + '개 더보기';
      cell.appendChild(more);
    }

    // 셀 클릭 → 모달
    cell.addEventListener('click', function () {
      openModal(this.dataset.date);
    });

    grid.appendChild(cell);
  }
}

/* ── 폼 패널 토글 ────────────────────────────────────────────────────── */
var formPanel      = document.getElementById('formPanel');
var btnToggleForm  = document.getElementById('btnToggleForm');

btnToggleForm.addEventListener('click', function () {
  var collapsed = formPanel.classList.toggle('collapsed');
  btnToggleForm.textContent = collapsed ? '▶ 폼' : '◀ 폼';
});

/* ── 월 네비게이션 ───────────────────────────────────────────────────── */
document.getElementById('btnPrevMonth').addEventListener('click', function () {
  curMonth--;
  if (curMonth < 0) { curMonth = 11; curYear--; }
  renderCalendar();
});

document.getElementById('btnNextMonth').addEventListener('click', function () {
  curMonth++;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  renderCalendar();
});

document.getElementById('btnToday').addEventListener('click', function () {
  curYear  = today.getFullYear();
  curMonth = today.getMonth();
  renderCalendar();
  openModal(todayStr);
});

/* ── 재료명 자동완성 ─────────────────────────────────────────────────── */
function getUniqueMaterials() {
  var items = loadItems();
  var seen  = {};
  var list  = [];
  // 최신 등록 순으로 유니크 재료명 수집
  items.slice().reverse().forEach(function (it) {
    var name = (it.material || '').trim();
    if (name && !seen[name]) { seen[name] = true; list.push(name); }
  });
  return list;
}

function renderAC(query) {
  var drop  = document.getElementById('acDropdown');
  var names = getUniqueMaterials();
  var q     = query.trim().toLowerCase();
  var filtered = q
    ? names.filter(function (n) { return n.toLowerCase().indexOf(q) !== -1; })
    : names;

  if (!filtered.length) { drop.classList.remove('open'); return; }

  drop.innerHTML = filtered.map(function (n) {
    var display = esc(n);
    if (q) {
      // 매칭 부분 굵게 표시
      var idx = n.toLowerCase().indexOf(q);
      display = esc(n.slice(0, idx))
        + '<span class="ac-match">' + esc(n.slice(idx, idx + q.length)) + '</span>'
        + esc(n.slice(idx + q.length));
    }
    return '<div class="ac-item" data-val="' + esc(n) + '">' + display + '</div>';
  }).join('');
  drop.classList.add('open');

  drop.querySelectorAll('.ac-item').forEach(function (el) {
    el.addEventListener('mousedown', function (e) {
      e.preventDefault(); // blur 방지
      document.getElementById('fMaterial').value = this.dataset.val;
      drop.classList.remove('open');
    });
  });
}

(function initAC() {
  var input = document.getElementById('fMaterial');
  var drop  = document.getElementById('acDropdown');

  input.addEventListener('focus', function () { renderAC(this.value); });
  input.addEventListener('input', function () { renderAC(this.value); });
  input.addEventListener('blur',  function () {
    setTimeout(function () { drop.classList.remove('open'); }, 150);
  });
  // ESC로 드롭다운 닫기
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') drop.classList.remove('open');
  });
})();

/* ── 폼 기본값 세팅 (리셋 후 날짜 기본값 채우기) ────────────────────── */
function setFormDefaults() {
  document.getElementById('fTransferDate').value = todayStr;
  document.getElementById('fEvalStart').value    = todayStr;
  document.getElementById('fEvalTarget').value   = todayStr;
}

/* ── 폼 리셋 헬퍼 ────────────────────────────────────────────────────── */
function resetForm() {
  document.getElementById('scheduleForm').reset();
  document.getElementById('fEditId').value = '';
  document.getElementById('btnSubmit').textContent = '등록하기';
  document.getElementById('btnCancelEdit').style.display = 'none';
  setFormDefaults();
}

/* ── 폼 → 아이템 객체 변환 ───────────────────────────────────────────── */
function readFormData() {
  return {
    dept:         document.getElementById('fDept').value,
    material:     document.getElementById('fMaterial').value.trim(),
    lot:          document.getElementById('fLot').value.trim(),
    request:      document.getElementById('fRequest').value.trim(),
    transferDate: document.getElementById('fTransferDate').value,
    evalStart:    document.getElementById('fEvalStart').value,
    evalTarget:   document.getElementById('fEvalTarget').value,
    urgent:       document.getElementById('fUrgent').checked,
  };
}

/* ── 폼 ← 아이템 객체 채우기 (수정 모드) ────────────────────────────── */
function fillForm(item) {
  document.getElementById('fEditId').value          = item.id;
  document.getElementById('fDept').value            = item.dept;
  document.getElementById('fMaterial').value        = item.material || '';
  document.getElementById('fLot').value             = item.lot      || '';
  document.getElementById('fRequest').value         = item.request  || '';
  document.getElementById('fTransferDate').value    = item.transferDate;
  document.getElementById('fEvalStart').value       = item.evalStart  || '';
  document.getElementById('fEvalTarget').value      = item.evalTarget || '';
  document.getElementById('fUrgent').checked        = !!item.urgent;
  document.getElementById('btnSubmit').textContent  = '수정 저장';
  document.getElementById('btnCancelEdit').style.display = 'block';
  formPanel.classList.remove('collapsed');
  btnToggleForm.textContent = '◀ 폼';
}

/* ── 폼 제출 (신규 등록 + 수정 저장 통합) ───────────────────────────── */
document.getElementById('scheduleForm').addEventListener('submit', function (e) {
  e.preventDefault();

  var fd = readFormData();
  if (!fd.dept || !fd.material || !fd.transferDate) {
    alert('부서/상태, 재료명, 이관일은 필수 항목입니다.');
    return;
  }

  var items  = loadItems();
  var editId = document.getElementById('fEditId').value;

  if (editId) {
    // ── 수정 ──
    var idx = items.findIndex(function (it) { return it.id === editId; });
    if (idx !== -1) {
      // completed / completedAt 은 유지
      items[idx] = Object.assign(items[idx], fd);
    }
  } else {
    // ── 신규 등록 ──
    var newItem = Object.assign(fd, {
      id:          genId(),
      completed:   false,
      completedAt: null,
      createdAt:   todayStr,
    });
    items.push(newItem);

    // 등록된 달로 이동
    var d = new Date(fd.transferDate + 'T00:00:00');
    if (!isNaN(d)) {
      curYear  = d.getFullYear();
      curMonth = d.getMonth();
    }
  }

  saveItems(items);
  resetForm();
  renderCalendar();
});

document.getElementById('btnCancelEdit').addEventListener('click', resetForm);

/* ── 완료 항목 보기 토글 ─────────────────────────────────────────────── */
document.getElementById('toggleDone').addEventListener('change', function () {
  showDone = this.checked;
  renderCalendar();
});

/* ── 모달 열기/닫기 ──────────────────────────────────────────────────── */
var modalCurrentDate = null;

function openModal(dateStr) {
  modalCurrentDate = dateStr;
  var overlay = document.getElementById('modalOverlay');
  var titleEl = document.getElementById('modalTitle');
  var bodyEl  = document.getElementById('modalBody');
  var items   = loadItems();
  var isToday = (dateStr === todayStr);

  if (isToday) {
    // 오늘 클릭 → 전체 진행 현황 (미완료 항목 전체, D+N 내림차순)
    titleEl.textContent = '📊 오늘 기준 전체 진행 현황';
    var active = items.filter(function (it) { return !it.completed; });
    active.sort(function (a, b) {
      return (calcDN(b.transferDate) || 0) - (calcDN(a.transferDate) || 0);
    });
    bodyEl.innerHTML = '';
    if (!active.length) {
      bodyEl.innerHTML = '<div class="modal-empty">진행 중인 항목이 없습니다.</div>';
    } else {
      // 부서별 그룹
      var depts = ['합성생산', '공정개발', '정제생산/소자이관'];
      depts.forEach(function (dept) {
        var group = active.filter(function (it) { return it.dept === dept; });
        if (!group.length) return;
        var sec = document.createElement('div');
        sec.className = 'modal-section-title';
        sec.textContent = dept + ' (' + group.length + '건)';
        bodyEl.appendChild(sec);
        group.forEach(function (it) { bodyEl.appendChild(buildDetailCard(it)); });
      });
    }
  } else {
    // 다른 날 클릭 → 해당 날짜 이관 항목
    var d   = new Date(dateStr + 'T00:00:00');
    var lbl = (d.getMonth() + 1) + '월 ' + d.getDate() + '일 이관 항목';
    titleEl.textContent = lbl;
    var dayItems = items.filter(function (it) { return it.transferDate === dateStr; });
    bodyEl.innerHTML = '';
    if (!dayItems.length) {
      bodyEl.innerHTML = '<div class="modal-empty">이 날짜에 등록된 항목이 없습니다.</div>';
    } else {
      dayItems.forEach(function (it) { bodyEl.appendChild(buildDetailCard(it)); });
    }
  }

  overlay.classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  modalCurrentDate = null;
}

/* ── 모달 디테일 카드 생성 ────────────────────────────────────────────── */
function buildDetailCard(item) {
  var wrap = document.createElement('div');
  wrap.className = 'detail-card' + (item.completed ? ' is-done' : '');
  wrap.dataset.id = item.id;

  // 상단: 뱃지 + D+N
  var top = document.createElement('div');
  top.className = 'detail-card-top';

  var deptBadge = document.createElement('span');
  deptBadge.className = 'detail-dept-badge '
    + (item.dept === '합성생산' ? 'badge-synth'
     : item.dept === '공정개발' ? 'badge-proc' : 'badge-refine');
  deptBadge.textContent = item.dept;
  top.appendChild(deptBadge);

  if (item.urgent && !item.completed) {
    var urg = document.createElement('span');
    urg.className = 'badge-urgent';
    urg.textContent = '⚡ 긴급';
    top.appendChild(urg);
  }

  // D+N 큰 표시
  var dnEl = document.createElement('span');
  if (item.completed) {
    dnEl.className = 'detail-dn dn-done';
    dnEl.textContent = '완료';
  } else {
    var dn = calcDN(item.transferDate);
    var dnLabel = dn === null ? '-' : (dn === 0 ? 'D+0' : dn > 0 ? 'D+' + dn : 'D' + dn);
    var dnCls   = (dn >= 7 || item.urgent) ? 'dn-alert' : 'dn-normal';
    dnEl.className = 'detail-dn ' + dnCls;
    dnEl.textContent = dnLabel;
  }
  top.appendChild(dnEl);
  wrap.appendChild(top);

  // 재료명 (부서별 색상 포맷 그대로)
  var matEl = document.createElement('div');
  matEl.className = 'detail-material';
  matEl.innerHTML = buildCardHTML(item).replace(/<span class="dn-badge[^"]*">[^<]*<\/span>/g, ''); // 뱃지 제외
  wrap.appendChild(matEl);

  // 날짜 메타
  var dates = document.createElement('div');
  dates.className = 'detail-dates';
  dates.innerHTML =
    '<span class="detail-date-item"><strong>이관일</strong> ' + (item.transferDate || '-') + '</span>' +
    (item.evalStart  ? '<span class="detail-date-item"><strong>평가시작</strong> ' + item.evalStart  + '</span>' : '') +
    (item.evalTarget ? '<span class="detail-date-item"><strong>목표일</strong> '   + item.evalTarget + '</span>' : '');
  wrap.appendChild(dates);

  // ── 액션 버튼 영역 ──
  var actions = document.createElement('div');
  actions.className = 'detail-actions';

  if (!item.completed) {
    var btnDone = document.createElement('button');
    btnDone.className = 'btn btn-success btn-sm';
    btnDone.textContent = '✓ 소자평가 완료';
    btnDone.addEventListener('click', function () { markComplete(item.id); });
    actions.appendChild(btnDone);
  } else {
    var btnUndo = document.createElement('button');
    btnUndo.className = 'btn btn-secondary btn-sm';
    btnUndo.textContent = '↩ 완료 취소';
    btnUndo.addEventListener('click', function () { markUncomplete(item.id); });
    actions.appendChild(btnUndo);
  }

  var btnEdit = document.createElement('button');
  btnEdit.className = 'btn btn-secondary btn-sm';
  btnEdit.textContent = '✎ 수정';
  btnEdit.addEventListener('click', function () { editItem(item.id); });
  actions.appendChild(btnEdit);

  var btnDel = document.createElement('button');
  btnDel.className = 'btn btn-secondary btn-sm btn-del';
  btnDel.textContent = '✕ 삭제';
  btnDel.addEventListener('click', function () { deleteItem(item.id); });
  actions.appendChild(btnDel);

  wrap.appendChild(actions);
  return wrap;
}

/* ── 수정 ────────────────────────────────────────────────────────────── */
function editItem(id) {
  var items = loadItems();
  var item  = items.find(function (it) { return it.id === id; });
  if (!item) return;
  closeModal();
  fillForm(item);
  // 폼 상단으로 스크롤
  document.getElementById('scheduleForm').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ── 삭제 ────────────────────────────────────────────────────────────── */
function deleteItem(id) {
  if (!confirm('이 항목을 삭제하시겠습니까?')) return;
  var items = loadItems().filter(function (it) { return it.id !== id; });
  saveItems(items);
  renderCalendar();
  refreshModal();
}

/* ── 완료 / 완료 취소 처리 ───────────────────────────────────────────── */
function refreshModal() {
  if (modalCurrentDate) openModal(modalCurrentDate);
}

function markComplete(id) {
  var items = loadItems();
  var item  = items.find(function (it) { return it.id === id; });
  if (!item) return;
  item.completed   = true;
  item.completedAt = todayStr;
  saveItems(items);
  renderCalendar();
  refreshModal();
}

function markUncomplete(id) {
  var items = loadItems();
  var item  = items.find(function (it) { return it.id === id; });
  if (!item) return;
  item.completed   = false;
  item.completedAt = null;
  saveItems(items);
  renderCalendar();
  refreshModal();
}

/* ── 모달 닫기 이벤트 ────────────────────────────────────────────────── */
document.getElementById('btnModalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', function (e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape') closeModal();
});

/* ── 초기 렌더 ───────────────────────────────────────────────────────── */
setFormDefaults();
renderCalendar();

})();
</script>
</body>
</html>
