<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/global_style.css">
<link rel="stylesheet" href="./style.css">
<title>P/N 공정 Flow 관리</title>
</head>
<body>

<!-- 데이터 로딩 오버레이 (첫 snapshot 도착 시 JS가 제거) -->
<div id="loadingOverlay" class="loading-overlay">
  <div class="lo-spinner"></div>
  <div class="lo-text">데이터 로딩 중...</div>
  <button type="button" class="lo-retry-btn" style="display:none"
    onclick="window._pnFlowManualRetry && window._pnFlowManualRetry()">
    다시 시도
  </button>
</div>

<!-- ── LIST VIEW ─────────────────────────────────────────────── -->
<div id="v-list">
  <header class="pf-topbar">
    <h1 class="pf-app-title">P/N 공정 Flow 관리</h1>
    <div style="display:flex;gap:12px;align-items:center;">
      <input id="list-search" type="search" placeholder="제목, 소재, 작성자 검색..." class="pf-inp" style="min-width: 220px;" oninput="APP.onSearchInput()">
      <button class="btn pf-ship-btn" onclick="APP.openShipMgr()">📦 출하 관리</button>
      <button class="btn btn-primary" onclick="APP.newDoc()">+ 새 문서</button>
    </div>
  </header>
  <div id="doc-grid" class="pf-doc-grid"></div>
  <div id="list-empty" class="pf-empty pf-hidden">저장된 문서가 없습니다. <strong>+ 새 문서</strong>를 눌러 시작하세요.</div>
  <div id="pf-doc-trash" class="pf-doc-trash pf-hidden"></div>
</div>

<!-- ── DOCUMENT EDITOR VIEW ──────────────────────────────────── -->
<div id="v-doc" class="pf-hidden">
  <header class="pf-doc-topbar">
    <button class="pf-back-btn" onclick="APP.showList()">← 목록</button>
    <div class="pf-meta-row">
      <input id="inp-title"    class="pf-inp pf-inp-title" placeholder="문서 제목"              oninput="APP.onMetaChange()">
      <input id="inp-material" class="pf-inp pf-inp-sm"    placeholder="소재코드 (예: LT-PHM295)" oninput="APP.onMetaChange()">
      <input id="inp-author"   class="pf-inp pf-inp-sm"    placeholder="작성자"                  oninput="APP.onMetaChange()">
      <input id="inp-date"     class="pf-inp pf-inp-sm"    type="date"                           oninput="APP.onMetaChange()">
    </div>
    <div id="pf-save-status" class="pf-save-status pf-ss-idle" title="저장 상태"><span class="pf-ss-dot"></span><span class="pf-ss-txt">대기</span></div>
    <button id="pf-toggle-all-btn" class="btn pf-toggle-all-btn" onclick="APP.toggleAllLots()" title="모든 Lot의 공정 일괄 접기/펼치기 (개별 Lot 헤더의 ▼/▶와 동일)">▼ 공정 전체 접기</button>
    <button id="pf-undo-btn" class="btn pf-undo-btn" onclick="APP.undo()" disabled title="드래그드롭 실행 취소 (Ctrl+Z)">↩ 되돌리기</button>
    <button class="btn pf-ship-btn" onclick="APP.openShipMgr()" title="출하 Lot 관리 — 재고 차감">📦 출하 관리</button>
    <button class="btn pf-xlsx-btn" onclick="APP.exportXlsx()">⇣ Excel</button>
    <button class="btn pf-print-btn" onclick="window.print()">🖨 인쇄</button>
  </header>

  <div id="doc-summary" class="pf-summary"></div>

  <div class="pf-legend">
    <span class="pf-leg react">반응</span>
    <span class="pf-leg solid">결정화</span>
    <span class="pf-leg wet">Wet 정제</span>
    <span class="pf-leg subl">승화정제</span>
    <span class="pf-leg collect">여액취합</span>
    <span class="pf-leg-sep"></span>
    <span class="pf-leg tag-pass">PASS</span>
    <span class="pf-leg tag-fail">FAIL</span>
    <span class="pf-leg tag-pending">예정</span>
  </div>

  <div class="pf-doc-layout">
    <div id="doc-body" class="pf-doc-body"></div>
    <aside id="pf-drawer" class="pf-drawer">
      <div class="pf-drawer-hd">
        <span id="pf-drawer-lbl" class="pf-drawer-title">공정 편집</span>
        <button class="pf-drawer-close" onclick="APP.closeEdit()">✕ 닫기</button>
      </div>
      <div id="pf-drawer-body" class="pf-drawer-body"></div>
    </aside>
  </div>

  <div id="pf-step-trash" class="pf-step-trash pf-hidden"></div>

  <div class="pf-add-sec-bar">
    <button class="btn btn-secondary pf-p-sec" onclick="APP.addSection('P')">+ P Type 섹션</button>
    <button class="btn btn-secondary pf-n-sec" onclick="APP.addSection('N')">+ N Type 섹션</button>
    <button class="btn btn-secondary pf-s-sec" onclick="APP.addSection('S')">+ Single 섹션</button>
    <div class="pf-updated-info" id="pf-updated-info"></div>
  </div>
</div>

<!-- ── 출하 Lot 관리 모달 ──────────────────────────────────── -->
<div id="pf-ship-overlay" class="pf-ship-overlay" onclick="if(event.target===this)APP.closeShipMgr()">
  <div class="pf-ship-panel">
    <div class="pf-ship-hd">
      <span class="pf-ship-title">📦 출하 Lot 관리</span>
      <button class="pf-ship-close" onclick="APP.closeShipMgr()">✕ 닫기</button>
    </div>
    <div id="pf-ship-body" class="pf-ship-body"></div>
  </div>
</div>

<!-- ── 공정 미리보기 팝업 (출하 모달 위에 떠 공정·잔량 동시 확인) ────── -->
<div id="pf-proc-popup" class="pf-proc-popup" onclick="event.stopPropagation()"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<!-- 공통 모듈 (Firebase 설정·테마·유틸) -->
<script src="../../assets/js/firebase-config.js"></script>
<script src="../../assets/js/theme-sync.js"></script>
<script src="../../assets/js/utils.js"></script>
<script>window._AG_ADMIN_ONLY = true;</script>
<script src="../../assets/js/auth_guard.js"></script>
<script src="./app.js"></script>
</body>
</html>
