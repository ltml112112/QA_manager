<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="../../assets/css/global_style.css">
<style>
body { padding: 24px; }
.container { max-width: 900px; margin: 0 auto; }
.center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 320px; text-align: center; gap: 16px; }
.doc-title { font-size: 1.25rem; font-weight: 700; color: var(--text); }
.doc-desc { color: var(--text-muted); font-size: 0.9rem; line-height: 1.7; max-width: 480px; }
.doc-link-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  background: var(--accent);
  color: #fff;
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  font-weight: 600;
  text-decoration: none;
  transition: background 0.15s;
}
.doc-link-btn:hover { background: var(--accent-hover); }
.doc-link-btn svg { flex-shrink: 0; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="card-header">시스템 문서 &amp; SOP</div>
    <div class="center">
      <div class="doc-title">전자재료사업부 문서 폴더</div>
      <div class="doc-desc">
        품질·환경·안전·보건 관련 시스템 문서 및 작업 SOP를<br>
        전자재료사업부 사내 클라우드 폴더에서 확인할 수 있습니다.
      </div>
      <a class="doc-link-btn" href="https://ecm.ltml.co.kr/url/?key=4495z1PrhUEkZ9nK" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        문서 폴더 열기
      </a>
    </div>
  </div>
</div>
<script>
(function() {
  function applyTheme(theme) {
    document.documentElement.dataset.theme = theme;
    localStorage.setItem('qa_theme', theme);
  }
  applyTheme(localStorage.getItem('qa_theme') || 'dark');
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'setTheme') applyTheme(e.data.theme);
  });
})();
</script>
</body>
</html>
