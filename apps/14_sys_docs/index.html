<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="../../assets/css/global_style.css">
<script>window._AG_ADMIN_ONLY = true;</script>
<script src="../../assets/js/auth_guard.js"></script>
<style>
body { padding: 24px; }
.container { max-width: 720px; margin: 0 auto; }
.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 360px;
  text-align: center;
  gap: 20px;
}
.doc-title {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text);
}
.doc-desc {
  color: var(--text-muted);
  font-size: 0.9rem;
  line-height: 1.7;
  max-width: 440px;
}
.link-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 28px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.15s, transform 0.1s;
}
.link-btn:hover {
  background: var(--accent-hover);
  transform: translateY(-1px);
}
.link-btn:active {
  transform: translateY(0);
}
.link-btn svg {
  flex-shrink: 0;
}
</style></head>
<body>
<div class="container">
  <div class="card">
    <div class="card-header">시스템 문서 &amp; SOP</div>
    <div class="center">
      <div class="doc-title">품질경영팀 문서 관리 시스템</div>
      <div class="doc-desc">
        품질·환경·안전·보건 관련 시스템 문서 및 작업 SOP는<br>
        내부 클라우드(ECM)에서 통합 관리되고 있습니다.
      </div>
      <a class="link-btn" href="https://ecm.ltml.co.kr/url/?key=4495z1PrhUEkZ9nK" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        내부 클라우드 폴더 열기
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </a>
    </div>
  </div>
</div>
<script>
(function() {
  function applyTheme(theme) {
    document.documentElement.dataset.theme = theme;
    localStorage.setItem('qa_theme', theme);
  }
  applyTheme(localStorage.getItem('qa_theme') || 'dark');
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'setTheme') applyTheme(e.data.theme);
  });
})();
</script>
</body>
</html>
