<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>소재 Lot 흐름 &amp; 품질 TREND 분석기</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="../../assets/css/global_style.css">
<style>
body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── Upload Bar ── */
.upload-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px 20px; flex-shrink: 0; }
.upload-bar .dropzone { min-height: 80px; padding: 16px; }

/* ── Main Layout ── */
.app-layout { display: flex; flex: 1; overflow: hidden; }
.sidebar-panel {
  width: 280px; flex-shrink: 0; background: var(--surface);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  overflow: hidden; transition: width 0.2s;
}
.sidebar-panel.hidden { width: 0; border: none; }
.main-panel { flex: 1; overflow-y: auto; padding: 20px; }

/* ── Sidebar ── */
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-toggle { display: flex; gap: 4px; margin-bottom: 12px; }
.sidebar-toggle .btn { flex: 1; font-size: 0.8rem; }
.sidebar-toggle .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.sidebar-search { position: relative; }
.sidebar-search .form-input { width: 100%; box-sizing: border-box; font-size: 0.85rem; }
.autocomplete-list {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 10;
  background: var(--surface); border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 var(--radius-sm) var(--radius-sm); max-height: 200px; overflow-y: auto;
  display: none;
}
.autocomplete-list .ac-item {
  padding: 8px 12px; font-size: 0.82rem; cursor: pointer;
  border-bottom: 1px solid var(--border);
}
.autocomplete-list .ac-item:hover { background: var(--surface-2); }
.lot-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.lot-item {
  padding: 10px 16px; cursor: pointer; font-size: 0.82rem;
  border-bottom: 1px solid var(--border); transition: background 0.15s;
  display: flex; justify-content: space-between; align-items: center;
}
.lot-item:hover { background: var(--surface-2); }
.lot-item.active { background: var(--accent); color: #fff; }
.lot-item .lot-meta { font-size: 0.72rem; opacity: 0.7; }
.lot-count { padding: 8px 16px; font-size: 0.75rem; color: var(--text-muted); border-bottom: 1px solid var(--border); }

/* ── Mermaid ── */
.mermaid-container { min-height: 120px; overflow-x: auto; text-align: center; padding: 16px; }
.mermaid-container svg { max-width: 100%; }

/* ── Deep Dive ── */
.deep-dive-panel { display: none; }
.deep-dive-panel.visible { display: block; }

/* ── SPC Charts ── */
.spc-section { margin-bottom: 24px; }
.spc-section-title {
  background: var(--text); color: var(--bg); padding: 10px 16px;
  border-radius: var(--radius-sm); font-weight: 600; font-size: 0.9rem; margin-bottom: 12px;
}
.charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(460px, 1fr)); gap: 16px; }
.chart-box { position: relative; height: 300px; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); }
.chart-box canvas { width: 100% !important; height: 100% !important; }
.chart-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 2px; }
.chart-title { font-weight: 600; font-size: 0.85rem; margin-bottom: 8px; }

/* ── Trace Table ── */
.trace-table-wrap { max-height: 400px; overflow: auto; }
.cell-exceed { background: rgba(239, 68, 68, 0.15) !important; color: #ef4444 !important; font-weight: 600; }

/* ── No Data ── */
.no-data { text-align: center; padding: 40px 20px; color: var(--text-muted); }
.no-data-icon { font-size: 48px; margin-bottom: 12px; }

/* ── Upload States ── */
.dropzone.drag-over { border-color: var(--accent); background: rgba(190,0,57,0.07); }
.dropzone.upload-ok { border-color: var(--success); }
.dropzone.upload-error { border-color: var(--danger); }
</style>
</head>
<body>

<!-- ── Upload Bar ── -->
<div class="upload-bar">
  <div class="dropzone" id="drop-quality">
    <input type="file" id="input-quality" accept=".xlsx,.xls" style="display:none">
    <div class="dropzone-icon" id="icon-quality">📊</div>
    <div class="dropzone-title">품질 데이터 업로드</div>
    <div class="dropzone-hint" id="hint-quality">.xlsx 파일을 드래그하거나 클릭하세요</div>
    <div class="upload-status" id="status-quality" style="display:none;margin-top:6px;font-size:0.82rem;text-align:center;"></div>
  </div>
  <div class="dropzone" id="drop-flow">
    <input type="file" id="input-flow" accept=".xlsx,.xls" style="display:none">
    <div class="dropzone-icon" id="icon-flow">🔗</div>
    <div class="dropzone-title">흐름도 데이터 업로드</div>
    <div class="dropzone-hint" id="hint-flow">.xlsx 파일을 드래그하거나 클릭하세요</div>
    <div class="upload-status" id="status-flow" style="display:none;margin-top:6px;font-size:0.82rem;text-align:center;"></div>
  </div>
</div>

<!-- ── Main Layout ── -->
<div class="app-layout">

  <!-- Sidebar -->
  <div class="sidebar-panel hidden" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-toggle">
        <button class="btn btn-sm active" id="btn-reverse" title="완제품 → 원료">역추적</button>
        <button class="btn btn-sm" id="btn-forward" title="원료 → 완제품">정추적</button>
      </div>
      <div class="sidebar-search">
        <input class="form-input" id="lot-search" placeholder="Lot / Batch 검색..." autocomplete="off">
        <div class="autocomplete-list" id="ac-list"></div>
      </div>
    </div>
    <div class="lot-count" id="lot-count">0개 Lot</div>
    <div class="lot-list" id="lot-list"></div>
  </div>

  <!-- Main Content -->
  <div class="main-panel" id="main-panel">
    <div class="no-data" id="empty-state">
      <div class="no-data-icon">📁</div>
      <div>품질 데이터와 흐름도 데이터를 업로드하면 분석이 시작됩니다.</div>
    </div>

    <!-- Mermaid Diagram -->
    <div class="card" id="flow-card" style="display:none;">
      <div class="card-header"><span>⛓</span> Lot Genealogy Flow</div>
      <div class="mermaid-container" id="mermaid-viewer"></div>
    </div>

    <!-- Batch Deep Dive -->
    <div class="card deep-dive-panel" id="deep-dive-card">
      <div class="card-header"><span>🔍</span> Batch Deep-Dive</div>
      <div id="deep-dive-content"></div>
    </div>

    <!-- Trace Table -->
    <div class="card" id="trace-card" style="display:none;">
      <div class="card-header"><span>📋</span> 품질 데이터 추적 요약</div>
      <div class="trace-table-wrap" id="trace-result"></div>
    </div>

    <!-- SPC Charts -->
    <div id="spc-container"></div>
  </div>

</div>

<script>
/* ══════════════════════════════════════════════════════════════
   CPL 통합 품질 & 이력 관리 시스템
   ══════════════════════════════════════════════════════════════ */

/* ── 테마 동기화 ── */
(function() {
  function applyTheme(theme) {
    document.documentElement.dataset.theme = theme;
    localStorage.setItem('qa_theme', theme);
  }
  applyTheme(localStorage.getItem('qa_theme') || 'dark');
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'setTheme') applyTheme(e.data.theme);
  });
})();

/* ── Mermaid 초기화 ── */
mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });

/* ── 전역 상태 ── */
const STATE = {
  qualityWb:      null,   // 품질 데이터 워크북 (XLSX)
  flowWb:         null,   // 흐름도 워크북 (XLSX)
  qualityRecords: [],     // 파싱된 품질 레코드 [{stage,batchNo,itemLabel,value,USL,LSL,UCL,LCL}]
  byOutputLot:    {},     // 완제품 → 원료 맵
  byInputLot:     {},     // 원료 → 완제품 맵
  lotMeta:        {},     // Lot → {itemCode, itemName}
  selectedLot:    null,
  selectedBatch:  null,
  traceDir:       'backward', // 'backward' | 'forward'
  chartInstances: [],
};

/* ══════════════════════════════════════════════════════════════
   Step 2: 파일 업로드
   ══════════════════════════════════════════════════════════════ */

/* 2-E: 파일 크기 포맷 */
function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

/* 2-G: 업로드 상태 UI 업데이트
   slot  : 'quality' | 'flow'
   state : 'idle' | 'loading' | 'ok' | 'error'
   info  : null | {name, size} | {message}
*/
function setUploadStatus(slot, state, info) {
  var drop     = document.getElementById('drop-' + slot);
  var iconEl   = document.getElementById('icon-' + slot);
  var hintEl   = document.getElementById('hint-' + slot);
  var statusEl = document.getElementById('status-' + slot);

  drop.classList.remove('drag-over', 'upload-ok', 'upload-error');

  if (state === 'idle') {
    iconEl.textContent    = slot === 'quality' ? '📊' : '🔗';
    hintEl.style.display  = '';
    statusEl.style.display = 'none';

  } else if (state === 'loading') {
    iconEl.textContent    = '⏳';
    hintEl.style.display  = 'none';
    statusEl.style.display = '';
    statusEl.innerHTML    = '<span style="color:var(--text-muted)">파싱 중...</span>';

  } else if (state === 'ok') {
    iconEl.textContent    = '✅';
    hintEl.style.display  = 'none';
    statusEl.style.display = '';
    statusEl.innerHTML    =
      '<span style="color:var(--success);font-weight:600">' + info.name + '</span>' +
      '<span style="color:var(--text-muted);font-size:0.75rem;margin-left:6px">' + info.size + '</span>';
    drop.classList.add('upload-ok');

  } else if (state === 'error') {
    iconEl.textContent    = '❌';
    hintEl.style.display  = 'none';
    statusEl.style.display = '';
    statusEl.innerHTML    = '<span style="color:var(--danger)">' + info.message + '</span>';
    drop.classList.add('upload-error');
  }
}

/* 2-D: 파일 자동판별
   행 4(index 4)에 USL/LSL → 품질 파일
   행 0(index 0)에 "단계"   → 흐름도 파일
   그 외                    → 'unknown'
*/
function detectFileType(workbook) {
  var ws   = workbook.Sheets[workbook.SheetNames[0]];
  var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

  if (rows[4]) {
    var r4 = rows[4].join('|').toUpperCase();
    if (r4.indexOf('USL') !== -1 || r4.indexOf('LSL') !== -1) return 'quality';
  }
  if (rows[0]) {
    if (rows[0].join('|').indexOf('단계') !== -1) return 'flow';
  }
  return 'unknown';
}

/* 2-F: 파일 읽기 + 단일 파싱 (중복 방지)
   slot: 드롭존 힌트 ('quality' | 'flow') — 자동판별 후 실제 타입 우선
*/
function handleFile(file, slot) {
  setUploadStatus(slot, 'loading', null);

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb       = XLSX.read(e.target.result, { type: 'array', cellStyles: true });
      var detected = detectFileType(wb);
      var fileInfo = { name: file.name, size: formatBytes(file.size) };

      if (detected === 'unknown') {
        setUploadStatus(slot, 'error', { message: '파일 형식을 인식할 수 없습니다 (품질·흐름도 파일만 지원)' });
        return;
      }

      // 드롭존과 실제 타입이 다르면 원래 드롭존을 idle 로 복구
      if (detected !== slot) setUploadStatus(slot, 'idle', null);

      if (detected === 'quality') {
        STATE.qualityWb = wb;
        setUploadStatus('quality', 'ok', fileInfo);
        if (typeof onQualityReady === 'function') onQualityReady();
      } else {
        STATE.flowWb = wb;
        setUploadStatus('flow', 'ok', fileInfo);
        if (typeof onFlowReady === 'function') onFlowReady();
      }
    } catch (err) {
      setUploadStatus(slot, 'error', { message: 'XLSX 파싱 오류: ' + err.message });
    }
  };
  reader.readAsArrayBuffer(file);
}

/* 2-B / 2-C: 드래그앤드롭 + 클릭 업로드 초기화 */
(function initUpload() {
  ['quality', 'flow'].forEach(function(slot) {
    var drop  = document.getElementById('drop-' + slot);
    var input = document.getElementById('input-' + slot);

    // dragover — 테두리 강조
    drop.addEventListener('dragover', function(e) {
      e.preventDefault();
      drop.classList.add('drag-over');
    });
    // dragleave — 복원 (자식 요소로 이동 시 제외)
    drop.addEventListener('dragleave', function(e) {
      if (!drop.contains(e.relatedTarget)) drop.classList.remove('drag-over');
    });
    // drop
    drop.addEventListener('drop', function(e) {
      e.preventDefault();
      var file = e.dataTransfer.files[0];
      if (file) handleFile(file, slot);
    });

    // 클릭 → hidden input 트리거
    drop.addEventListener('click', function() { input.click(); });
    input.addEventListener('change', function() {
      if (input.files[0]) handleFile(input.files[0], slot);
      input.value = ''; // 같은 파일 재선택 가능
    });
  });
})();

/* ══════════════════════════════════════════════════════════════
   Step 3: 품질 데이터 파서
   ══════════════════════════════════════════════════════════════ */

/* 3-A: 워크북 → 2D 배열 변환 */
function getRows(workbook) {
  var ws = workbook.Sheets[workbook.SheetNames[0]];
  return { ws: ws, rows: XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' }) };
}

/* 3-B: 병합셀 forward-fill
   ws['!merges'] 를 순회해서 병합 범위 첫 셀 값을 빈 셀에 채워 넣음 */
function forwardFillMerges(ws, rows) {
  var merges = ws['!merges'] || [];
  merges.forEach(function(m) {
    var val = '';
    // 기준 셀 값 추출
    if (rows[m.s.r] && rows[m.s.r][m.s.c] !== undefined) val = rows[m.s.r][m.s.c];
    for (var r = m.s.r; r <= m.e.r; r++) {
      for (var c = m.s.c; c <= m.e.c; c++) {
        if (!rows[r]) rows[r] = [];
        if (r === m.s.r && c === m.s.c) continue; // 첫 셀은 이미 있음
        if (rows[r][c] === '' || rows[r][c] === undefined) rows[r][c] = val;
      }
    }
  });
  return rows;
}

/* 3-D: 컬럼 역할 분류
   row3 = 상세헤더 행(index 3), row4 = 기준 행(index 4)
   반환: 컬럼 인덱스 → 'batchNo' | 'value' | 'USL' | 'LSL' | 'UCL' | 'LCL' | 'ignore'
*/
function classifyColumns(row3, row4) {
  var roles = {};
  for (var c = 0; c < Math.max(row3.length, row4.length); c++) {
    var h3 = String(row3[c] || '').trim();
    var h4 = String(row4[c] || '').trim().toUpperCase();

    if (h3.toUpperCase().indexOf('BATCH') !== -1 || h3.indexOf('배치') !== -1) {
      roles[c] = 'batchNo';
    } else if (h4 === 'USL') {
      roles[c] = 'USL';
    } else if (h4 === 'LSL') {
      roles[c] = 'LSL';
    } else if (h4 === 'UCL') {
      roles[c] = 'UCL';
    } else if (h4 === 'LCL') {
      roles[c] = 'LCL';
    } else if (h4 === '기준' || h4 === '' && h3 === '') {
      roles[c] = 'ignore';
    } else if (h3 !== '') {
      roles[c] = 'value';
    } else {
      roles[c] = 'ignore';
    }
  }
  return roles;
}

/* 3-E: 공정단계 그룹 경계 파악
   batchNo 컬럼 위치마다 새 그룹 시작. row0 = 대분류(공정단계명)
   반환: [{stage, batchNoCol, startCol, endCol}]
*/
function buildStageGroups(roles, row0, totalCols) {
  var groups = [];
  var batchCols = Object.keys(roles).filter(function(c) {
    return roles[c] === 'batchNo';
  }).map(Number).sort(function(a, b) { return a - b; });

  batchCols.forEach(function(bc, idx) {
    var nextBc  = batchCols[idx + 1] !== undefined ? batchCols[idx + 1] : totalCols;
    var stageName = String(row0[bc] || ('공정단계 ' + (idx + 1))).trim();
    groups.push({ stage: stageName, batchNoCol: bc, startCol: bc, endCol: nextBc - 1 });
  });
  return groups;
}

/* 3-F: 각 value 컬럼에 인접 기준값 컬럼 연결 (forward scan)
   반환: {valueCols: {colIdx: {USLcol,LSLcol,UCLcol,LCLcol}}, itemLabels: {colIdx: label}}
*/
function buildValueMeta(roles, row2, row3) {
  var valueMeta = {};
  var colIndices = Object.keys(roles).map(Number).sort(function(a, b) { return a - b; });

  colIndices.forEach(function(c) {
    if (roles[c] !== 'value') return;
    // 측정항목 라벨: row2(소분류) + row3(상세헤더) 조합
    var label = [String(row2[c] || '').trim(), String(row3[c] || '').trim()]
      .filter(Boolean).join(' ').trim() || ('col' + c);

    var limitCols = { USLcol: null, LSLcol: null, UCLcol: null, LCLcol: null };
    // 오른쪽으로 forward scan → 첫 번째 USL/LSL/UCL/LCL 컬럼 찾기
    for (var i = c + 1; i < c + 10 && i < colIndices[colIndices.length - 1] + 1; i++) {
      if (roles[i] === 'USL'  && limitCols.USLcol === null)  limitCols.USLcol  = i;
      if (roles[i] === 'LSL'  && limitCols.LSLcol === null)  limitCols.LSLcol  = i;
      if (roles[i] === 'UCL'  && limitCols.UCLcol === null)  limitCols.UCLcol  = i;
      if (roles[i] === 'LCL'  && limitCols.LCLcol === null)  limitCols.LCLcol  = i;
      if (roles[i] === 'batchNo') break; // 다음 그룹 시작 전에 중단
    }
    valueMeta[c] = { label: label, limits: limitCols };
  });
  return valueMeta;
}

/* 3-G: 데이터 행 파싱 → qualityRecords 배열 생성 */
function parseQualityRows(rows, stageGroups, roles, valueMeta) {
  var records = [];

  stageGroups.forEach(function(grp) {
    // 데이터 행: index 5부터
    for (var r = 5; r < rows.length; r++) {
      var row = rows[r];
      var batchNo = String(row[grp.batchNoCol] || '').trim();
      if (!batchNo) continue; // Batch No. 없는 행 스킵

      // 그룹 범위 내 value 컬럼 순회
      for (var c = grp.startCol; c <= grp.endCol; c++) {
        if (roles[c] !== 'value') continue;
        var meta  = valueMeta[c];
        if (!meta) continue;

        var rawVal = row[c];
        var value  = rawVal === '' || rawVal === undefined ? null : parseFloat(rawVal);
        if (value === null || isNaN(value)) continue; // 측정값 없는 셀 스킵

        var lim = meta.limits;
        records.push({
          stage:     grp.stage,
          batchNo:   batchNo,
          itemLabel: meta.label,
          value:     value,
          USL: lim.USLcol !== null ? parseFloat(row[lim.USLcol]) : null,
          LSL: lim.LSLcol !== null ? parseFloat(row[lim.LSLcol]) : null,
          UCL: lim.UCLcol !== null ? parseFloat(row[lim.UCLcol]) : null,
          LCL: lim.LCLcol !== null ? parseFloat(row[lim.LCLcol]) : null,
        });
      }
    }
  });
  return records;
}

/* 3-H: 진입점 — onQualityReady() 에서 호출 */
function parseQualityData() {
  var res   = getRows(STATE.qualityWb);
  var rows  = forwardFillMerges(res.ws, res.rows);

  var row0  = rows[0] || [];   // 대분류(공정단계)
  var row2  = rows[2] || [];   // 소분류(측정항목)
  var row3  = rows[3] || [];   // 상세헤더
  var row4  = rows[4] || [];   // 기준 행

  var totalCols = row3.length;
  var roles       = classifyColumns(row3, row4);
  var stageGroups = buildStageGroups(roles, row0, totalCols);
  var valueMeta   = buildValueMeta(roles, row2, row3);

  STATE.qualityRecords = parseQualityRows(rows, stageGroups, roles, valueMeta);
  console.log('[품질파서] 레코드 수:', STATE.qualityRecords.length,
              '| 공정단계:', stageGroups.map(function(g){return g.stage;}).join(', '));
}

/* 3-H: 콜백 — Step 2의 handleFile()이 완료 후 호출 */
function onQualityReady() {
  parseQualityData();
  // Step 7 차트 렌더는 추후 구현
  tryRenderAll();
}

/* 두 파일 모두 준비됐을 때만 전체 렌더 시작 */
function tryRenderAll() {
  if (STATE.qualityRecords.length && Object.keys(STATE.byOutputLot).length) {
    document.getElementById('empty-state').style.display = 'none';
    if (typeof renderSidebar    === 'function') renderSidebar();
    if (typeof renderSpcCharts  === 'function') renderSpcCharts();
  }
}

/* ══════════════════════════════════════════════════════════════
   Step 4: 흐름도 파서
   ══════════════════════════════════════════════════════════════ */

/* 4-A / 4-B: 워크북 로드 + 단계 헤더 컬럼 위치 파악
   행 0: "1단계" ~ "6단계" 헤더 → 각 단계의 시작 컬럼 인덱스 수집
   반환: [{stageLabel, startCol}]
*/
function parseStageHeaders(rows) {
  var stages = [];
  var row0 = rows[0] || [];
  for (var c = 0; c < row0.length; c++) {
    var cell = String(row0[c] || '').trim();
    if (cell.indexOf('단계') !== -1) {
      stages.push({ stageLabel: cell, startCol: c });
    }
  }
  return stages;
}

/* 4-C: 각 단계 내 서브컬럼 구조 파악
   행 1: LOTNUM / 비고 / LOTNUM / 품목코드 / 품목명 / 투입량 등
   단계 시작 컬럼부터 다음 단계 시작 전까지 스캔
   반환: {lotNumCol, itemCodeCol, itemNameCol} (단계별 절대 컬럼 인덱스)
*/
function parseSubCols(rows, stages) {
  var row1 = rows[1] || [];
  var result = [];

  stages.forEach(function(stg, idx) {
    var endCol = idx + 1 < stages.length ? stages[idx + 1].startCol : row1.length;
    var sub = { stageLabel: stg.stageLabel, lotNumCols: [], itemCodeCol: null, itemNameCol: null };

    for (var c = stg.startCol; c < endCol; c++) {
      var cell = String(row1[c] || '').trim().toUpperCase();
      if (cell.indexOf('LOTNUM') !== -1 || cell.indexOf('LOT') !== -1) {
        sub.lotNumCols.push(c);
      } else if (cell.indexOf('품목코드') !== -1 || cell.indexOf('코드') !== -1) {
        sub.itemCodeCol = c;
      } else if (cell.indexOf('품목명') !== -1 || cell.indexOf('품명') !== -1) {
        sub.itemNameCol = c;
      }
    }
    result.push(sub);
  });
  return result;
}

/* 4-D / 4-E / 4-F: 데이터 행 순회 → 양방향 맵 + lotMeta 구축
   흐름도 구조: 높은 단계(완제품) → 낮은 단계(원료) 방향으로 읽음
   완제품 Lot = 가장 높은 단계(마지막)의 LOTNUM
   원료 Lot   = 그보다 낮은 단계들의 LOTNUM
*/
function parseFlowRows(rows, subCols) {
  var byOutput = {};  // 완제품Lot → [원료Lot, ...]
  var byInput  = {};  // 원료Lot  → [완제품Lot, ...]
  var lotMeta  = {};  // Lot → {itemCode, itemName}

  for (var r = 2; r < rows.length; r++) {
    var row = rows[r];

    // 각 단계에서 Lot 번호 + 메타 추출
    var stageLots = subCols.map(function(sub) {
      // lotNumCols 중 값이 있는 첫 번째 사용
      var lot = '';
      for (var i = 0; i < sub.lotNumCols.length; i++) {
        var v = String(row[sub.lotNumCols[i]] || '').trim();
        if (v) { lot = v; break; }
      }
      var itemCode = sub.itemCodeCol !== null ? String(row[sub.itemCodeCol] || '').trim() : '';
      var itemName = sub.itemNameCol !== null ? String(row[sub.itemNameCol] || '').trim() : '';
      return { lot: lot, itemCode: itemCode, itemName: itemName };
    });

    // lotMeta 저장
    stageLots.forEach(function(s) {
      if (!s.lot) return;
      if (!lotMeta[s.lot]) {
        lotMeta[s.lot] = { itemCode: s.itemCode, itemName: s.itemName };
      }
    });

    // 관계 구축: 단계 순서상 앞(완제품) → 뒤(원료)
    // 값이 있는 Lot 쌍끼리만 연결
    var validLots = stageLots.map(function(s) { return s.lot; }).filter(Boolean);
    if (validLots.length < 2) continue;

    // 첫 번째 유효 Lot을 완제품, 나머지를 원료로 처리
    // (흐름도가 완제품→원료 방향이므로 index 0이 완제품)
    var outputLot = validLots[0];
    for (var i = 1; i < validLots.length; i++) {
      var inputLot = validLots[i];
      if (!byOutput[outputLot]) byOutput[outputLot] = [];
      if (byOutput[outputLot].indexOf(inputLot) === -1) byOutput[outputLot].push(inputLot);

      if (!byInput[inputLot]) byInput[inputLot] = [];
      if (byInput[inputLot].indexOf(outputLot) === -1) byInput[inputLot].push(outputLot);
    }
  }

  return { byOutput: byOutput, byInput: byInput, lotMeta: lotMeta };
}

/* 4-G: 진입점 */
function parseFlowData() {
  var res  = getRows(STATE.flowWb);
  var rows = res.rows;

  var stages  = parseStageHeaders(rows);
  var subCols = parseSubCols(rows, stages);
  var maps    = parseFlowRows(rows, subCols);

  STATE.byOutputLot = maps.byOutput;
  STATE.byInputLot  = maps.byInput;
  STATE.lotMeta     = maps.lotMeta;

  var lotCount = Object.keys(maps.lotMeta).length;
  var edgeCount = Object.keys(maps.byOutput).reduce(function(s, k) {
    return s + maps.byOutput[k].length;
  }, 0);
  console.log('[흐름도파서] Lot 수:', lotCount, '| 관계 수:', edgeCount,
              '| 단계:', stages.map(function(s){return s.stageLabel;}).join(', '));
}

/* 4-G: 콜백 — Step 2의 handleFile()이 완료 후 호출 */
function onFlowReady() {
  parseFlowData();
  tryRenderAll();
}

/* ══════════════════════════════════════════════════════════════
   Step 5: Lot 사이드바
   ══════════════════════════════════════════════════════════════ */

/* 5-B: 현재 방향에 맞는 Lot 목록 반환
   'backward' → byOutputLot 키(완제품), 'forward' → byInputLot 키(원료)
*/
function getLotList() {
  var map = STATE.traceDir === 'backward' ? STATE.byOutputLot : STATE.byInputLot;
  return Object.keys(map).sort();
}

/* 5-D: 검색 필터 적용 (Lot명 또는 품목명 부분 매칭) */
function filterLots(lots, query) {
  if (!query) return lots;
  var q = query.toLowerCase();
  return lots.filter(function(lot) {
    if (lot.toLowerCase().indexOf(q) !== -1) return true;
    var meta = STATE.lotMeta[lot];
    if (meta && meta.itemName && meta.itemName.toLowerCase().indexOf(q) !== -1) return true;
    return false;
  });
}

/* 5-B: Lot 목록 DOM 렌더링 */
function renderLotList(lots) {
  var listEl  = document.getElementById('lot-list');
  var countEl = document.getElementById('lot-count');
  listEl.innerHTML = '';
  countEl.textContent = lots.length + '개 Lot';

  if (lots.length === 0) {
    listEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:0.82rem;">검색 결과 없음</div>';
    return;
  }

  lots.forEach(function(lot) {
    var meta = STATE.lotMeta[lot] || {};
    var item = document.createElement('div');
    item.className = 'lot-item' + (lot === STATE.selectedLot ? ' active' : '');
    item.dataset.lot = lot;
    item.innerHTML =
      '<span>' + lot + '</span>' +
      '<span class="lot-meta">' + (meta.itemName || '') + '</span>';

    // 5-E: 클릭 핸들러
    item.addEventListener('click', function() {
      document.querySelectorAll('.lot-item').forEach(function(el) {
        el.classList.remove('active');
      });
      item.classList.add('active');
      STATE.selectedLot = lot;
      if (typeof renderGenealogy   === 'function') renderGenealogy(lot);
      if (typeof renderTrackingTable === 'function') renderTrackingTable(lot);
    });

    listEl.appendChild(item);
  });
}

/* 5-A~5-D: 사이드바 전체 렌더 + 검색/토글 이벤트 연결 */
function renderSidebar() {
  var sidebar = document.getElementById('sidebar');
  sidebar.classList.remove('hidden');

  var allLots     = getLotList();
  renderLotList(allLots);

  // 5-D: 검색창 input 이벤트
  var searchInput = document.getElementById('lot-search');
  searchInput.oninput = function() {
    var filtered = filterLots(getLotList(), searchInput.value.trim());
    renderLotList(filtered);
  };

  // 5-C: 역추적/정추적 토글 버튼
  var btnReverse = document.getElementById('btn-reverse');
  var btnForward = document.getElementById('btn-forward');

  function setDir(dir) {
    STATE.traceDir = dir;
    btnReverse.classList.toggle('active', dir === 'backward');
    btnForward.classList.toggle('active', dir === 'forward');
    STATE.selectedLot = null; // 방향 전환 시 선택 초기화
    var filtered = filterLots(getLotList(), searchInput.value.trim());
    renderLotList(filtered);
    // 계보도/테이블 초기화
    var mermaidEl = document.getElementById('mermaid-viewer');
    if (mermaidEl) mermaidEl.innerHTML = '';
    var flowCard = document.getElementById('flow-card');
    if (flowCard) flowCard.style.display = 'none';
    var traceCard = document.getElementById('trace-card');
    if (traceCard) traceCard.style.display = 'none';
  }

  btnReverse.onclick = function() { setDir('backward'); };
  btnForward.onclick = function() { setDir('forward'); };
}

/* ══════════════════════════════════════════════════════════════
   Step 6: Mermaid 계보도
   ══════════════════════════════════════════════════════════════ */

/* 6-A: BFS 탐색 — 선택 Lot에서 연결된 모든 Lot·엣지 수집
   dir: 'backward' → byOutputLot(완제품→원료), 'forward' → byInputLot(원료→완제품)
   반환: { nodes: Set<lot>, edges: [{from, to}], truncated: bool }
*/
function collectRelatedLots(startLot, dir) {
  var map   = dir === 'backward' ? STATE.byOutputLot : STATE.byInputLot;
  var nodes = new Set([startLot]);
  var edges = [];
  var queue = [startLot];
  var MAX   = 50;

  while (queue.length > 0 && nodes.size < MAX) {
    var cur      = queue.shift();
    var children = map[cur] || [];
    children.forEach(function(child) {
      var from = dir === 'backward' ? cur   : child;
      var to   = dir === 'backward' ? child : cur;
      edges.push({ from: from, to: to });
      if (!nodes.has(child) && nodes.size < MAX) {
        nodes.add(child);
        queue.push(child);
      }
    });
  }
  return { nodes: nodes, edges: edges, truncated: nodes.size >= MAX };
}

/* 6-B / 6-C / 6-D: Mermaid 코드 빌드
   노드 라벨: Lot명 + 품목명, 선택 Lot 노드 빨간 강조
*/
function buildMermaidCode(nodes, edges, selectedLot) {
  function nodeId(lot) {
    return 'n_' + lot.replace(/[^a-zA-Z0-9가-힣]/g, '_');
  }
  function nodeLabel(lot) {
    var meta = STATE.lotMeta[lot];
    var name = meta && meta.itemName ? meta.itemName : '';
    return (name ? lot + '\n' + name : lot).replace(/"/g, "'");
  }

  var lines = ['flowchart TD'];

  nodes.forEach(function(lot) {
    lines.push('  ' + nodeId(lot) + '["' + nodeLabel(lot) + '"]');
  });

  var seen = new Set();
  edges.forEach(function(e) {
    var key = e.from + '\u2192' + e.to;
    if (seen.has(key)) return;
    seen.add(key);
    lines.push('  ' + nodeId(e.from) + ' --> ' + nodeId(e.to));
  });

  // 6-C: 선택 노드 강조
  lines.push('  style ' + nodeId(selectedLot) +
    ' fill:#ef4444,color:#fff,stroke:#c00,stroke-width:2px');

  return lines.join('\n');
}

/* 6-E: 렌더링 → SVG 삽입 */
function renderGenealogy(lot) {
  var flowCard  = document.getElementById('flow-card');
  var container = document.getElementById('mermaid-viewer');

  var result = collectRelatedLots(lot, STATE.traceDir);
  var code   = buildMermaidCode(result.nodes, result.edges, lot);

  flowCard.style.display = '';
  container.innerHTML    = '';

  if (result.truncated) {
    var warn = document.createElement('div');
    warn.style.cssText = 'color:var(--warning);font-size:0.8rem;margin-bottom:8px;text-align:center;';
    warn.textContent   = '\u26A0 노드가 50개를 초과하여 일부만 표시됩니다.';
    container.appendChild(warn);
  }

  var svgWrap = document.createElement('div');
  container.appendChild(svgWrap);

  mermaid.render('msg' + Date.now(), code).then(function(res) {
    svgWrap.innerHTML = res.svg;
  }).catch(function(err) {
    svgWrap.innerHTML =
      '<div style="color:var(--danger);padding:16px;">계보도 렌더링 오류: ' + err.message + '</div>';
  });
}

/* ══════════════════════════════════════════════════════════════
   Step 7: SPC 차트
   ══════════════════════════════════════════════════════════════ */

/* 7-A: qualityRecords → 공정단계별 그룹화
   반환: { stage: { itemLabel: [record, ...] } }
*/
function groupByStageAndItem() {
  var groups = {};
  STATE.qualityRecords.forEach(function(rec) {
    if (!groups[rec.stage]) groups[rec.stage] = {};
    if (!groups[rec.stage][rec.itemLabel]) groups[rec.stage][rec.itemLabel] = [];
    groups[rec.stage][rec.itemLabel].push(rec);
  });
  return groups;
}

/* 7-C: 이탈 여부 판별 (USL/LSL 기준) */
function isOutOfSpec(rec) {
  if (rec.USL !== null && !isNaN(rec.USL) && rec.value > rec.USL) return true;
  if (rec.LSL !== null && !isNaN(rec.LSL) && rec.value < rec.LSL) return true;
  return false;
}

/* 7-D / 7-E: annotation 플러그인용 관리선 config 생성
   UCL/LCL → 빨간 점선, USL/LSL → 주황 실선
   records 배열에서 첫 번째 유효한 기준값 사용
*/
function buildAnnotations(records) {
  var ann = {};
  var limitKeys = ['UCL', 'LCL', 'USL', 'LSL'];
  limitKeys.forEach(function(key) {
    var val = null;
    for (var i = 0; i < records.length; i++) {
      var v = records[i][key];
      if (v !== null && !isNaN(v)) { val = v; break; }
    }
    if (val === null) return;

    var isCtrl = key === 'UCL' || key === 'LCL'; // 관리한계 vs 규격한계
    ann[key] = {
      type:        'line',
      yMin:        val,
      yMax:        val,
      borderColor: isCtrl ? '#ef4444' : '#f59e0b',
      borderWidth: 1.5,
      borderDash:  isCtrl ? [6, 3] : [],
      label: {
        display:    true,
        content:    key + ' ' + val,
        position:   'end',
        font:       { size: 10 },
        color:      isCtrl ? '#ef4444' : '#f59e0b',
        backgroundColor: 'transparent',
        padding:    2,
      },
    };
  });
  return ann;
}

/* 7-F: 포인트 색상 배열 생성 (이탈 → 빨강, 정상 → 기본색) */
function buildPointColors(records, defaultColor) {
  return records.map(function(rec) {
    return isOutOfSpec(rec) ? '#ef4444' : defaultColor;
  });
}

/* 7-B / 7-G: 측정항목 1개당 차트 1개 생성
   canvasId: 고유 ID, records: 해당 항목 레코드 배열
*/
function createSpcChart(canvasId, itemLabel, records) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return null;

  var labels  = records.map(function(r) { return r.batchNo; });
  var values  = records.map(function(r) { return r.value; });
  var ptColors = buildPointColors(records, '#4a9eff');
  var anns    = buildAnnotations(records);

  var chart = new Chart(canvas, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label:                itemLabel,
        data:                 values,
        borderColor:          '#4a9eff',
        borderWidth:          2,
        tension:              0.3,
        pointRadius:          5,
        pointHoverRadius:     7,
        pointBackgroundColor: ptColors,
        pointBorderColor:     ptColors,
        fill:                 false,
      }],
    },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        annotation: { annotations: anns },
        tooltip: {
          callbacks: {
            afterLabel: function(ctx) {
              var rec = records[ctx.dataIndex];
              var lines = [];
              if (rec.USL !== null && !isNaN(rec.USL)) lines.push('USL: ' + rec.USL);
              if (rec.LSL !== null && !isNaN(rec.LSL)) lines.push('LSL: ' + rec.LSL);
              if (isOutOfSpec(rec)) lines.push('⚠ 규격 이탈');
              return lines;
            },
          },
        },
      },
      scales: {
        x: {
          ticks: { font: { size: 10 }, maxRotation: 45 },
          grid:  { color: 'rgba(128,128,128,0.15)' },
        },
        y: {
          ticks: { font: { size: 10 } },
          grid:  { color: 'rgba(128,128,128,0.15)' },
        },
      },
      // 7-H: 클릭 이벤트 → Step 8 Deep-Dive 연결
      onClick: function(event, elements) {
        if (!elements.length) return;
        var idx    = elements[0].index;
        var batchNo = records[idx].batchNo;
        handleChartClick(batchNo);
      },
    },
  });
  return chart;
}

/* 7-G: 공정단계별 섹션 카드 렌더링 */
function renderSpcCharts() {
  // 7-G: 이전 차트 인스턴스 destroy (메모리 누수 방지)
  STATE.chartInstances.forEach(function(c) { try { c.destroy(); } catch(e) {} });
  STATE.chartInstances = [];

  var container = document.getElementById('spc-container');
  container.innerHTML = '';

  var groups    = groupByStageAndItem();
  var stageList = Object.keys(groups);

  if (stageList.length === 0) return;

  stageList.forEach(function(stage) {
    // 섹션 래퍼
    var section = document.createElement('div');
    section.className = 'spc-section';

    var title = document.createElement('div');
    title.className   = 'spc-section-title';
    title.textContent = stage;
    section.appendChild(title);

    var grid = document.createElement('div');
    grid.className = 'charts-grid';

    var items = Object.keys(groups[stage]);
    items.forEach(function(itemLabel) {
      var records  = groups[stage][itemLabel];
      var canvasId = 'chart-' + (stage + '-' + itemLabel).replace(/[^a-zA-Z0-9가-힣]/g, '_');

      var box = document.createElement('div');
      box.className = 'chart-box';
      box.innerHTML =
        '<div class="chart-title">' + itemLabel + '</div>' +
        '<canvas id="' + canvasId + '"></canvas>';
      grid.appendChild(box);
      section.appendChild(grid);

      // 다음 프레임에 차트 생성 (DOM 삽입 후)
      setTimeout(function() {
        var chart = createSpcChart(canvasId, itemLabel, records);
        if (chart) STATE.chartInstances.push(chart);
      }, 0);
    });

    section.appendChild(grid);
    container.appendChild(section);
  });
}

/* ══════════════════════════════════════════════════════════════
   Step 8: Batch Deep-Dive
   ══════════════════════════════════════════════════════════════ */

/* 8-C: 모든 SPC 차트에서 해당 BatchNo 포인트 하이라이트
   해당 배치 → 빨간 테두리 + 큰 원, 나머지 → 원래 크기
*/
function highlightBatch(batchNo) {
  STATE.chartInstances.forEach(function(chart) {
    var ds     = chart.data.datasets[0];
    var labels = chart.data.labels;
    var newRadius = [];
    var newBorder = [];
    var newBg     = [];

    labels.forEach(function(label, i) {
      var isTarget = String(label) === String(batchNo);
      // 원래 포인트 색(이탈 여부에 따라)
      var origColor = Array.isArray(ds.pointBackgroundColor)
        ? ds.pointBackgroundColor[i]
        : (ds.pointBackgroundColor || '#4a9eff');

      newRadius.push(isTarget ? 10 : 5);
      newBorder.push(isTarget ? '#ef4444' : origColor);
      newBg.push(origColor);
    });

    ds.pointRadius      = newRadius;
    ds.pointBorderColor = newBorder;
    ds.pointBorderWidth = labels.map(function(l, i) {
      return String(l) === String(batchNo) ? 3 : 1;
    });
    ds.pointBackgroundColor = newBg;
    chart.update('none'); // 애니메이션 없이 즉시 갱신
  });
}

/* 8-C: 하이라이트 초기화 */
function clearHighlight() {
  STATE.chartInstances.forEach(function(chart) {
    var ds = chart.data.datasets[0];
    // pointBackgroundColor 는 원래 이탈 색상으로 복원
    // → 차트를 재빌드하지 않고 radius/border만 초기화
    ds.pointRadius      = 5;
    ds.pointBorderWidth = 1;
    // borderColor 는 pointBackgroundColor 와 동일하게
    ds.pointBorderColor = ds.pointBackgroundColor;
    chart.update('none');
  });
}

/* 8-B: 딥다이브 패널 렌더링
   batchNo 에 해당하는 전 공정 레코드를 공정단계별 테이블로 표시
*/
function renderDeepDive(batchNo) {
  var card    = document.getElementById('deep-dive-card');
  var content = document.getElementById('deep-dive-content');

  var recs = STATE.qualityRecords.filter(function(r) {
    return String(r.batchNo) === String(batchNo);
  });

  if (recs.length === 0) {
    card.classList.remove('visible');
    return;
  }

  // 공정단계별 그룹화
  var byStage = {};
  recs.forEach(function(r) {
    if (!byStage[r.stage]) byStage[r.stage] = [];
    byStage[r.stage].push(r);
  });

  var ngCount   = recs.filter(isOutOfSpec).length;
  var totalCount = recs.length;

  var html = '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;">' +
    '<span style="font-weight:700;font-size:1rem;">Batch: ' + batchNo + '</span>' +
    '<span class="badge-' + (ngCount > 0 ? 'danger' : 'success') + '">' +
      '이탈 ' + ngCount + ' / 전체 ' + totalCount +
    '</span>' +
    '<button id="deep-dive-close" class="btn btn-sm btn-secondary" style="margin-left:auto;">✕ 닫기</button>' +
  '</div>';

  Object.keys(byStage).forEach(function(stage) {
    html += '<div style="margin-bottom:16px;">';
    html += '<div class="chart-title" style="margin-bottom:6px;">' + stage + '</div>';
    html += '<div class="trace-table-wrap"><table class="data-table"><thead><tr>' +
      '<th>측정항목</th><th>측정값</th><th>USL</th><th>LSL</th><th>UCL</th><th>LCL</th><th>판정</th>' +
      '</tr></thead><tbody>';

    byStage[stage].forEach(function(r) {
      var ng  = isOutOfSpec(r);
      var cls = ng ? ' class="cell-exceed"' : '';
      html +=
        '<tr>' +
        '<td>' + r.itemLabel + '</td>' +
        '<td' + cls + '>' + r.value + '</td>' +
        '<td>' + (r.USL !== null && !isNaN(r.USL) ? r.USL : '-') + '</td>' +
        '<td>' + (r.LSL !== null && !isNaN(r.LSL) ? r.LSL : '-') + '</td>' +
        '<td>' + (r.UCL !== null && !isNaN(r.UCL) ? r.UCL : '-') + '</td>' +
        '<td>' + (r.LCL !== null && !isNaN(r.LCL) ? r.LCL : '-') + '</td>' +
        '<td' + cls + '>' + (ng ? 'NG' : 'OK') + '</td>' +
        '</tr>';
    });

    html += '</tbody></table></div></div>';
  });

  content.innerHTML = html;
  card.classList.add('visible');

  // 8-D: 닫기 버튼
  document.getElementById('deep-dive-close').addEventListener('click', function() {
    card.classList.remove('visible');
    STATE.selectedBatch = null;
    clearHighlight();
  });
}

/* 8-A: 차트 클릭 진입점 (Step 7의 onClick에서 호출) */
function handleChartClick(batchNo) {
  STATE.selectedBatch = batchNo;
  highlightBatch(batchNo);
  renderDeepDive(batchNo);
  // 딥다이브 카드로 스크롤
  document.getElementById('deep-dive-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
