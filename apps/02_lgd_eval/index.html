<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../../assets/css/global_style.css">
<style>
/* ── 자립형 CSS 변수 (GAS 배포 시 global_style.css 미로드 대비) ── */
:root {
  --primary:         #4f6ef7;
  --primary-light:   #6b83ff;
  --primary-bg:      rgba(79,110,247,0.08);
  --text:            #1a1f3e;
  --text-secondary:  #6b7280;
  --text-tertiary:   #9ca3af;
  --bg:              #f4f6fb;
  --bg-secondary:    #ffffff;
  --bg-deep:         #e8ecf4;
  --border:          #d1d5e8;
  --border-hover:    #b0b7d1;
  --success:         #10b981;
  --success-bg:      rgba(16,185,129,0.08);
  --error:           #ef4444;
  --error-bg:        rgba(239,68,68,0.08);
  --warning:         #f59e0b;
  --radius:          12px;
  --radius-sm:       8px;
  --font-body:       'Inter','Noto Sans KR',sans-serif;
  --font-mono:       'JetBrains Mono',Consolas,monospace;
}

/* ── 기본 리셋 · 바디 ── */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body {
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

/* ── 카드 ── */
.card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 16px;
}
.card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

/* ── 버튼 ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 8px 18px;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s, border-color .15s, color .15s, box-shadow .15s;
  white-space: nowrap;
}
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
.btn-primary:hover:not(:disabled) {
  background: var(--primary-light);
  border-color: var(--primary-light);
  box-shadow: 0 4px 14px rgba(79,110,247,0.35);
}
.btn-block { width: 100%; }

/* ── 폼 인풋 ── */
.form-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  appearance: none;
}
.form-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-bg);
}
.form-input::placeholder { color: var(--text-tertiary); }

/* ── 프로그레스 ── */
.progress-track {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 8px;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: var(--primary);
  border-radius: 2px;
  transition: width .3s ease;
}

/* ──────────────────────────────────────────────── */

body {
  padding: 32px 24px;
}

.container {
  max-width: 800px;
  margin: 0 auto;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo {
  width: 40px; height: 40px;
  background: var(--primary);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-weight: 700;
  font-size: 18px;
}

.header h1 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}

.header .desc {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 1px;
}

.conn-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 500;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-tertiary);
  cursor: pointer;
  transition: all .15s;
}

.conn-badge:hover { border-color: var(--border-hover); }

.btn-sheet {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 500;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid rgba(0,184,148,.4);
  background: var(--success-bg);
  color: var(--success);
  cursor: pointer;
  text-decoration: none;
  transition: all .15s;
}
.btn-sheet:hover { filter: brightness(1.1); border-color: var(--success); }

.conn-badge .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text-tertiary);
}

.conn-badge.ok .dot { background: var(--success); }
.conn-badge.ok { color: var(--success); border-color: rgba(0,184,148,.3); }
.conn-badge.err .dot { background: var(--error); }
.conn-badge.err { color: var(--error); border-color: rgba(231,76,60,.3); }
.conn-badge.loading .dot {
  background: var(--warning);
  animation: pulse 1s infinite;
}
.conn-badge.loading { color: var(--warning); border-color: rgba(243,156,18,.3); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .4; }
}

/* ── Card ── */
.card-header .icon {
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}

/* ── Form Grid ── */
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14px;
}

.form-row-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.field { margin-bottom: 0; }

.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.field label .req { color: var(--error); font-size: 10px; margin-left: 2px; }
.field label .opt { color: var(--text-tertiary); font-size: 10px; margin-left: 2px; }


.file-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 14px;
}

.file-tag {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 6px;
  background: var(--bg-secondary);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  font-weight: 500;
}

.file-tag.pdf { background: rgba(248,113,113,0.10); color: #f87171; border-color: rgba(248,113,113,0.3); }
html[data-theme="light"] .file-tag.pdf { background: #fff0f0; color: #c0392b; border-color: #f5c6cb; }
.file-tag.xlsx { background: rgba(52,211,153,0.10); color: #34d399; border-color: rgba(52,211,153,0.3); }
html[data-theme="light"] .file-tag.xlsx { background: #e8f5e9; color: #27ae60; border-color: #c8e6c9; }

/* ── Progress ── */
.progress-section { display: none; margin-top: 18px; }
.progress-section.show { display: block; }

.progress-text {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 500;
}

.log {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  max-height: 200px;
  overflow-y: auto;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 11px;
  line-height: 1.9;
  margin-top: 12px;
}

.log-line { display: flex; gap: 8px; }
.log-time { color: var(--text-tertiary); flex-shrink: 0; }
.log-ok { color: var(--success); }
.log-err { color: var(--error); }
.log-info { color: var(--text); }
.log-warn { color: var(--warning); }

/* ── Responsive ── */
@media (max-width: 640px) {
  body { padding: 20px 16px; }
  .form-row { grid-template-columns: 1fr; }
  .form-row-2 { grid-template-columns: 1fr; }
  .header { flex-direction: column; align-items: flex-start; gap: 12px; }
}
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">L</div>
      <div>
        <h1>LGD 사전심사자료 자동화</h1>
        <div class="desc">정보 입력 후 PDF / 엑셀 일괄 다운로드</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <a class="btn-sheet" id="btnSheet" href="https://docs.google.com/spreadsheets/d/1kh2oBZYKXaadIJoZQJ5OPYZHlwZftiFpuIT45v2SjTk/edit" target="_blank">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/><path d="M3 9h18M9 9v12" stroke="currentColor" stroke-width="2"/></svg>
        구글시트 열기
      </a>
      <div class="conn-badge loading" id="connBadge" onclick="testConn()">
        <span class="dot"></span>
        <span id="connText">확인 중</span>
      </div>
    </div>
  </div>

  <!-- 기본 정보 -->
  <div class="card">
    <div class="card-header">
      <span class="icon">&#9997;</span> 기본 정보
    </div>
    <div class="form-row">
      <div class="field">
        <label>작성일 <span class="req">*</span></label>
        <input type="date" id="f_작성일" class="form-input">
      </div>
      <div class="field">
        <label>제품명 <span class="req">*</span></label>
        <input type="text" id="f_제품명" class="form-input" placeholder="LT-PHM248">
      </div>
      <div class="field">
        <label>색상</label>
        <input type="text" id="f_색상" class="form-input" placeholder="노란색 분말">
      </div>
    </div>
  </div>

  <!-- 상품명 -->
  <div class="card">
    <div class="card-header">
      <span class="icon">&#128230;</span> 상품명 (구성제품확인서용)
    </div>
    <div class="form-row">
      <div class="field">
        <label>상품명1 <span class="req">*</span></label>
        <input type="text" id="f_상품명1" class="form-input" placeholder="LT-123">
      </div>
      <div class="field">
        <label>상품명2 <span class="opt">선택</span></label>
        <input type="text" id="f_상품명2" class="form-input" placeholder="2개 이상일 때">
      </div>
      <div class="field">
        <label>상품명3 <span class="opt">선택</span></label>
        <input type="text" id="f_상품명3" class="form-input" placeholder="3개일 때">
      </div>
    </div>
  </div>

  <!-- 다운로드 -->
  <div class="card">
    <div class="card-header">
      <span class="icon">&#11015;</span> 다운로드
    </div>

    <button class="btn btn-primary btn-block" id="btnAll" onclick="downloadAll()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v10m0 0l-3.5-3.5M8 11l3.5-3.5M2 13h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      전체 다운로드 (ZIP)
    </button>

    <div class="file-tags">
      <span class="file-tag pdf">MSDS.pdf</span>
      <span class="file-tag pdf">경고표지.pdf</span>
      <span class="file-tag pdf">구성제품확인서.pdf</span>
      <span class="file-tag pdf">작업공정별관리요령.pdf</span>
      <span class="file-tag pdf">비공개물질확인서.pdf</span>
      <span class="file-tag xlsx">MSDS.xlsx</span>
      <span class="file-tag xlsx">Checksheet.xlsx</span>
    </div>

    <div class="progress-section" id="progressSection">
      <div class="progress-track">
        <div class="progress-fill" id="progressBar"></div>
      </div>
      <div class="progress-text" id="progressText">준비 중...</div>
      <div class="log" id="logArea"></div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
var $ = function(id) { return document.getElementById(id); };

// ── 버전 설정 (업데이트 시 여기만 수정) ──
var PRIVATE_SUBSTANCE_VER = '25.8월 Ver';

// ── 파일명 규칙 적용 ──
function applyFileNameRules(fileName) {
  var ext = '';
  var dotIdx = fileName.lastIndexOf('.');
  if (dotIdx !== -1) {
    ext = fileName.substring(dotIdx);
    fileName = fileName.substring(0, dotIdx);
  }
  // 구성제품확인서 뒤 숫자 제거 (구성제품확인서1 → 구성제품확인서)
  fileName = fileName.replace(/(구성제품확인서)\d+$/, '$1');
  // 비공개물질 파일에 버전 suffix
  if (fileName.indexOf('비공개물질') !== -1) {
    fileName = fileName + ' (' + PRIVATE_SUBSTANCE_VER + ')';
  }
  // 모든 파일 앞에 LT소재_ 프리픽스
  return 'LT소재_' + fileName + ext;
}

function getFormData() {
  return {
    '작성일': $('f_작성일').value.trim(),
    '제품명': $('f_제품명').value.trim(),
    '색상':   $('f_색상').value.trim(),
    '상품명1': $('f_상품명1').value.trim(),
    '상품명2': $('f_상품명2').value.trim(),
    '상품명3': $('f_상품명3').value.trim(),
  };
}

function validate() {
  var d = getFormData();
  if (!d['작성일']) return '작성일을 입력하세요.';
  if (!d['제품명']) return '제품명을 입력하세요.';
  if (!d['상품명1']) return '상품명1을 입력하세요.';
  return null;
}

// ── 연결 테스트 ──
function testConn() {
  setConn('loading', '확인 중');
  google.script.run
    .withSuccessHandler(function(r) {
      setConn(r.ok ? 'ok' : 'err', r.ok ? '연결됨' : '오류');
    })
    .withFailureHandler(function() {
      setConn('err', '연결 실패');
    })
    .testConnection();
}

function setConn(type, msg) {
  var badge = $('connBadge');
  badge.className = 'conn-badge ' + type;
  $('connText').textContent = msg;
}

// ── 전체 다운로드 (ZIP) ──
function downloadAll() {
  var err = validate();
  if (err) { alert(err); return; }

  if (typeof JSZip === 'undefined') {
    alert('JSZip 라이브러리를 불러오는 중입니다. 잠시 후 다시 시도하세요.');
    return;
  }

  var data = getFormData();
  var btn = $('btnAll');
  btn.disabled = true;

  $('progressSection').classList.add('show');
  clearLog();
  log('info', '서버에서 전체 파일 생성 중...');
  setProgress(10, '서버 처리 중...');

  google.script.run
    .withSuccessHandler(function(result) {
      if (!result.ok) {
        log('err', '서버 오류: ' + result.error);
        setProgress(100, '실패');
        btn.disabled = false;
        return;
      }

      var files = result.files;
      var failCount = 0;
      log('info', files.length + '개 파일 수신 완료 — ZIP 묶는 중...');
      setProgress(65, 'ZIP 생성 중...');

      var zip = new JSZip();

      for (var i = 0; i < files.length; i++) {
        var f = files[i];
        if (f.ok) {
          var dlName = applyFileNameRules(f.fileName);
          var raw = atob(f.fileData);
          var bytes = new Uint8Array(raw.length);
          for (var j = 0; j < raw.length; j++) bytes[j] = raw.charCodeAt(j);
          zip.file(dlName, bytes);
          log('ok', dlName + ' 추가됨');
        } else {
          log('err', f.label + ' - ' + f.error);
          failCount++;
        }
      }

      setProgress(85, 'ZIP 압축 중...');

      zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } })
        .then(function(blob) {
          var today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
          var zipName = 'LT소재_' + data['제품명'] + '_사전심사자료_' + today + '.zip';
          var a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = zipName;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(a.href);

          setProgress(100, failCount > 0 ? (failCount + '개 실패') : '완료!');
          log(failCount > 0 ? 'warn' : 'ok',
            'ZIP 다운로드 완료: ' + zipName +
            (failCount > 0 ? ' (' + failCount + '개 실패)' : ''));
          btn.disabled = false;
        });
    })
    .withFailureHandler(function(err) {
      log('err', '서버 호출 실패: ' + err.message);
      setProgress(100, '실패');
      btn.disabled = false;
    })
    .generateAllFiles(data);
}

// ── UI 헬퍼 ──
function setProgress(pct, text) {
  $('progressBar').style.width = pct + '%';
  $('progressText').textContent = text;
}

function log(type, msg) {
  var area = $('logArea');
  var t = new Date().toLocaleTimeString('ko-KR', { hour12: false });
  area.innerHTML += '<div class="log-line"><span class="log-time">' + t +
    '</span><span class="log-' + type + '">' + msg + '</span></div>';
  area.scrollTop = area.scrollHeight;
}

function clearLog() { $('logArea').innerHTML = ''; }


window.addEventListener('DOMContentLoaded', function() {
  testConn();
  var today = new Date().toISOString().split('T')[0];
  $('f_작성일').value = today;
});
</script>

</body>
</html>
