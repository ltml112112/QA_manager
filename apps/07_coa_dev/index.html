<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="../../assets/css/global_style.css">
<script>window._AG_ADMIN_ONLY = true;</script>
<script src="../../assets/js/auth_guard.js"></script>
<style>
body { padding: 24px; }
.container { max-width: 900px; margin: 0 auto; }
.center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 320px; text-align: center; gap: 12px; }
.wip-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: var(--warning); background: var(--warning-bg); border: 1px solid var(--warning); border-radius: 4px; padding: 2px 8px; display: inline-block; }
.wip-title { font-size: 1.25rem; font-weight: 700; color: var(--text); }
.wip-desc { color: var(--text-muted); font-size: 0.9rem; line-height: 1.7; max-width: 480px; }
</style></head>
<body>
<div class="container">
  <div class="card">
    <div class="card-header">COA 생성 — 개발용</div>
    <div class="center">
      <span class="wip-label">개발 예정</span>
      <div class="wip-title">COA 생성 — 개발용</div>
      <div class="wip-desc">
        개발 단계 소재의 COA(성적서)를 자동 생성하는 도구입니다.<br>
        분석 데이터 입력 → 양식 자동 채움 → PDF/Excel 출력 기능이 구현될 예정입니다.
      </div>
    </div>
  </div>
</div>
<script>
(function() {
  function applyTheme(theme) {
    document.documentElement.dataset.theme = theme;
    localStorage.setItem('qa_theme', theme);
  }
  applyTheme(localStorage.getItem('qa_theme') || 'dark');
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'setTheme') applyTheme(e.data.theme);
  });
})();
</script>
</body>
</html>
