<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>회원가입 — 품질경영팀 포털</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="./assets/css/global_style.css">
<style>
html, body {
  height: 100%;
  margin: 0;
}
body {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--portal-bg);
  font-family: 'Inter', 'Noto Sans KR', sans-serif;
}

.reg-wrap {
  width: 100%;
  max-width: 420px;
  padding: 24px;
  zoom: 1.35;
}

.reg-brand {
  text-align: center;
  margin-bottom: 28px;
}
.reg-logo {
  width: 140px;
  height: auto;
  border-radius: 10px;
  margin-bottom: 14px;
  box-shadow: 0 2px 12px rgba(190,0,57,0.12);
}
.reg-brand-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--portal-text);
  margin-bottom: 2px;
}
.reg-brand-sub {
  font-size: 11px;
  color: var(--portal-text-muted);
}

/* 상태 화면 */
.reg-checking {
  display: none;
  text-align: center;
  padding: 40px 0;
}
.reg-checking .chk-spinner {
  width: 28px;
  height: 28px;
  border: 3px solid var(--portal-border);
  border-top-color: var(--portal-accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
.reg-checking .chk-text {
  font-size: 13px;
  color: var(--portal-text-muted);
}

/* 카드 */
.reg-card {
  background: var(--portal-surface);
  border: 1px solid var(--portal-border);
  border-radius: 16px;
  padding: 28px 28px 24px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
}

.reg-card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--portal-text);
  margin-bottom: 6px;
  text-align: center;
}
.reg-card-desc {
  font-size: 12px;
  color: var(--portal-text-muted);
  text-align: center;
  margin-bottom: 20px;
  line-height: 1.5;
}
.reg-domain-badge {
  display: inline-block;
  background: var(--portal-accent-glow);
  color: var(--portal-accent);
  border: 1px solid rgba(190,0,57,0.2);
  border-radius: 6px;
  padding: 1px 8px;
  font-size: 12px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
}

.reg-field {
  margin-bottom: 14px;
}
.reg-field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--portal-text-muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.reg-field input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--portal-border);
  border-radius: 8px;
  background: var(--portal-bg);
  color: var(--portal-text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  box-sizing: border-box;
}
.reg-field input:focus {
  border-color: var(--portal-accent);
  box-shadow: 0 0 0 3px var(--portal-accent-glow);
}
.reg-field input.inp-error {
  border-color: var(--portal-danger);
}
.reg-field .field-hint {
  font-size: 11px;
  color: var(--portal-text-faint);
  margin-top: 5px;
}

.reg-btn {
  width: 100%;
  padding: 11px;
  background: var(--portal-accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  margin-top: 6px;
  transition: background 0.15s, opacity 0.15s;
}
.reg-btn:hover:not(:disabled) { background: var(--portal-accent-hover); }
.reg-btn:disabled { opacity: 0.55; cursor: not-allowed; }

.reg-err {
  font-size: 12px;
  color: var(--portal-danger);
  text-align: center;
  min-height: 20px;
  margin-top: 10px;
  line-height: 1.4;
}

.reg-footer {
  text-align: center;
  margin-top: 18px;
  font-size: 12px;
  color: var(--portal-text-muted);
}
.reg-footer a {
  color: var(--portal-accent);
  text-decoration: none;
  font-weight: 600;
}
.reg-footer a:hover { text-decoration: underline; }

/* 성공 화면 */
.reg-success {
  display: none;
  text-align: center;
  padding: 8px 0 4px;
}
.reg-success-icon {
  font-size: 40px;
  margin-bottom: 12px;
}
.reg-success-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--portal-text);
  margin-bottom: 8px;
}
.reg-success-msg {
  font-size: 13px;
  color: var(--portal-text-muted);
  line-height: 1.6;
  margin-bottom: 20px;
}
.reg-success-email {
  font-weight: 700;
  color: var(--portal-accent);
}
.reg-success-note {
  font-size: 11px;
  color: var(--portal-text-faint);
  background: var(--portal-surface-2);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 16px;
  line-height: 1.5;
  text-align: left;
}
.reg-success-btn {
  display: block;
  width: 100%;
  padding: 10px;
  background: transparent;
  border: 1px solid var(--portal-border);
  border-radius: 8px;
  font-size: 13px;
  color: var(--portal-text-muted);
  font-family: inherit;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.reg-success-btn:hover {
  background: var(--portal-surface-2);
  color: var(--portal-text);
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="reg-wrap">
  <!-- 브랜드 -->
  <div class="reg-brand">
    <img class="reg-logo" src="./assets/img/lt_logo.jpg" alt="LT Materials">
    <div class="reg-brand-name">품질경영팀 포털</div>
    <div class="reg-brand-sub">전자재료사업부</div>
  </div>

  <!-- 인증 확인 중 -->
  <div class="reg-checking" id="regChecking">
    <div class="chk-spinner"></div>
    <div class="chk-text">확인 중...</div>
  </div>

  <!-- 가입 카드 -->
  <div class="reg-card" id="regCard" style="display:none;">
    <div class="reg-card-title">회원가입</div>
    <div class="reg-card-desc">
      회사 이메일로만 가입할 수 있습니다<br>
      <span class="reg-domain-badge">@ltml.co.kr</span>
    </div>

    <div class="reg-field">
      <label for="emailInp">회사 이메일</label>
      <input type="email" id="emailInp" placeholder="name@ltml.co.kr" autocomplete="username">
      <div class="field-hint">@ltml.co.kr 이메일만 사용 가능합니다</div>
    </div>
    <div class="reg-field">
      <label for="pwInp">비밀번호</label>
      <input type="password" id="pwInp" placeholder="8자 이상 입력" autocomplete="new-password">
      <div class="field-hint">영문·숫자 조합 8자 이상 권장</div>
    </div>
    <div class="reg-field">
      <label for="pwConfInp">비밀번호 확인</label>
      <input type="password" id="pwConfInp" placeholder="비밀번호 재입력" autocomplete="new-password">
    </div>

    <button class="reg-btn" id="regBtn">인증 메일 발송</button>
    <div class="reg-err" id="regErr"></div>

    <!-- 성공 화면 (카드 내부) -->
    <div class="reg-success" id="regSuccess">
      <div class="reg-success-icon">✉️</div>
      <div class="reg-success-title">인증 메일을 발송했습니다</div>
      <div class="reg-success-msg">
        <span class="reg-success-email" id="sentEmailText"></span><br>
        으로 인증 링크를 보냈습니다.<br>메일함을 확인하고 링크를 클릭하면<br>가입이 완료됩니다.
      </div>
      <div class="reg-success-note">
        · 스팸 메일함도 확인해보세요<br>
        · 인증 링크는 24시간 유효합니다<br>
        · 인증 후 이 페이지에서 로그인하세요
      </div>
      <button class="reg-success-btn" id="goLoginBtn">로그인 페이지로 이동</button>
    </div>
  </div>

  <!-- 하단 링크 -->
  <div class="reg-footer" id="regFooter">
    이미 계정이 있으신가요? <a href="./login.html">로그인</a>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
(function () {
  var ALLOWED_DOMAIN = '@ltml.co.kr';

  var firebaseConfig = {
    apiKey:            'AIzaSyAk9PGqBHxiG9fVwVZZg6ZGBOWaaSAXOBc',
    authDomain:        'qa-manager-9c145.firebaseapp.com',
    databaseURL:       'https://qa-manager-9c145-default-rtdb.asia-southeast1.firebasedatabase.app',
    projectId:         'qa-manager-9c145',
    storageBucket:     'qa-manager-9c145.firebasestorage.app',
    messagingSenderId: '1037146076792',
    appId:             '1:1037146076792:web:b8ddcdb31d527d2d545f8d'
  };
  firebase.initializeApp(firebaseConfig);
  var auth = firebase.auth();

  var checking  = document.getElementById('regChecking');
  var card      = document.getElementById('regCard');
  var emailInp  = document.getElementById('emailInp');
  var pwInp     = document.getElementById('pwInp');
  var pwConfInp = document.getElementById('pwConfInp');
  var regBtn    = document.getElementById('regBtn');
  var errEl     = document.getElementById('regErr');
  var successEl = document.getElementById('regSuccess');
  var regFooter = document.getElementById('regFooter');

  // 인증 확인 중 표시
  checking.style.display = 'block';

  // 이미 로그인 & 인증 완료 → 포털로
  auth.onAuthStateChanged(function (user) {
    if (user && user.emailVerified) {
      window.location.replace('./index.html');
      return;
    }
    // 미로그인 또는 인증 미완료 → 가입 폼 표시
    if (user) auth.signOut(); // 인증 미완료 계정은 일단 로그아웃
    checking.style.display = 'none';
    card.style.display = 'block';
    emailInp.focus();
  });

  function clearErrors() {
    errEl.textContent = '';
    [emailInp, pwInp, pwConfInp].forEach(function (i) { i.classList.remove('inp-error'); });
  }

  function showErr(msg, ...fields) {
    errEl.textContent = msg;
    fields.forEach(function (f) { f.classList.add('inp-error'); });
  }

  function doRegister() {
    clearErrors();
    var email   = emailInp.value.trim().toLowerCase();
    var pw      = pwInp.value;
    var pwConf  = pwConfInp.value;

    // 도메인 검증
    if (!email) {
      showErr('이메일을 입력하세요.', emailInp); emailInp.focus(); return;
    }
    if (!email.endsWith(ALLOWED_DOMAIN)) {
      showErr('@ltml.co.kr 이메일만 가입할 수 있습니다.', emailInp); emailInp.focus(); return;
    }
    if (!pw) {
      showErr('비밀번호를 입력하세요.', pwInp); pwInp.focus(); return;
    }
    if (pw.length < 8) {
      showErr('비밀번호는 8자 이상이어야 합니다.', pwInp); pwInp.focus(); return;
    }
    if (pw !== pwConf) {
      showErr('비밀번호가 일치하지 않습니다.', pwInp, pwConfInp); pwConfInp.focus(); return;
    }

    regBtn.disabled    = true;
    regBtn.textContent = '처리 중...';

    // Firebase 계정 생성
    auth.createUserWithEmailAndPassword(email, pw)
      .then(function (cred) {
        // 인증 메일 발송
        return cred.user.sendEmailVerification().then(function () {
          return cred.user;
        });
      })
      .then(function () {
        // 성공 화면 표시
        document.getElementById('sentEmailText').textContent = email;
        document.getElementById('fldArea').style.display = 'none';
        successEl.style.display = 'block';
        regBtn.style.display    = 'none';
        errEl.style.display     = 'none';
        regFooter.style.display = 'none';
        auth.signOut(); // 인증 전까지는 로그아웃 상태 유지
      })
      .catch(function (err) {
        regBtn.disabled    = false;
        regBtn.textContent = '인증 메일 발송';
        var msg;
        switch (err.code) {
          case 'auth/email-already-in-use':
            msg = '이미 가입된 이메일입니다. 로그인 페이지를 이용하세요.';
            emailInp.classList.add('inp-error');
            break;
          case 'auth/invalid-email':
            msg = '올바른 이메일 형식이 아닙니다.';
            emailInp.classList.add('inp-error');
            break;
          case 'auth/weak-password':
            msg = '비밀번호가 너무 단순합니다. 더 강력한 비밀번호를 사용하세요.';
            pwInp.classList.add('inp-error');
            break;
          default:
            msg = '가입에 실패했습니다. 잠시 후 다시 시도하세요.';
        }
        errEl.textContent = msg;
      });
  }

  regBtn.addEventListener('click', doRegister);
  [emailInp, pwInp, pwConfInp].forEach(function (inp) {
    inp.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        if (inp === emailInp)  pwInp.focus();
        else if (inp === pwInp) pwConfInp.focus();
        else doRegister();
      }
    });
    inp.addEventListener('input', function () {
      inp.classList.remove('inp-error');
      errEl.textContent = '';
    });
  });

  document.getElementById('goLoginBtn').addEventListener('click', function () {
    window.location.href = './login.html';
  });
})();
</script>

<!-- 필드 영역 그루핑 (성공 시 숨기기용) -->
<script>
// 필드 영역 div 삽입 (JS로 동적 래핑)
(function () {
  var card   = document.getElementById('regCard');
  var fields = card.querySelectorAll('.reg-field, .reg-btn, .reg-err');
  var wrap   = document.createElement('div');
  wrap.id    = 'fldArea';
  var first  = fields[0];
  card.insertBefore(wrap, first);
  fields.forEach(function (el) { wrap.appendChild(el); });
})();
</script>
</body>
</html>
