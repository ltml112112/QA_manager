<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="./assets/css/global_style.css">
<style>
/* ── 인증 게이트 오버레이 ─────────────────────────────────────────── */
#auth-gate {
  position: fixed;
  inset: 0;
  z-index: 99999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--portal-bg);
  gap: 14px;
  font-family: 'Inter', 'Noto Sans KR', sans-serif;
}
#auth-gate .ag-spinner {
  width: 30px;
  height: 30px;
  border: 3px solid var(--portal-border);
  border-top-color: var(--portal-accent);
  border-radius: 50%;
  animation: ag-spin 0.8s linear infinite;
}
#auth-gate .ag-text {
  font-size: 12px;
  color: var(--portal-text-muted);
}
/* 인증 미완료 / 접근 불가 안내 카드 */
#auth-gate .ag-card {
  background: var(--portal-surface);
  border: 1px solid var(--portal-border);
  border-radius: 16px;
  padding: 32px 32px 28px;
  width: 340px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
#auth-gate .ag-card-icon { font-size: 36px; }
#auth-gate .ag-card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--portal-text);
}
#auth-gate .ag-card-msg {
  font-size: 13px;
  color: var(--portal-text-muted);
  line-height: 1.6;
}
#auth-gate .ag-card-email {
  font-size: 13px;
  font-weight: 600;
  color: var(--portal-accent);
  word-break: break-all;
}
#auth-gate .ag-card-note {
  font-size: 11px;
  color: var(--portal-text-faint);
  background: var(--portal-surface-2);
  border-radius: 8px;
  padding: 10px 12px;
  text-align: left;
  line-height: 1.6;
}
#auth-gate .ag-btn-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 4px;
}
#auth-gate .ag-btn {
  padding: 9px;
  border-radius: 8px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  font-weight: 600;
  transition: background 0.15s, color 0.15s;
}
#auth-gate .ag-btn-primary {
  background: var(--portal-accent);
  color: #fff;
  border: none;
}
#auth-gate .ag-btn-primary:hover { background: var(--portal-accent-hover); }
#auth-gate .ag-btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
#auth-gate .ag-btn-ghost {
  background: transparent;
  color: var(--portal-text-muted);
  border: 1px solid var(--portal-border);
}
#auth-gate .ag-btn-ghost:hover {
  background: var(--portal-surface-2);
  color: var(--portal-text);
}
@keyframes ag-spin { to { transform: rotate(360deg); } }

/* ── 비밀번호 변경 카드 인풋 ──────────────────────────────────────── */
#auth-gate .ag-pw-input {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--portal-border);
  border-radius: 8px;
  background: var(--portal-bg);
  color: var(--portal-text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  box-sizing: border-box;
  transition: border-color 0.15s, box-shadow 0.15s;
  margin-bottom: 8px;
  display: block;
}
#auth-gate .ag-pw-input:focus {
  border-color: var(--portal-accent);
  box-shadow: 0 0 0 3px var(--portal-accent-glow);
}
#auth-gate .ag-pw-input.inp-error { border-color: var(--portal-danger); }
#auth-gate .ag-pw-err {
  font-size: 12px;
  color: var(--portal-danger);
  text-align: center;
  min-height: 16px;
  margin-bottom: 4px;
  line-height: 1.4;
}

/* ── 사이드바 하단 사용자 영역 ───────────────────────────────────── */
.sidebar-footer {
  flex-direction: column !important;
  align-items: stretch !important;
  gap: 0 !important;
  padding: 0 !important;
}
.footer-status-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px 8px;
}
.user-footer {
  border-top: 1px solid var(--portal-border);
  padding: 10px 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.user-info-row {
  display: flex;
  align-items: center;
  gap: 7px;
  min-width: 0;
}
.user-role-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  flex-shrink: 0;
  letter-spacing: 0.03em;
}
.user-role-badge.role-admin {
  background: var(--portal-accent);
  color: #fff;
}
.user-role-badge.role-user {
  background: var(--portal-surface-2);
  color: var(--portal-text-muted);
  border: 1px solid var(--portal-border);
}
.user-email-text {
  font-size: 11px;
  color: var(--portal-text-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  min-width: 0;
}
.logout-btn {
  width: 100%;
  padding: 7px;
  border: 1px solid var(--portal-border);
  border-radius: 7px;
  background: transparent;
  color: var(--portal-text-muted);
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  text-align: center;
}
.logout-btn:hover {
  background: var(--portal-surface-2);
  color: var(--portal-text);
  border-color: var(--portal-text-muted);
}
/* ── 관리자 전용 — 게스트 뷰 토글 ───────────────────────────────── */
.view-toggle-row {
  padding: 0 14px 6px;
}
.view-toggle-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 6px 10px;
  border-radius: 7px;
  font-size: 11px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;

}
.view-toggle-btn:hover {

}
.view-toggle-btn.guest-mode {

}
.view-toggle-btn.guest-mode:hover {
  background: rgba(190, 0, 57, 0.13);
}
.user-role-badge.role-preview {

/* ── 사용자 관리 모달 ─────────────────────────────────────────── */

  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;

  background: transparent;
  color: var(--portal-text-muted);

}
.usermgmt-btn:hover { background: var(--portal-surface-2); color: var(--portal-text); }
.um-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.45);
  display: flex; align-items: center; justify-content: center;
}
.um-modal {
  background: var(--portal-surface);
  border: 1px solid var(--portal-border);
  border-radius: 16px;
  width: min(500px, 100vw - 32px);
  max-height: 88vh;
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  font-family: 'Inter', 'Noto Sans KR', sans-serif;
}
.um-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--portal-border);
}
.um-title { font-size: 14px; font-weight: 700; color: var(--portal-text); }
.um-close {
  background: none; border: none; font-size: 18px; cursor: pointer;
  color: var(--portal-text-muted); padding: 0 4px; line-height: 1;
}
.um-close:hover { color: var(--portal-text); }
.um-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.um-label {
  font-size: 11px; font-weight: 600; color: var(--portal-text-muted);
  text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 6px;
}
.um-textarea {
  width: 100%; height: 110px; padding: 10px 12px;
  border: 1px solid var(--portal-border); border-radius: 8px;
  background: var(--portal-bg); color: var(--portal-text);
  font-size: 13px; font-family: 'JetBrains Mono', monospace;
  resize: vertical; outline: none; box-sizing: border-box; transition: border-color 0.15s;
}
.um-textarea:focus { border-color: var(--portal-accent); box-shadow: 0 0 0 3px var(--portal-accent-glow); }
.um-row { display: flex; gap: 10px; }
.um-input {
  flex: 1; padding: 9px 12px;
  border: 1px solid var(--portal-border); border-radius: 8px;
  background: var(--portal-bg); color: var(--portal-text);
  font-size: 13px; font-family: inherit; outline: none; box-sizing: border-box; transition: border-color 0.15s;
}
.um-input:focus { border-color: var(--portal-accent); box-shadow: 0 0 0 3px var(--portal-accent-glow); }
.um-select {
  padding: 9px 12px; border: 1px solid var(--portal-border); border-radius: 8px;

}
.um-btn {
  width: 100%; padding: 10px; background: var(--portal-accent); color: #fff;
  border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
  font-family: inherit; cursor: pointer; transition: background 0.15s;
}
.um-btn:hover:not(:disabled) { background: var(--portal-accent-hover); }
.um-btn:disabled { opacity: 0.55; cursor: not-allowed; }
.um-results { border: 1px solid var(--portal-border); border-radius: 8px; overflow: hidden; }
.um-result-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-bottom: 1px solid var(--portal-border);
}
.um-result-item:last-child { border-bottom: none; }
.um-result-ok  { color: #10b981; font-weight: 700; font-size: 13px; }
.um-result-err { color: var(--portal-danger); font-weight: 700; font-size: 13px; }
.um-result-email { flex: 1; font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--portal-text); }
.um-result-msg  { font-size: 11px; color: var(--portal-text-muted); }
</style>
</head>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
(function () {
  var firebaseConfig = {
    apiKey:            'AIzaSyAk9PGqBHxiG9fVwVZZg6ZGBOWaaSAXOBc',
    authDomain:        'qa-manager-9c145.firebaseapp.com',
    databaseURL:       'https://qa-manager-9c145-default-rtdb.asia-southeast1.firebasedatabase.app',
    projectId:         'qa-manager-9c145',
    storageBucket:     'qa-manager-9c145.firebasestorage.app',
    messagingSenderId: '1037146076792',
    appId:             '1:1037146076792:web:b8ddcdb31d527d2d545f8d'
  };

  var ALLOWED_DOMAIN  = '@ltml.co.kr';
  var ADMIN_EMAILS    = ['jhbaik@ltml.co.kr'];

  firebase.initializeApp(firebaseConfig);
  var auth = firebase.auth();
  // firebase-database-compat.js 로드 실패 등을 대비해 try-catch
  var db;
  try { db = firebase.database(); } catch (e) { db = null; }
  // 사용자 관리 모달에서 사용할 수 있도록 전역 노출
  window._portalFirebaseConfig = firebaseConfig;
  window._portalDb = db;

  // 포털이 이미 초기화됐는지 추적 — 토큰 갱신 등으로 onAuthStateChanged가
  // 여러 번 발화해도 renderApps가 중복 호출되지 않도록 방지
  var _portalReady = false;

  /* 신규 계정 — 비밀번호 변경 강제 화면
     existingData: null = 완전 신규, {role, createdAt, ...} = mustChangePw 플래그 계정 */
  function showPasswordChangeCard(user, existingData) {
    var gate = document.getElementById('auth-gate');
    if (!gate) return;
    gate.innerHTML = '<div class="ag-card">'
      + '<div class="ag-card-icon">🔑</div>'
      + '<div class="ag-card-title">비밀번호를 변경해주세요</div>'
      + '<div class="ag-card-msg">처음 접속하셨습니다.<br>관리자에게 받은 임시 비밀번호를<br>새 비밀번호로 변경해주세요.</div>'
      + '<input type="password" id="agCurrPw" class="ag-pw-input" placeholder="임시 비밀번호">'
      + '<input type="password" id="agNewPw"  class="ag-pw-input" placeholder="새 비밀번호 (8자 이상)">'
      + '<input type="password" id="agConfPw" class="ag-pw-input" placeholder="새 비밀번호 확인">'
      + '<div class="ag-pw-err" id="agPwErr"></div>'
      + '<div class="ag-btn-row">'
      + '<button class="ag-btn ag-btn-primary" id="agPwSubmit">비밀번호 변경 후 접속</button>'
      + '<button class="ag-btn ag-btn-ghost"    id="agPwOut">로그아웃</button>'
      + '</div></div>';

    var ids = ['agCurrPw', 'agNewPw', 'agConfPw'];
    function getEl(id) { return document.getElementById(id); }

    function setErr(msg, errorId) {
      getEl('agPwErr').textContent = msg;
      if (errorId) { getEl(errorId).classList.add('inp-error'); getEl(errorId).focus(); }
    }
    function clearErr() {
      getEl('agPwErr').textContent = '';
      ids.forEach(function(id) { getEl(id).classList.remove('inp-error'); });
    }

    function doChange() {
      clearErr();
      var curr = getEl('agCurrPw').value;
      var nw   = getEl('agNewPw').value;
      var conf = getEl('agConfPw').value;
      if (!curr)           { setErr('임시 비밀번호를 입력하세요.', 'agCurrPw'); return; }
      if (!nw)             { setErr('새 비밀번호를 입력하세요.', 'agNewPw'); return; }
      if (nw.length < 8)   { setErr('비밀번호는 8자 이상이어야 합니다.', 'agNewPw'); return; }
      if (nw !== conf)     { setErr('새 비밀번호가 일치하지 않습니다.', 'agConfPw'); return; }
      if (curr === nw)     { setErr('임시 비밀번호와 다른 비밀번호를 사용해주세요.', 'agNewPw'); return; }

      var btn = getEl('agPwSubmit');
      btn.disabled = true; btn.textContent = '변경 중...';

      var cred = firebase.auth.EmailAuthProvider.credential(user.email, curr);
      user.reauthenticateWithCredential(cred)
        .then(function() { return user.updatePassword(nw); })
        .then(function() {
          var lEmail = (user.email || '').toLowerCase();
          var role   = existingData ? existingData.role
                     : (ADMIN_EMAILS.indexOf(lEmail) !== -1) ? 'admin' : 'user';
          if (db) {
            return db.ref('portal_users/' + user.uid)
              .set({ role: role, email: user.email, createdAt: existingData ? (existingData.createdAt || Date.now()) : Date.now() })
              .then(function() { return role; });
          }
          return Promise.resolve(role);
        })
        .then(function(role) { openPortal(role, user.email); })
        .catch(function(err) {
          btn.disabled = false; btn.textContent = '비밀번호 변경 후 접속';
          if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
            setErr('임시 비밀번호가 올바르지 않습니다.', 'agCurrPw');
          } else if (err.code === 'auth/weak-password') {
            setErr('비밀번호가 너무 단순합니다.', 'agNewPw');
          } else {
            setErr('변경에 실패했습니다. 다시 시도하세요.');
          }
        });
    }

    getEl('agPwSubmit').addEventListener('click', doChange);
    getEl('agPwOut').addEventListener('click', function() {
      auth.signOut().then(function() { window.location.replace('./login.html'); });
    });
    ids.forEach(function(id, i) {
      getEl(id).addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { i < ids.length - 1 ? getEl(ids[i+1]).focus() : doChange(); }
      });
    });
    getEl('agCurrPw').focus();
  }

  /* 인증 게이트 → 안내 카드로 교체 */
  function showAuthCard(icon, title, msg, emailStr, noteLines, buttons) {
    var gate = document.getElementById('auth-gate');
    if (!gate) return;
    var html = '<div class="ag-card">'
      + '<div class="ag-card-icon">' + icon + '</div>'
      + '<div class="ag-card-title">' + title + '</div>'
      + '<div class="ag-card-msg">' + msg + '</div>';
    if (emailStr) html += '<div class="ag-card-email">' + emailStr + '</div>';
    if (noteLines && noteLines.length) {
      html += '<div class="ag-card-note">' + noteLines.join('<br>') + '</div>';
    }
    html += '<div class="ag-btn-row">';
    buttons.forEach(function (b) {
      html += '<button class="ag-btn ' + b.cls + '" id="' + b.id + '"'
        + (b.disabled ? ' disabled' : '') + '>' + b.label + '</button>';
    });
    html += '</div></div>';
    gate.innerHTML = html;
  }

  /* auth-gate 안전하게 제거 */
  function removeGate() {
    var gate = document.getElementById('auth-gate');
    if (gate) gate.remove();
  }

  /* 인증 완료 후 포털 열기 (중복 방지) */
  function openPortal(role, email) {
    if (_portalReady) return;
    _portalReady = true;

    document.getElementById('userEmailText').textContent = email;
    var badge = document.getElementById('userRoleBadge');
    if (role === 'admin') {
      badge.textContent = '관리자';
      badge.className   = 'user-role-badge role-admin';
    } else {
      badge.textContent = '사용자';
      badge.className   = 'user-role-badge role-user';
    }
    document.getElementById('userFooter').style.display = '';
    if (role === 'admin') {
      document.getElementById('viewToggleRow').style.display = '';
      document.getElementById('userMgmtRow').style.display  = '';
    }

    removeGate();
    window.initPortal(role);
  }

  // Firebase Auth 초기화 중 null이 먼저 발화될 수 있으므로,
  // 2초 내에 user 발화가 없으면 로그인 페이지로 이동
  var _loginTimer = setTimeout(function () {
    if (!_portalReady) { window.location.replace('./login.html'); }
  }, 2000);

  auth.onAuthStateChanged(function (user) {
    clearTimeout(_loginTimer); // 어떤 상태든 도착하면 타이머 취소

    /* ① 미로그인 — 포털이 아직 열리지 않은 경우만 로그인 페이지로 이동 */
    if (!user) {
      if (!_portalReady) {
        window.location.replace('./login.html');
      }
      return;
    }

    /* 이미 포털 초기화 완료 → 토큰 갱신 등 재발화는 무시 */
    if (_portalReady) return;

    var email = (user.email || '').toLowerCase();

    /* ② 도메인 검증 — @ltml.co.kr 이 아닌 계정 차단 */
    if (!email.endsWith(ALLOWED_DOMAIN)) {
      showAuthCard(
        '🚫', '접근 권한 없음',
        '회사 이메일(@ltml.co.kr)로만<br>접근할 수 있습니다.',
        user.email,
        ['· 개인 이메일 계정으로는 접근 불가'],
        [{ id: 'agSignout', cls: 'ag-btn-ghost', label: '로그아웃' }]
      );
      document.getElementById('agSignout').addEventListener('click', function () {
        auth.signOut().then(function () { window.location.replace('./login.html'); });
      });
      return;
    }

    /* ③ 이메일 인증 체크 제거 — 관리자가 직접 계정 생성하는 방식으로 전환 */

    /* ④ 인증 완료 — 역할 조회 & 자동 배정 */
    var userEmail = user.email;

    // DB를 사용할 수 없으면 기본 역할로 바로 열기
    if (!db) {
      var fallbackRole = (ADMIN_EMAILS.indexOf(email) !== -1) ? 'admin' : 'user';
      openPortal(fallbackRole, userEmail);
      return;
    }

    var userRef = db.ref('portal_users/' + user.uid);

    // Firebase RTDB WebSocket 연결 실패 시 promise가 영원히 pending될 수 있음
    // → 5초 타임아웃으로 강제 진입
    var _dbTimer = setTimeout(function () {
      if (!_portalReady) {
        var role = (ADMIN_EMAILS.indexOf(email) !== -1) ? 'admin' : 'user';
        openPortal(role, userEmail);
      }
    }, 5000);

    userRef.once('value').then(function (snap) {
      clearTimeout(_dbTimer);
      if (_portalReady) return;  // DB 응답 오기 전 중복 발화 방어

      var data = snap.val();
      var role = data && data.role;

      if (!role) {
        // 신규 계정 (DB 엔트리 없음) → 비밀번호 변경 강제
        showPasswordChangeCard(user, null);
        return;
      }
      if (data.mustChangePw) {
        // 포털에서 생성된 계정 → 비밀번호 변경 강제
        showPasswordChangeCard(user, data);
        return;
      }

      openPortal(role, userEmail);
    }).catch(function () {
      // DB 조회 실패(권한 거부 등) 시 기본 역할로 포털 열기
      clearTimeout(_dbTimer);
      if (_portalReady) return;
      var role = (ADMIN_EMAILS.indexOf(email) !== -1) ? 'admin' : 'user';
      openPortal(role, userEmail);
    });
  });

  document.getElementById('logoutBtn').addEventListener('click', function () {
    auth.signOut().then(function () {
      window.location.replace('./login.html');
    });
  });
})();
</script>

<!-- 사용자 관리 모달 핸들러 (관리자 전용) -->
<script>
(function () {
  var overlay   = document.getElementById('umOverlay');
  var createBtn = document.getElementById('umCreateBtn');
  var resultsEl = document.getElementById('umResults');

  document.getElementById('userMgmtBtn').addEventListener('click', function () {
    resultsEl.innerHTML = '';
    overlay.style.display = 'flex';
    document.getElementById('umEmails').focus();
  });
  function closeModal() {
    overlay.style.display = 'none';
    resultsEl.innerHTML = '';
  }
  document.getElementById('umClose').addEventListener('click', closeModal);
  overlay.addEventListener('click', function (e) { if (e.target === overlay) closeModal(); });

  createBtn.addEventListener('click', function () {
    var raw  = document.getElementById('umEmails').value;
    var pw   = document.getElementById('umPw').value.trim();
    var role = document.getElementById('umRole').value;

    var emails = raw.split('\n')
      .map(function (s) { return s.trim().toLowerCase(); })
      .filter(function (s) { return s.length > 0; });

    if (!emails.length) { alert('이메일을 입력하세요.'); return; }
    if (!pw)            { alert('임시 비밀번호를 입력하세요.'); return; }
    if (pw.length < 6)  { alert('비밀번호는 6자 이상이어야 합니다.'); return; }

    createBtn.disabled = true;
    createBtn.textContent = '생성 중...';
    resultsEl.innerHTML = '';

    // Secondary Firebase app — 현재 관리자 세션에 영향 없이 계정 생성
    var secApp;
    try { secApp = firebase.app('PortalUserMgmt'); }
    catch (e) { secApp = firebase.initializeApp(window._portalFirebaseConfig, 'PortalUserMgmt'); }
    var secAuth = secApp.auth();

    var results = [];
    var idx = 0;

    function next() {
      if (idx >= emails.length) {
        renderResults();
        createBtn.disabled = false;
        createBtn.textContent = '계정 생성';
        return;
      }
      var email = emails[idx++];
      secAuth.createUserWithEmailAndPassword(email, pw)
        .then(function (cred) {
          var uid = cred.user.uid;
          secAuth.signOut();
          var entry = { role: role, email: email, createdAt: Date.now(), mustChangePw: true };
          if (window._portalDb) {
            return window._portalDb.ref('portal_users/' + uid).set(entry)
              .then(function () { results.push({ email: email, ok: true, uid: uid }); next(); });
          }
          results.push({ email: email, ok: true, uid: uid });
          next();
        })
        .catch(function (err) {
          try { secAuth.signOut(); } catch(e) {}
          var msg;
          switch (err.code) {
            case 'auth/email-already-in-use': msg = '이미 존재하는 계정'; break;
            case 'auth/invalid-email':        msg = '이메일 형식 오류'; break;
            case 'auth/weak-password':        msg = '비밀번호가 너무 단순함'; break;
            default: msg = err.code;
          }
          results.push({ email: email, ok: false, msg: msg });
          next();
        });
    }
    next();

    function renderResults() {
      if (!results.length) return;
      var html = '<div class="um-results">';
      results.forEach(function (r) {
        html += '<div class="um-result-item">'
          + '<span class="' + (r.ok ? 'um-result-ok' : 'um-result-err') + '">' + (r.ok ? '✓' : '✗') + '</span>'
          + '<span class="um-result-email">' + r.email + '</span>'
          + '<span class="um-result-msg">' + (r.ok ? 'UID: ' + r.uid.slice(0, 10) + '…' : r.msg) + '</span>'
          + '</div>';
      });
      html += '</div>';
      resultsEl.innerHTML = html;
    }
  });
})();
</script>

<!-- 게스트 뷰 토글 핸들러 (관리자 전용) -->
<script>
(function () {
  var _guestOn = false;
  document.getElementById('viewToggleBtn').addEventListener('click', function () {
    _guestOn = !_guestOn;
    if (window.toggleGuestView) window.toggleGuestView(_guestOn);
    var btn   = document.getElementById('viewToggleBtn');
    var lbl   = document.getElementById('viewToggleLabel');
    var badge = document.getElementById('userRoleBadge');
    if (_guestOn) {
      btn.classList.add('guest-mode');
      lbl.textContent   = '관리자 화면으로 돌아가기';
      badge.textContent = '미리보기';
      badge.className   = 'user-role-badge role-preview';
    } else {
      btn.classList.remove('guest-mode');
      lbl.textContent   = '게스트 화면 미리보기';
      badge.textContent = '관리자';
      badge.className   = 'user-role-badge role-admin';
    }
  });
})();
</script>
