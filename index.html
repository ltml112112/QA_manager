<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전자재료사업부 품질경영팀 업무 포털</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --surface: #1a1f2e;
  --surface2: #222840;
  --border: #2e3554;
  --accent: #4f6ef7;
  --accent-hover: #6b83ff;
  --accent-glow: rgba(79,110,247,0.18);
  --text: #e4e8f5;
  --text-muted: #7b84a8;
  --success: #34d399;
}

html, body { height: 100%; font-family: 'Inter', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

.topbar {
  height: 52px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 16px;
  position: sticky; top: 0; z-index: 100; user-select: none;
}

.brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.brand-logo {
  height: 28px; width: auto; object-fit: contain; flex-shrink: 0;
}
.brand-name { font-size: 13px; font-weight: 700; line-height: 1.2; }
.brand-sub { font-size: 10px; color: var(--text-muted); }
.divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

.tab-nav { display: flex; align-items: center; gap: 2px; flex: 1; overflow-x: auto; scrollbar-width: none; }
.tab-nav::-webkit-scrollbar { display: none; }

.tab-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 14px; border: 1px solid transparent; border-radius: 6px;
  background: transparent; color: var(--text-muted);
  font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .15s; white-space: nowrap; flex-shrink: 0;
}
.tab-btn:hover { background: var(--surface2); color: var(--text); }
.tab-btn.active { background: var(--accent-glow); color: var(--accent-hover); border-color: rgba(79,110,247,0.35); }

.tab-badge {
  font-size: 9px; font-weight: 700; padding: 1px 5px;
  border-radius: 4px; background: var(--accent); color: #fff; line-height: 1.4;
}

.status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: blink 3s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

.frame-area { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; }
.frame-wrap { display: none; width: 100%; height: 100%; position: relative; }
.frame-wrap.active { display: block; }
.frame-wrap iframe { width: 100%; height: 100%; border: none; }

.loader {
  position: absolute; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
  z-index: 10; transition: opacity .4s;
}
.loader.hidden { opacity: 0; pointer-events: none; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-size: 13px; color: var(--text-muted); }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand" onclick="location.reload()" style="cursor:pointer" title="홈으로 이동">
    <img class="brand-logo" src="LT소재 로고(영문).jpg" alt="LT Materials">
    <div>
      <div class="brand-name">품질경영팀 포털</div>
      <div class="brand-sub">전자재료사업부</div>
    </div>
  </div>
  <div class="divider"></div>
  <nav class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('ivl', this)">
      <span>📊</span> OLED IVL &amp; LT 분석기
    </button>
    <button class="tab-btn" onclick="switchTab('pre', this)">
      <span>📋</span> 사전심사자료 자동화
      <span class="tab-badge">GAS</span>
    </button>
    <button class="tab-btn" onclick="switchTab('hplc', this)">
      <span>🧪</span> HPLC/DSC Report 자동생성
    </button>
  </nav>
  <div class="status"><div class="status-dot"></div>가동 중</div>
</div>

<div class="frame-area">
  <div class="frame-wrap active" id="tab-ivl">
    <div class="loader" id="loader-ivl">
      <div class="spinner"></div>
      <div class="loader-text">OLED IVL &amp; LT 분석기 로딩 중...</div>
    </div>
    <iframe id="iframe-ivl" title="OLED IVL &amp; LT Analyzer"></iframe>
  </div>
  <div class="frame-wrap" id="tab-pre">
    <div class="loader" id="loader-pre">
      <div class="spinner"></div>
      <div class="loader-text">사전심사자료 자동화 로딩 중...</div>
    </div>
    <iframe
      id="iframe-pre"

      title="사전심사자료 자동화"
      onload="hideLoader('pre')"
    ></iframe>
  </div>
  <div class="frame-wrap" id="tab-hplc">
    <div class="loader" id="loader-hplc">
      <div class="spinner"></div>
      <div class="loader-text">HPLC/DSC Report 자동생성 로딩 중...</div>
    </div>
    <iframe id="iframe-hplc" title="HPLC/DSC Report 자동생성"></iframe>
  </div>
</div>

var loaded = {};

function switchTab(id, btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.frame-wrap').forEach(function(w) { w.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
  if (loaded[id]) hideLoader(id);
}

function hideLoader(id) {
  loaded[id] = true;
  var el = document.getElementById('loader-' + id);
  if (el) el.classList.add('hidden');
}
