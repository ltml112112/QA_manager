<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전자재료사업부 품질경영팀 업무 포털</title>
<link rel="stylesheet" href="./assets/css/global_style.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #0f1117;
  --surface:      #1a1f2e;
  --surface2:     #222840;
  --border:       #2e3554;
  --accent:       #4f6ef7;
  --accent-hover: #6b83ff;
  --accent-glow:  rgba(79,110,247,0.18);
  --text:         #e4e8f5;
  --text-muted:   #7b84a8;
  --success:      #34d399;
}

html, body {
  height: 100%;
  font-family: 'Inter', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
}

/* ── 상단바 ─────────────────────────────────────────────────────────────── */
.topbar {
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  user-select: none;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  cursor: pointer;
}
.brand-logo { height: 28px; width: auto; object-fit: contain; flex-shrink: 0; }
.brand-name { font-size: 13px; font-weight: 700; line-height: 1.2; }
.brand-sub  { font-size: 10px; color: var(--text-muted); }

.divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

.tab-nav {
  display: flex;
  align-items: center;
  gap: 2px;
  flex: 1;
  overflow-x: auto;
  scrollbar-width: none;
}
.tab-nav::-webkit-scrollbar { display: none; }

.tab-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 14px;
  border: 1px solid transparent;
  border-radius: 6px;
  background: transparent;
  color: var(--text-muted);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.tab-btn:hover  { background: var(--surface2); color: var(--text); }
.tab-btn.active { background: var(--accent-glow); color: var(--accent-hover); border-color: rgba(79,110,247,0.35); }

.tab-badge {
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 4px;
  background: var(--accent);
  color: #fff;
  line-height: 1.4;
}

.theme-btn {
  width: 30px;
  height: 30px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-muted);
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  flex-shrink: 0;
  line-height: 1;
}
.theme-btn:hover { border-color: var(--accent); color: var(--accent); }

.status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
}
.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--success);
  animation: blink 3s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── 콘텐츠 영역 ─────────────────────────────────────────────────────────── */
.frame-area { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; }

.frame-wrap { display: none; width: 100%; height: 100%; position: relative; }
.frame-wrap.active { display: block; }
.frame-wrap iframe { width: 100%; height: 100%; border: none; }

/* ── 로더 ───────────────────────────────────────────────────────────────── */
.loader {
  position: absolute;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  z-index: 10;
  transition: opacity .4s;
}
.loader.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-size: 13px; color: var(--text-muted); }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand" onclick="location.reload()" title="홈으로 이동">
    <img class="brand-logo" src="./assets/img/lt_logo.jpg" alt="LT Materials">
    <div>
      <div class="brand-name">품질경영팀 포털</div>
      <div class="brand-sub">전자재료사업부</div>
    </div>
  </div>
  <div class="divider"></div>
  <nav class="tab-nav">
    <!-- main.js가 동적으로 탭 버튼을 삽입합니다 -->
  </nav>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="다크/라이트 전환">🌙</button>
  <div class="status"><div class="status-dot"></div>가동 중</div>
</div>

<div class="frame-area">
  <!-- main.js가 동적으로 frame-wrap + iframe을 삽입합니다 -->
</div>

<script src="./assets/js/main.js"></script>
</body>
</html>
